URA:\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Da lunedì 20 a venerdì 24: ore 10.00 – 21.00\u003C/p&gt;\n\u003Cp&gt;Sabato 25 aprile: ore 10.00 – 16.00.\u003C/p&gt;\n&#34;,{&#34;title&#34;:116,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:117,&#34;twitter&#34;:118},&#34;Il concept The Humans Behind alla Milano Design Week&#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:120,&#34;title&#34;:116,&#34;excerpt&#34;:129,&#34;type&#34;:130,&#34;date&#34;:131,&#34;city&#34;:132,&#34;hour&#34;:133,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:122,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},&#34;image&#34;,{&#34;filename&#34;:123,&#34;filesize&#34;:124,&#34;url&#34;:125,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:127,&#34;height&#34;:127,&#34;sizes&#34;:128},&#34;grafiche_TheHumansBehindNews.jpg&#34;,176794,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2026/04/grafiche_TheHumansBehindNews.jpg&#34;,&#34;jpeg&#34;,771,[],&#34;\u003Cp&gt;Iris Ceramica Group partecipa a Fuorisalone 2026 con il concept “The Humans Behind”, rinnovando la propria presenza nel mondo del design attraverso la MJ Casa di Milano.\u003C/p&gt;\n&#34;,&#34;event&#34;,&#34;20.04.2026&#34;,&#34;milano&#34;,&#34;10:00&#34;,{&#34;prev&#34;:135,&#34;next&#34;:136},[],[],&#34;fuorisalone-26-milano&#34;,[139,143],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:141,&#34;path_no_lang&#34;:142},&#34;en_US&#34;,&#34;/en/events/fuorisalone-26-milano/&#34;,&#34;/events/fuorisalone-26-milano/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:92,&#34;path_no_lang&#34;:92},&#34;it_IT&#34;,&#34;April 9, 2026&#34;,{&#34;id&#34;:147,&#34;fullPath&#34;:148,&#34;path&#34;:149,&#34;title&#34;:150,&#34;structure&#34;:151,&#34;siblings&#34;:178,&#34;slug&#34;:181,&#34;i18n&#34;:182,&#34;date&#34;:187,&#34;order&#34;:51},1293,&#34;https://apiicggallery.irisceramicagroup.com/eventi/the-magical-journey-a-parigi-per-maisonobjet/&#34;,&#34;/eventi/the-magical-journey-a-parigi-per-maisonobjet/&#34;,&#34;THE MAGICAL JOURNEY A PARIGI PER MAISON&amp;OBJET&#34;,{&#34;sections&#34;:152,&#34;seo_meta&#34;:163,&#34;preview&#34;:167},[153],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:154},[155,157,161],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:156},&#34;\u003Cp&gt;Il viaggio alchemico – iniziato a Cersaie e proseguito a Dubai – arriva a Maison&amp;amp;Objet – In the city, interpretando il tema dell’evento attraverso le superfici e le soluzioni esposte nella MJ Casa parigina.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:158,&#34;external_link&#34;:159,&#34;file&#34;:34,&#34;label&#34;:160},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/maison-objet/&#34;,&#34;Registrati&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:162,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Dal 14 al 19 gennaio il concept The Magical Journey di Iris Ceramica Group fa tappa a Maison&amp;amp;Objet 2026 – In the city, la fiera parigina che si rivolge al mondo del design e dell’arredamento coinvolgendo eccellenze internazionali, dall’area espositiva agli showroom distribuiti su tutta la città. Il tema di quest’anno, “Past reveals future”, presenta il design come strumento portatore di memoria, storia e tradizione e, al tempo stesso, espressione di innovazione responsabile.\u003C/p&gt;\n\u003Cp&gt;In questa cornice, nel centro della città la MJ Casa di Parigi si apre alla comunità del design raccontando la visione del Gruppo – Reengineering Ceramics for the Better – e dando forma tangibile alla propria idea di ceramica: una materia nobile e preziosa che l’Azienda valorizza unendo tradizione e innovazione tecnologica.\u003Cbr /&gt;\nPer Iris Ceramica Group, infatti, la ceramica è beautility: la perfetta sintesi di bellezza e funzionalità. La trasformazione della materia, per mezzo dell’innovazione, assume così un nuovo significato: è un processo antico che trasforma la ceramica in oro, un vero e proprio processo simbolicamente alchemico.\u003C/p&gt;\n\u003Cp&gt;La MJ Casa Paris accoglie anche le opere d’arte realizzate da due artiste internazionali che hanno raccontato il concept metaforico The Magical Journey, ciascuna con un proprio linguaggio visivo e narrativo. Da una parte, i videomorphing digitali della visual artist Lorenza Liguori che interpretano il viaggio magico in tutte le sue tre tappe di trasformazione alchemica. Dall’altra, sulla vetrina esterna, l’opera d’arte in vernice acrilica e pennarelli di Héléna Soubeyrand – realizzata nell’ambito del progetto Winter Alchemy – che mette in scena la magia della metamorfosi attraverso l’illustrazione.\u003C/p&gt;\n\u003Cp&gt;Nella MJ Casa così come nelle opere d’arte esposte, tradizione e innovazione si uniscono in una sola voce per raccontare &amp;#8211; attraverso l’arte e la tecnologia &amp;#8211; il valore profondo che la ceramica incarna nella narrazione sofisticata di Iris Ceramica Group.\u003C/p&gt;\n\u003Cp&gt;MJ Casa Paris per M&amp;amp;O &amp;#8211; In The City\u003Cbr /&gt;\n14 – 19 Gennaio 2026\u003Cbr /&gt;\n39 Rue d’Alésia\u003C/p&gt;\n&#34;,{&#34;title&#34;:164,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:165,&#34;twitter&#34;:166},&#34;THE MAGICAL JOURNEY A PARIGI PER MAISON&amp;OBJET &#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:168,&#34;title&#34;:164,&#34;excerpt&# s&#34;:199},[200,202,204],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:201},&#34;\u003Cp&gt;\u003Cstrong&gt;L’11 dicembre la MJ Casa di Parigi ospita l’evento conviviale che accoglie la stagione invernale. A sfondo l’opera realizzata sulla vetrina da Héléna Soubeyrand.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:203,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;L’11 dicembre la \u003Cstrong&gt;MJ Casa\u003C/strong&gt; \u003Cstrong&gt;di Parigi,\u003C/strong&gt; situata nel quartiere del Petit-Montrouge, al 39 Rue d’Alésia, ospiterà \u003Cstrong&gt;Winter Alchemy,\u003C/strong&gt; un momento conviviale per accogliere insieme la stagione invernale. Tra bevande calde, profumi speziati e piccole delizie, sarà l’occasione per ritrovarsi, chiacchierare e godersi l’atmosfera rilassata delle festività.\u003C/p&gt;\n\u003Cp&gt;Durante la serata sarà possibile ammirare l’illustrazione realizzata – nell’ambito dell’omonimo progetto Winter Alchemy – dall’artista \u003Cstrong&gt;Héléna Soubeyrand\u003C/strong&gt; per la vetrina dello showroom.\u003C/p&gt;\n\u003Cp&gt;L’opera sarà caratterizzata dal suo stile riconoscibile: linee morbide e leggiadre che nascono dall’osservazione della natura e delle persone. Un unico tratto che sembra non interrompersi mai, una linea che si muove sulla tela vetrata come se la sorvolasse.\u003C/p&gt;\n\u003Cp&gt;Il suo universo artistico oscilla tra il sogno e il sacro, mescolando l&amp;#8217;iconografia femminile delle arti religiose e le curve fluide della cultura pop.\u003C/p&gt;\n\u003Cp&gt;Collabora regolarmente con aziende come Ruinart, Montblanc, Art Basel Paris, Sisley e Chanel, apportando il suo tocco artistico unico alle loro campagne. Il suo lavoro continua ad evolversi, tra \u003Cstrong&gt;performance, misticismo e modernità\u003C/strong&gt;, affermando la sua unicità nel panorama artistico contemporaneo.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:205,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:207},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/winter-alchemy/&#34;,&#34;Il progetto Winter Alchemy&#34;,{&#34;media&#34;:209,&#34;title&#34;:192,&#34;excerpt&#34;:215,&#34;type&#34;:130,&#34;date&#34;:216,&#34;city&#34;:176,&#34;hour&#34;:217,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:210,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:211,&#34;filesize&#34;:212,&#34;url&#34;:213,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:214},&#34;Graphics_2025_Winter-Alchemy_v3_news-gallery-Paris.jpg&#34;,478171,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/12/Graphics_2025_Winter-Alchemy_v3_news-gallery-Paris.jpg&#34;,[],&#34;\u003Cp&gt;L’11 dicembre la MJ Casa di Parigi ospita l’evento conviviale che accoglie la stagione invernale. A sfondo l’opera realizzata sulla vetrina da Héléna Soubeyrand.\u003C/p&gt;\n&#34;,&#34;11.12.2025&#34;,&#34;19:00&#34;,{&#34;prev&#34;:219,&#34;next&#34;:220},[],[],&#34;winter-alchemy-parigi&#34;,[223,226],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:224,&#34;path_no_lang&#34;:225},&#34;/en/events/winter-alchemy-paris/&#34;,&#34;/events/winter-alchemy-paris/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:191,&#34;path_no_lang&#34;:191},&#34;December 3, 2025&#34;,{&#34;id&#34;:229,&#34;fullPath&#34;:230,&#34;path&#34;:231,&#34;title&#34;:232,&#34;structure&#34;:233,&#34;siblings&#34;:259,&#34;slug&#34;:262,&#34;i18n&#34;:263,&#34;date&#34;:268,&#34;order&#34;:51},1255,&#34;https://apiicggallery.irisceramicagroup.com/eventi/winter-alchemy-milano/&#34;,&#34;/eventi/winter-alchemy-milano/&#34;,&#34;Winter Alchemy - Milano&#34;,{&#34;sections&#34;:234,&#34;seo_meta&#34;:247,&#34;preview&#34;:250},[235],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:236},[237,239,241,244],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:238},&#34;\u003Cp&gt;Il 10 dicembre la MJ Casa di Milano ospita l&amp;#8217;evento conviviale che accoglie la stagione invernale. A sfondo l&amp;#8217;opera realizzata sulla vetrina da Joanne Elizabeth Shipp.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:240,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Il 10 dicembre\u003C/strong&gt; la \u003Cstrong&gt;MJ Casa\u003C/strong&gt; di \u003Cstrong&gt;Via Santa Margherita 4 \u003C/strong&gt;ospiterà \u003Cstrong&gt;Winter Alchemy\u003C/strong&gt;, un momento conviviale per accogliere insieme la stagione invernale.\u003Cbr /&gt;\nTra bevande calde, profumi speziati e piccole delizie, sarà l’occasione per ritrovarsi, chiacchierare e godersi l’atmosfera rilassata delle festività.\u003C/p&gt;\n\u003Cp&gt;Durante la serata sarà possibile ammirare l’illustrazione realizzata &amp;#8211; nell&amp;#8217;ambito dell&amp;#8217;omonimo progetto Winter Alchemy &amp;#8211; dall&amp;#8217;artista \u003Cstrong&gt;Joanne Elizabeth Shipp\u003C/strong&gt; per la vetrina dello showroom\u003Cstrong&gt;.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;L&amp;#8217;opera sarà caratterizzata dal suo stile riconoscibile: una fitta composizione di microdisegni, schizzi, icone e simboli che danno vita a un paesaggio ricco di significato.\u003C/p&gt;\n\u003Cp&gt;Nata nel Regno Unito e laureata con lode all’Università di Londra, con una specializzazione in \u003Cstrong&gt;tessuti stampati\u003C/strong&gt;, Joanne Elizabeth Shipp vive sul \u003Cstrong&gt;Lago di Como\u003C/strong&gt; dal 1992. Designer professionista, ha collaborato con numerosi marchi e ha esposto le sue opere in gallerie e mostre a Londra, Milano, Ginevra, Como, Monaco, Courmayeur e Bormio. Tra i suoi progetti più significativi figura una \u003Cstrong&gt;collezione esclusiva di foulard\u003C/strong&gt; realizzata per il Mandarin Oriental Lago di Como e Milano.\u003Cbr /&gt;\nAttualmente si dedica alla \u003Cstrong&gt;creazione di opere d’arte personalizzate\u003C/strong&gt; e alla \u003Cstrong&gt;pittura interattiva dal vivo\u003C/strong&gt; per eventi ed esperienze, collaborando con \u003Cstrong&gt;organizzatori di eventi, hotel di lusso e aziende internazionali\u003C/strong&gt;.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:242,&#34;external_link&#34;:243,&#34;file&#34;:34,&#34;label&#34;:160},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/winter-alchemy-milano/&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:245,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:246},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Scopri il progetto Winter Alchemy&#34;,{&#34;title&#34;:232,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:248,&#34;twitter&#34;:249},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:251,&#34;title&#34;:232,&#34;excerpt&#34;:238,&#34;type&#34;:130,&#34;date&#34;:257,&#34;city&#34;:132,&#34;hour&#34;:258,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:252,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:253,&#34;filesize&#34;:254,&#34;url&#34;:255,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:256},&#34;Winter-Alchemy-Milano-2.jpg&#34;,481517,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/11/Winter-Alchemy-Milano-2.jpg&#34;,[],&#34;10.12.2025&#34;,&#34;18:30&#34;,{&#34;prev&#34;:260,&#34;next&#34;:261},[],[],&#34;winter-alchemy-milano&#34;,[264,267],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:265,&#34;path_no_lang&#34;:266},&#34;/en/events/winter-alchemy-milan/&#34;,&#34;/events/winter-alchemy-milan/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:231,&#34;path_no_lang&#34;:231},&#34;November 26, 2025&#34;,{&#34;id&#34;:270,&#34;fullPath&#34;:271,&#34;path&#34;:272,&#34;title&#34;:273,&#34;structure&#34;:274,&#34;siblings&#34;:296,&#34;slug&#34;:299,&#34;i18n&#34;:300,&#34;date&#34;:305,&#34;order&#34;:51},1286,&#34;https://apiicggallery.irisceramicagroup.com/eventi/winter-alchemy-marbella/&#34;,&#34;/eventi/winter-alchemy-marbella/&#34;,&#34;Winter Alchemy - Marbella&#34;,{&#34;seo_meta&#34;:275,&#34;sections&#34;:278,&#34;preview&#34;:287},{&#34;title&#34;:273,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:276,&#34;twitter&#34;:277},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[279],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:280},[281,283,285],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:282},&#34;\u003Cp&gt;Il 4 dicembre la MJ Casa di Marbella ospita l’evento conviviale che accoglie la stagione invernale. A sfondo l’opera realizzata sulla vetrina da Aida di Manila Wall Art.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:284,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Il 4 dicembre la \u003Cstrong&gt;MJ Casa\u003C/strong&gt; \u003Cstrong&gt;di Marbella,\u003C/strong&gt; situata nel cuore dell’arteria principale della città che riflette l’eleganza e il dinamismo della Costa del Sol, ospiterà \u003Cstrong&gt;Winter Alchemy,\u003C/strong&gt; un momento conviviale per accogliere insieme la stagione invernale. Tra bevande calde, profumi speziati e piccole delizie, sarà l’occasione per ritrovarsi, chiacchierare e godersi l’atmosfera rilassata delle festività.\u003C/p&gt;\n\u003Cp&gt;Durante la serata sarà possibile ammirare l’illustrazione realizzata – nell’ambito dell’omonimo progetto Winter Alchemy – dall’artista \u003Cstrong&gt;\u003Cem&gt;Aida di Manila Wall Art\u003C/em&gt;\u003C/strong&gt; per la vetrina dello showroom.\u003C/p&gt;\n\u003Cp&gt;L’opera racconta il viaggio magico della farfalla, simbolo della trasformazione e della forza interiore. Un messaggio iconografico per ricordarci che credere nella nostra metamorfosi è il primo passo per spiccare il volo.\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Manila Wall Art\u003C/strong&gt; è un progetto artistico fondato da Aida Vila e Manu Martín. I loro murales e le opere di grande formato combinano il realismo con elementi geometrici e astratti, dando vita a creazioni visivamente potenti e ricche di emozione.\u003C/p&gt;\n\u003Cp&gt;Aida e Manu partecipano a progetti di interior design e sono una presenza abituale nelle fiere del settore. Inoltre, realizzano interventi dal vivo in festival d’arte ed eventi di vario tipo, e sviluppano progetti partecipativi in cui il pubblico diventa parte del processo creativo, dando origine alla co-creazione di opere murali uniche.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:286,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:207},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;media&#34;:288,&#34;title&#34;:273,&#34;excerpt&#34;:282,&#34;type&#34;:130,&#34;date&#34;:294,&#34;city&#34;:295,&#34;hour&#34;:258,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:289,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:290,&#34;filesize&#34;:291,&#34;url&#34;:292,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:293},&#34;Graphics_2025_Winter-Alchemy_v3_news-gallery-Marbella.jpg&#34;,486527,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/12/Graphics_2025_Winter-Alchemy_v3_news-gallery-Marbella.jpg&#34;,[],&#34;04.12.2025&#34;,&#34;marbella&#34;,{&#34;prev&#34;:297,&#34;next&#34;:298},[],[],&#34;winter-alchemy-marbella&#34;,[301,304],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:302,&#34;path_no_lang&#34;:303},&#34;/en/events/winter-alchemy-marbella/&#34;,&#34;/events/winter-alchemy-marbella/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:272,&#34;path_no_lang&#34;:272},&#34;December 4, 2025&#34;,{&#34;id&#34;:307,&#34;fullPath&#34;:308,&#34;path&#34;:309,&#34;title&#34;:310,&#34;structure&#34;:311,&#34;siblings&#34;:341,&#34;slug&#34;:344,&#34;i18n&#34;:345,&#34;date&#34;:350,&#34;order&#34;:51},1237,&#34;https://apiicggallery.irisceramicagroup.com/eventi/winter-alchemy-berlino/&#34;,&#34;/eventi/winter-alchemy-berlino/&#34;,&#34;Winter Alchemy - Berlino&#34;,{&#34;sections&#34;:312,&#34;seo_meta&#34;:327,&#34;preview&#34;:330},[313],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:314},[315,317,319,322,325],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:316},&#34;\u003Cp&gt;Giovedì 27 novembre, dalle 18.00 alle 21.00, la MJ Casa Berlino ospita una serata di convivialità per accogliere insieme le festività invernali. Tra bevande calde, profumi speziati e piccole specialità, la serata sarà un’occasione per ritrovarsi e godere di un’atmosfera rilassata accompagnata dal DJ set di \u003Cstrong&gt;Mr. John Loveless\u003C/strong&gt;.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:318,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;L’evento sarà anche l&amp;#8217;occasione ideale per presentare \u003Cstrong&gt;\u003Cem&gt;The Alchemic Garden\u003C/em&gt;\u003C/strong&gt; l&amp;#8217;opera d&amp;#8217;arte di \u003Cstrong&gt;Daniela Spoto\u003C/strong&gt; realizzata sulla vetrina della MJ Casa Berlino. L&amp;#8217;illustrazione\u003Cstrong&gt; si inserisce nel progetto corale Winter Alchemy\u003C/strong&gt; che riunisce tutte le MJ Casa europee in un racconto artistico a più voci.\u003C/p&gt;\n\u003Cp&gt;Daniela Spoto, ispirandosi al suo immaginario poetico, ha trasformato la natura in un giardino alchemico abitato da fiori e creature ibride sospese tra luna e sole, simbolo di metamorfosi e rinascita.\u003C/p&gt;\n\u003Cp&gt;In occasione delle festività invernali, a \u003Cstrong&gt;Milano, Parigi, Londra, Berlino e Marbella\u003C/strong&gt;, le MJ Casa danno vita a un viaggio magico che trasforma le vetrine degli showroom metaforicamente in oro, affidandosi alla creatività di \u003Cstrong&gt;cinque artiste internazionali\u003C/strong&gt; chiamate a raccontare &amp;#8211; con il proprio linguaggio e stile artistico &amp;#8211; il concept \u003Cstrong&gt;The Magical Journey,\u003C/strong&gt; per interpretare lo spirito delle festività attraverso il tema della trasformazione alchemica.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:320,&#34;external_link&#34;:321,&#34;file&#34;:34,&#34;label&#34;:160},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/winter-alchemy-berlin/&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:323,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:324},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Scopri tutti gli artwork&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:326,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;27 novembre | 18.00 – 21.00\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;MJ Casa – Auguststraße 6, 10117 Berlin\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;DJ set di Mr. John Loveless\u003C/strong&gt; | indie-dance, synth-pop\u003C/p&gt;\n&#34;,{&#34;title&#34;:310,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:328,&#34;twitter&#34;:329},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:331,&#34;title&#34;:310,&#34;excerpt&#34;:337,&#34;type&#34;:130,&#34;date&#34;:338,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:332,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:333,&#34;filesize&#34;:334,&#34;url&#34;:335,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:336},&#34;Graphics_2025_Winter-Alchemy_v3_news-gallery-Berlino.jpg&#34;,484908,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/11/Graphics_2025_Winter-Alchemy_v3_news-gallery-Berlino.jpg&#34;,[],&#34;\u003Cp&gt;Giovedì 27 novembre, dalle 18.00 alle 21.00, la MJ Casa Berlino ospita una serata di convivialità per accogliere insieme le festività invernali.\u003C/p&gt;\n&#34;,&#34;27.11.2025&#34;,&#34;berlino&#34;,&#34;18:00&#34;,{&#34;prev&#34;:342,&#34;next&#34;:343},[],[],&#34;winter-alchemy-berlino&#34;,[346,349],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:347,&#34;path_no_lang&#34;:348},&#34;/en/events/winter-alchemy-berlin/&#34;,&#34;/events/winter-alchemy-berlin/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:309,&#34;path_no_lang&#34;:309},&#34;November 19, 2025&#34;,{&#34;id&#34;:352,&#34;fullPath&#34;:353,&#34;path&#34;:354,&#34;title&#34;:355,&#34;structure&#34;:356,&#34;siblings&#34;:377,&#34;slug&#34;:380,&#34;i18n&#34;:381,&#34;date&#34;:386,&#34;order&#34;:51},1217,&#34;https://apiicggallery.irisceramicagroup.com/eventi/controtempo-milano/&#34;,&#34;/eventi/controtempo-milano/&#34;,&#34;Controtempo - Milano&#34;,{&#34;sections&#34;:357,&#34;seo_meta&#34;:364,&#34;preview&#34;:367},[358],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:359},[360,362],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:361},&#34;\u003Cp&gt;Il 25 novembre la\u003Cstrong&gt; MJ Casa Milano \u003C/strong&gt;ospita\u003Cstrong&gt; “Controtempo – Jazz Experience”\u003C/strong&gt;: il nuovo appuntamento all’insegna della musica Jazz e della convivialità.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:363,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Per una sera lo showroom si trasformerà in un luogo di incontro e dialogo in un’atmosfera raffinata.  Le note Jazz di \u003Cstrong&gt;Samantha Iorio e la sua band\u003C/strong&gt; animeranno la serata accompagnando il pubblico in un’esperienza coinvolgente e divertente. Le sonorità eleganti e calde del jazz si fonderanno con lo spazio della MJ Casa, dando vita a un evento capace di unire \u003Cstrong&gt;arte, design ed emozione\u003C/strong&gt; \u003Cstrong&gt;grazie alla musica live.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Un’occasione speciale per lasciarsi trasportare dalle vibrazioni del Jazz, seguita da un piacevole apericena.\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:365,&#34;twitter&#34;:366},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:368,&#34;title&#34;:374,&#34;excerpt&#34;:375,&#34;type&#34;:130,&#34;date&#34;:376,&#34;city&#34;:132,&#34;hour&#34;:217,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:369,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:370,&#34;filesize&#34;:371,&#34;url&#34;:372,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:373},&#34;Controtempo-2025_The-Magical-Journey-DDW-quadrato-1-1.jpg&#34;,336673,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/10/Controtempo-2025_The-Magical-Journey-DDW-quadrato-1-1.jpg&#34;,[],&#34;ICG GALLERY MILANO OSPITA “CONTROTEMPO – JAZZ EXPERIENCE”&#34;,&#34;\u003Cp&gt;Il 25 novembre la MJ Casa Milano si anima all’insegna delle eleganti note Jazz di Samantha Iorio e la sua band.\u003C/p&gt;\n&#34;,&#34;25.11.2025&#34;,{&#34;prev&#34;:378,&#34;next&#34;:379},[],[],&#34;controtempo-milano&#34;,[382,385],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:383,&#34;path_no_lang&#34;:384},&#34;/en/events/controtempo-milano/&#34;,&#34;/events/controtempo-milano/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:354,&#34;path_no_lang&#34;:354},&#34;October 31, 2025&#34;,{&#34;id&#34;:388,&#34;fullPath&#34;:389,&#34;path&#34;:390,&#34;title&#34;:391,&#34;structure&#34;:392,&#34;siblings&#34;:418,&#34;slug&#34;:421,&#34;i18n&#34;:422,&#34;date&#34;:427,&#34;order&#34;:51},1192,&#34;https://apiicggallery.irisceramicagroup.com/eventi/inaugurazione-showroom-di-marbella/&#34;,&#34;/eventi/inaugurazione-showroom-di-marbella/&#34;,&#34;Inaugurazione Showroom di Marbella&#34;,{&#34;sections&#34;:393,&#34;seo_meta&#34;:404,&#34;preview&#34;:407},[394],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:395},[396,398,402],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:397},&#34;\u003Cp data-start=\&#34;39\&#34; data-end=\&#34;134\&#34;&gt;Iris Ceramica Group apre una nuova MJ Casa a Marbella, rafforzando la propria rete in Spagna\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:400,&#34;col_right&#34;:401},&#34;double&#34;,&#34;\u003Cp data-start=\&#34;136\&#34; data-end=\&#34;482\&#34;&gt;Iris Ceramica Group annuncia l’apertura di una nuova MJ Casa a Marbella, che va ad ampliare la rete di showroom del Gruppo in Spagna affiancandosi alle sedi già operative di Barcellona e Madrid. La nuova location inaugura il 20 novembre lungo l’arteria principale della città, polo di riferimento per l’architettura, il design e il lifestyle di alta gamma della Costa del Sol.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;La MJ Casa è progettata come spazio esperienziale, dove le superfici ceramiche naturali high-tech diventano narrazione concreta dei valori del Gruppo: sostenibilità, innovazione, ricerca e cultura del progetto. Uno spazio che supera il concetto tradizionale di showroom trasformandosi in luogo di conoscenza, ispirazione e relazione.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:403,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Carticle class=\&#34;text-token-text-primary w-full focus:outline-none [--shadow-height:45px] has-data-writing-block:pointer-events-none has-data-writing-block:-mt-(--shadow-height) has-data-writing-block:pt-(--shadow-height) [&amp;amp;:has([data-writing-block])&amp;gt;*]:pointer-events-auto scroll-mt-(--header-height)\&#34; dir=\&#34;auto\&#34; tabindex=\&#34;-1\&#34; data-turn-id=\&#34;16954095-4a24-4505-892e-035e15d0d8d6\&#34; data-testid=\&#34;conversation-turn-7\&#34; data-scroll-anchor=\&#34;false\&#34; data-turn=\&#34;user\&#34;&gt;\n\u003Cdiv class=\&#34;text-base my-auto mx-auto pt-12 [--thread-content-margin:--spacing(4)] thread-sm:[--thread-content-margin:--spacing(6)] thread-lg:[--thread-content-margin:--spacing(16)] px-(--thread-content-margin)\&#34;&gt;\n\u003Cdiv class=\&#34;[--thread-content-max-width:40rem] thread-lg:[--thread-content-max-width:48rem] mx-auto max-w-(--thread-content-max-width) flex-1 group/turn-messages focus-visible:outline-hidden relative flex w-full min-w-0 flex-col\&#34; tabindex=\&#34;-1\&#34;&gt;\n\u003Cdiv class=\&#34;flex max-w-full flex-col grow\&#34;&gt;\n\u003Cdiv class=\&#34;min-h-8 text-message relative flex w-full flex-col items-end gap-2 text-start break-words whitespace-normal [.text-message+&amp;amp;]:mt-1\&#34; dir=\&#34;auto\&#34; data-message-author-role=\&#34;user\&#34; data-message-id=\&#34;16954095-4a24-4505-892e-035e15d0d8d6\&#34;&gt;\n\u003Cdiv class=\&#34;flex w-full flex-col gap-1 empty:hidden items-end rtl:items-start\&#34;&gt;\n\u003Cdiv class=\&#34;user-message-bubble-color relative rounded-[18px] px-4 py-1.5 data-[multiline]:py-3 max-w-[var(--user-chat-width,70%)]\&#34; data-multiline=\&#34;\&#34;&gt;\n\u003Cdiv class=\&#34;whitespace-pre-wrap\&#34;&gt;Marbella, incastonata nel cuore della Costa del Sol, è sinonimo di eleganza architettonica e design contemporaneo. La scelta strategica di questa città risponde alla crescente domanda di soluzioni innovative per progetti residenziali e commerciali di prestigio, rivolti a una clientela internazionale attenta a qualità e tecnologia.\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/article&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:405,&#34;twitter&#34;:406},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:408,&#34;title&#34;:391,&#34;excerpt&#34;:397,&#34;type&#34;:130,&#34;date&#34;:416,&#34;city&#34;:295,&#34;hour&#34;:417,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:409,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:410,&#34;filesize&#34;:411,&#34;url&#34;:412,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:413,&#34;width&#34;:414,&#34;height&#34;:414,&#34;sizes&#34;:415},&#34;Coming-soon-1.png&#34;,3692021,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/10/Coming-soon-1.png&#34;,&#34;png&#34;,1814,[],&#34;20.11.2025&#34;,&#34;19:30&#34;,{&#34;prev&#34;:419,&#34;next&#34;:420},[],[],&#34;inaugurazione-showroom-di-marbella&#34;,[423,426],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:424,&#34;path_no_lang&#34;:425},&#34;/en/events/opening-showroom-marbella/&#34;,&#34;/events/opening-showroom-marbella/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:390,&#34;path_no_lang&#34;:390},&#34;October 29, 2025&#34;,{&#34;id&#34;:429,&#34;fullPath&#34;:430,&#34;path&#34;:431,&#34;title&#34;:432,&#34;structure&#34;:433,&#34;siblings&#34;:462,&#34;slug&#34;:465,&#34;i18n&#34;:466,&#34;date&#34;:386,&#34;order&#34;:51},1209,&#34;https://apiicggallery.irisceramicagroup.com/eventi/metamorphosis-the-unseen-is-the-real-story-berlin/&#34;,&#34;/eventi/metamorphosis-the-unseen-is-the-real-story-berlin/&#34;,&#34;METAMORPHOSIS – THE UNSEEN IS THE REAL STORY - Berlin&#34;,{&#34;sections&#34;:434,&#34;seo_meta&#34;:448,&#34;preview&#34;:451},[435],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:436},[437,439,441,443,446],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:438},&#34;\u003Cp&gt;Il \u003Cstrong&gt;20 novembre\u003C/strong&gt;, Iris Ceramica Group invita il pubblico a vivere un’esperienza multisensoriale nella \u003Cstrong&gt;MJ Casa di Berlino\u003C/strong&gt;: un viaggio in cui ciò che appare è molto più di come sembra. Le superfici si trasformano davanti agli occhi del visitatore — non è magia, ma tecnologia d’avanguardia applicata alla materia ceramica.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:440,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Nel raffinato spazio della MJ Casa, la metamorfosi si realizza in un’esperienza culinaria immersiva. Il cibo diventa linguaggio sensoriale: sollecita e diverte la vista, gioca con le consistenze e i suoni, porta alla luce emozioni nascoste e avvolge nell’incanto della trasformazione, guidati dalle mani sapienti di una chef-alchimista.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:442,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Dopo il successo ottenuto al Fuorisalone di Milano e alla London Design Week, la MJ Casa presenta anche a Berlino \u003Cem&gt;\u003Cstrong&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/strong&gt;\u003C/em&gt;: l’innovativa tecnologia &amp;#8211; sviluppata da VBH e integrata con le superfici ceramiche dei brand del Gruppo &amp;#8211; che permette di rendere invisibile un sistema audio-video ad alta definizione, mimetizzando il monitor con la superficie ceramica che diventa anche cassa di risonanza per i suoni. Le superfici, quindi, contengono il monitor che appare e scompare a comando e nascondono casse audio amplificandone l&amp;#8217;effetto.\u003Cbr /&gt;\nUn nuovo esempio del concetto di \u003Cem&gt;\u003Cstrong&gt;beautility\u003C/strong&gt;\u003C/em&gt; — la perfetta fusione tra bellezza e funzionalità — che ridefinisce l’esperienza del design d’interni di lusso.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:444,&#34;col_right&#34;:445},&#34;\u003Cp&gt;A completare l’esperienza, le \u003Cstrong&gt;videoinstallazioni evocative\u003C/strong&gt; della visual artist \u003Cstrong&gt;Lorenza Liguori\u003C/strong&gt; arricchiscono l’effetto immersivo di questa innovazione tecnologica, dando vita a mondi astratti e al tempo stesso realistici.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Con \u003Cstrong&gt;Metamorphosis\u003C/strong&gt;, la MJ Casa offre ai visitatori un’esperienza unica in cui nulla è come sembra: una visione che intreccia \u003Cstrong&gt;arte, design e tecnologia\u003C/strong&gt;, celebrando la continua trasformazione della materia.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:447,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;20 novembre\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;Dalle 18:00 alle 22:00\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;MJ Casa – Auguststraße 6, 10117 Berlino\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Partecipazione solo su invito\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:449,&#34;twitter&#34;:450},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:452,&#34;title&#34;:460,&#34;excerpt&#34;:461,&#34;type&#34;:130,&#34;date&#34;:416,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:453,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:454,&#34;filesize&#34;:455,&#34;url&#34;:456,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:457,&#34;height&#34;:458,&#34;sizes&#34;:459},&#34;grafiche_Metamorphosis_Berlin_Post.jpg&#34;,2861823,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/10/grafiche_Metamorphosis_Berlin_Post.jpg&#34;,2500,3125,[],&#34;METAMORPHOSIS – THE UNSEEN IS THE REAL STORY&#34;,&#34;\u003Cp&gt;Il 20 novembre, Iris Ceramica Group invita il pubblico a vivere un’esperienza multisensoriale nella MJ Casa di Berlino.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:463,&#34;next&#34;:464},[],[],&#34;metamorphosis-the-unseen-is-the-real-story-berlin&#34;,[467,470],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:468,&#34;path_no_lang&#34;:469},&#34;/en/events/metamorphosis-the-unseen-is-the-real-story-berlin/&#34;,&#34;/events/metamorphosis-the-unseen-is-the-real-story-berlin/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:431,&#34;path_no_lang&#34;:431},{&#34;id&#34;:472,&#34;fullPath&#34;:473,&#34;path&#34;:474,&#34;title&#34;:475,&#34;structure&#34;:476,&#34;siblings&#34;:498,&#34;slug&#34;:501,&#34;i18n&#34;:502,&#34;date&#34;:507,&#34;order&#34;:51},1246,&#34;https://apiicggallery.irisceramicagroup.com/eventi/winter-alchemy-londra/&#34;,&#34;/eventi/winter-alchemy-londra/&#34;,&#34;Winter Alchemy - Londra&#34;,{&#34;sections&#34;:477,&#34;seo_meta&#34;:486,&#34;preview&#34;:489},[478],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:479},[480,482,484],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:481},&#34;\u003Cp&gt;Il 12 novembre la MJ Casa di Londra accoglie un evento conviviale per inaugurare la stagione invernale. A cornice, l’opera sulla vetrina firmata Jessica Rose Bird.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:483,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Il 12 novembre la MJ Casa di Old Street ospita Winter Alchemy, un momento conviviale per accogliere insieme la stagione invernale. Durante la serata sarà possibile ammirare l’illustrazione realizzata dall&amp;#8217;artista Jessica Rose Bird per le due vetrine della Gallery.\u003C/p&gt;\n\u003Cp&gt;L&amp;#8217;opera, caratterizzata dal suo stile riconoscibile di linee a carboncino reinterpretate nella pittura, sa di moda e contemporaneità: una volpe delle nevi “che cambia il proprio manto con le stagioni, si muove attraverso una città e un paesaggio in transizione. Una città al chiaro di luna, viene trasformata dalla neve che cade, mentre le tradizionali stelle della festa e i fiori rossi tipici del periodo, riscaldano il cuore dell’inverno “. – racconta l’artista.\u003C/p&gt;\n\u003Cp&gt;L’opera Winter Alchemy rientra nell’omonimo progetto a cui hanno preso parte, in occasione delle festività invernali, tutte le MJ Casa europee: Milano, Parigi, Londra, Berlino e Marbella, danno vita a un viaggio magico che trasforma le vetrine degli showroom metaforicamente in oro, affidandosi alla creatività di cinque artiste internazionali chiamate a raccontare &amp;#8211; con il proprio linguaggio e stile artistico &amp;#8211; il concept The Magical Journey, per interpretare lo spirito delle festività attraverso il tema della trasformazione alchemica.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:485,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:246},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:487,&#34;twitter&#34;:488},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:490,&#34;title&#34;:475,&#34;excerpt&#34;:481,&#34;type&#34;:130,&#34;date&#34;:496,&#34;city&#34;:497,&#34;hour&#34;:217,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:491,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:492,&#34;filesize&#34;:493,&#34;url&#34;:494,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:495},&#34;Graphics_2025_Winter-Alchemy_v3_news-gallery-Londra.jpg&#34;,480432,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/11/Graphics_2025_Winter-Alchemy_v3_news-gallery-Londra.jpg&#34;,[],&#34;12.11.2025&#34;,&#34;londra&#34;,{&#34;prev&#34;:499,&#34;next&#34;:500},[],[],&#34;winter-alchemy-londra&#34;,[503,506],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:504,&#34;path_no_lang&#34;:505},&#34;/en/events/winter-alchemy-london/&#34;,&#34;/events/winter-alchemy-london/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:474,&#34;path_no_lang&#34;:474},&#34;November 21, 2025&#34;,{&#34;id&#34;:509,&#34;fullPath&#34;:510,&#34;path&#34;:511,&#34;title&#34;:512,&#34;structure&#34;:513,&#34;siblings&#34;:547,&#34;slug&#34;:550,&#34;i18n&#34;:551,&#34;date&#34;:556,&#34;order&#34;:51},1174,&#34;https://apiicggallery.irisceramicagroup.com/eventi/dubai-design-week-2025/&#34;,&#34;/eventi/dubai-design-week-2025/&#34;,&#34;Dubai Design Week 2025&#34;,{&#34;sections&#34;:514,&#34;seo_meta&#34;:532,&#34;preview&#34;:535},[515],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:516},[517,519,521,524,526,530],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:518},&#34;\u003Cp&gt;\u003Cstrong&gt;THE MAGICAL JOURNEY CONTINUA A DUBAI\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:520,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Dal 4 al 9 novembre, The Magical Journey sarà presente alla Dubai Design Week, nello spazio pop-up della nuova MJ Casa – la cui apertura ufficiale è prevista per febbraio 2026.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:522,&#34;col_right&#34;:523},&#34;\u003Cp&gt;Nel Dubai Design District (Building 6, Suite B101), nel nuovo showroom del Gruppo, sarà visitabile per tutta la Design Week un’installazione artistica immersiva: un viaggio magico in tre tappe – verso una nuova percezione della materia ceramica – che riprende il concept lanciato al Cersaie, presentandolo attraverso una nuova esperienza di video morphing.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Nella prima fase \u003Cem data-start=\&#34;778\&#34; data-end=\&#34;788\&#34;&gt;Breaking\u003C/em&gt;, la materia si scompone, si dissolve e cambia forma. La seconda fase è un atto di purificazione che consente di allontanarsi dai concetti tradizionali ed elevare la percezione della materia: \u003Cem data-start=\&#34;980\&#34; data-end=\&#34;989\&#34;&gt;Glowing\u003C/em&gt;. Infine, nella fase \u003Cem data-start=\&#34;1010\&#34; data-end=\&#34;1021\&#34;&gt;Revealing\u003C/em&gt; si prende coscienza del processo e del cambiamento, osservando un nuovo modo di guardare e interpretare la materia.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:525,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;1139\&#34; data-end=\&#34;1380\&#34;&gt;Il viaggio è reale, vissuto in prima persona immergendosi nel video morphing digitale dell’artista visiva Lorenza Liguori, che ha interpretato il viaggio magico nelle sue tre fasi di trasformazione, partendo da una superficie ceramica unica.\u003C/p&gt;\n\u003Cp data-start=\&#34;1382\&#34; data-end=\&#34;1744\&#34;&gt;Al termine del percorso immersivo si accede alla Gallery di Dubai, allestita per l’occasione in versione pop-up come anteprima del concept definitivo dello showroom. Un nuovo spazio che si aggiunge a quelli già presenti nelle principali capitali mondiali del design, dell’arte e della moda, tra cui Milano, Londra, Parigi, Berlino, Madrid, Barcellona e New York.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:527,&#34;external_link&#34;:528,&#34;file&#34;:34,&#34;label&#34;:529},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/dubai-design-week/&#34;,&#34;Iscriviti&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:531,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong data-start=\&#34;1751\&#34; data-end=\&#34;1772\&#34;&gt;MJ Casa DUBAI\u003C/strong&gt;\u003Cbr data-start=\&#34;1772\&#34; data-end=\&#34;1775\&#34; /&gt;Dubai Design District – Building 6, Suite B101 \u003Cbr data-start=\&#34;1822\&#34; data-end=\&#34;1825\&#34; /&gt;4–8 novembre: 10.00 – 20.00\u003Cbr data-start=\&#34;1852\&#34; data-end=\&#34;1855\&#34; /&gt;9 novembre: solo su appuntamento\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:533,&#34;twitter&#34;:534},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:536,&#34;title&#34;:543,&#34;excerpt&#34;:544,&#34;type&#34;:130,&#34;date&#34;:545,&#34;city&#34;:546,&#34;hour&#34;:133,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:537,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:538,&#34;filesize&#34;:539,&#34;url&#34;:540,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:541,&#34;height&#34;:541,&#34;sizes&#34;:542},&#34;Graphics_DDW_2025-v2_The-Magical-Journey-DDW-quadrato-1-1.jpg&#34;,162803,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/10/Graphics_DDW_2025-v2_The-Magical-Journey-DDW-quadrato-1-1.jpg&#34;,1080,[],&#34;THE MAGICAL JOURNEY CONTINUA ALLA DUBAI DESIGN WEEK&#34;,&#34;\u003Cp&gt;Dal 4 al 9 novembre, il viaggio magico iniziato al Cersaie farà tappa alla Dubai Design Week, nello spazio pop-up della nuova MJ Casa.\u003C/p&gt;\n&#34;,&#34;04.11.2025&#34;,&#34;dubai&#34;,{&#34;prev&#34;:548,&#34;next&#34;:549},[],[],&#34;dubai-design-week-2025&#34;,[552,555],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:553,&#34;path_no_lang&#34;:554},&#34;/en/events/dubai-design-week-2025/&#34;,&#34;/events/dubai-design-week-2025/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:511,&#34;path_no_lang&#34;:511},&#34;October 28, 2025&#34;,{&#34;id&#34;:558,&#34;fullPath&#34;:559,&#34;path&#34;:560,&#34;title&#34;:561,&#34;structure&#34;:562,&#34;siblings&#34;:585,&#34;slug&#34;:588,&#34;i18n&#34;:589,&#34;date&#34;:594,&#34;order&#34;:51},1126,&#34;https://apiicggallery.irisceramicagroup.com/eventi/la-icg-gallery-di-londra-presenta-il-nuovo-libro-di-fotografia-architettonica-di-richard-bryant/&#34;,&#34;/eventi/la-icg-gallery-di-londra-presenta-il-nuovo-libro-di-fotografia-architettonica-di-richard-bryant/&#34;,&#34;LA ICG GALLERY DI LONDRA PRESENTA IL NUOVO LIBRO DI FOTOGRAFIA ARCHITETTONICA DI RICHARD BRYANT&#34;,{&#34;sections&#34;:563,&#34;seo_meta&#34;:570,&#34;preview&#34;:573},[564],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:565},[566,568],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:567},&#34;\u003Cp&gt;\u003Cstrong&gt;LA ICG GALLERY DI LONDRA PRESENTA IL NUOVO LIBRO DI FOTOGRAFIA ARCHITETTONICA DI RICHARD BRYANT\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Il 29 ottobre si terrà l’evento “In Conversation with Richard Bryant”, un’occasione per presentare il nuovo libro del fotografo inglese in un talk con Jonathan Glensey e i co-autori del libro.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:569,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Fotografia\u003C/strong&gt;, \u003Cstrong&gt;architettura\u003C/strong&gt; e \u003Cstrong&gt;processo creativo\u003C/strong&gt; saranno i temi della serata alla MJ Casa di Londra, dove \u003Cstrong&gt;Jonathan Glancey\u003C/strong&gt;, critico e scrittore di architettura precedentemente corrispondente per il The Guardian, intervisterà \u003Cstrong&gt;Richard Bryant\u003C/strong&gt;, uno dei più celebri fotografi di architettura contemporanea, per il lancio del suo \u003Cstrong&gt;ultimo libro di fotografia architettonica\u003C/strong&gt;.\u003C/p&gt;\n\u003Cp&gt;Il nuovo libro dal titolo “\u003Cstrong&gt;\u003Cem&gt;Richard Bryant\u003C/em&gt;\u003C/strong&gt;” è scritto da \u003Cstrong&gt;Valeria Carullo\u003C/strong&gt;, curatrice di fotografia al Royal Institute of British Atchitecture (RIBA), e \u003Cstrong&gt;Martin Caiger-Smith\u003C/strong&gt;, direttore o coordinatore del master “Curating the Art Museum” presso il Courtauld Institute of Art, e pubblicato dalla casa editrice \u003Cstrong&gt;Lundh Humpries\u003C/strong&gt;, editore indipendente di lunga data specializzato in arte, architettura e design.\u003C/p&gt;\n\u003Cp&gt;Consiste nella \u003Cstrong&gt;prima retrospettiva\u003C/strong&gt; sul celebre fotografo che rivela come, in seguito al passaggio generale dal bianco e nero al colore, il suo lavoro abbia continuato a definire l&amp;#8217;immagine dell&amp;#8217;architettura degli anni Novanta. Attraverso le pagine del libro, gli autori esaminano \u003Cstrong&gt;la sua\u003C/strong&gt; \u003Cstrong&gt;carriera e i suoi interessi\u003C/strong&gt;, inseriscono il suo lavoro in un \u003Cstrong&gt;contesto più ampio\u003C/strong&gt;, illustrando anche i cambiamenti avvenuti negli ultimi cinque decenni sia nella \u003Cstrong&gt;professione di architetto\u003C/strong&gt; sia nella \u003Cstrong&gt;fotografia come medium.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;La \u003Cstrong&gt;serata\u003C/strong&gt; sarà aperta da un \u003Cstrong&gt;intervento dei co-autori del libro\u003C/strong&gt;, Valeria Carullo e dall’architetto Eva Jiricna -autrice della prefazione al libro- che precederà \u003Cstrong&gt;l’interessante conversazione\u003C/strong&gt; tra Jonathan Glancey e Richard Bryant, di fronte a una platea di appassionati e sostenitori del lavoro del fotografo.\u003C/p&gt;\n\u003Cp&gt;L’evento sarà \u003Cstrong&gt;un’occasione preziosa\u003C/strong&gt; \u003Cstrong&gt;per riflettere\u003C/strong&gt; sia sul processo creativo legato alla fotografia architettonica, sia su come questo \u003Cstrong&gt;settore stia cambiando negli ultimi decenni\u003C/strong&gt;, confermando ancora una volta il ruolo della \u003Cstrong&gt;MJ Casa di Londra\u003C/strong&gt; come \u003Cstrong&gt;luogo d’incontro e dialogo\u003C/strong&gt; nel contesto della capitale britannica.\u003C/p&gt;\n\u003Cp&gt;\u003Cem&gt;L’evento è privato su invito.\u003C/em&gt;\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:571,&#34;twitter&#34;:572},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:574,&#34;title&#34;:581,&#34;excerpt&#34;:582,&#34;type&#34;:130,&#34;date&#34;:583,&#34;city&#34;:497,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:575,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:576,&#34;filesize&#34;:577,&#34;url&#34;:578,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:579,&#34;height&#34;:579,&#34;sizes&#34;:580},&#34;Invito_Richard-Bryant_1200x1200px.jpg&#34;,252103,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/10/Invito_Richard-Bryant_1200x1200px.jpg&#34;,1200,[],&#34;Presentazione del nuovo libro di fotografia architettonica di Richard Bryant&#34;,&#34;\u003Cp&gt;Il 29 ottobre si terrà l’evento “In Conversation with Richard Bryant”, un’occasione per presentare il nuovo libro del fotografo inglese in un talk con Jonathan Glensey e i co-autori del libro.\u003C/p&gt;\n&#34;,&#34;29.10.2025&#34;,null,{&#34;prev&#34;:586,&#34;next&#34;:587},[],[],&#34;la-icg-gallery-di-londra-presenta-il-nuovo-libro-di-fotografia-architettonica-di-richard-bryant&#34;,[590,593],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:591,&#34;path_no_lang&#34;:592},&#34;/en/events/the-london-icg-gallery-presents-richard-bryants-new-book-on-architectural-photography/&#34;,&#34;/events/the-london-icg-gallery-presents-richard-bryants-new-book-on-architectural-photography/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:560,&#34;path_no_lang&#34;:560},&#34;October 15, 2025&#34;,{&#34;id&#34;:596,&#34;fullPath&#34;:597,&#34;path&#34;:598,&#34;title&#34;:599,&#34;structure&#34;:600,&#34;siblings&#34;:626,&#34;slug&#34;:629,&#34;i18n&#34;:630,&#34;date&#34;:427,&#34;order&#34;:51},1187,&#34;https://apiicggallery.irisceramicagroup.com/eventi/inaugurazione-showroom-di-valencia/&#34;,&#34;/eventi/inaugurazione-showroom-di-valencia/&#34;,&#34;Inaugurazione Showroom di Valencia&#34;,{&#34;sections&#34;:601,&#34;seo_meta&#34;:611,&#34;preview&#34;:614},[602],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:603},[604,606,609],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:605},&#34;\u003Cp&gt;\u003Cstrong&gt;Iris Ceramica Group amplia la propria presenza in Spagna con l’apertura della nuova MJ Casa a Valencia\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:607,&#34;col_right&#34;:608},&#34;\u003Cp&gt;Iris Ceramica Group annuncia una nuova importante tappa del proprio percorso di crescita in Spagna con l’apertura della MJ Casa di Valencia, che si aggiunge agli showroom già attivi a Barcellona e Madrid. La nuova location inaugura il 22 ottobre nella prestigiosa Gran Via, cuore pulsante del design internazionale dove i principali brand del settore espongono le proprie collezioni.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;La MJ Casa è concepita per essere molto più di uno showroom di superfici ceramiche naturali di alta gamma: è un luogo dove fare esperienza della materia e dei valori del Gruppo in forma tangibile e virtuale. Qui la sostenibilità, l&amp;#8217;innovazione e l&amp;#8217;eccellenza qualitativa trovano espressione concreta attraverso spazi pensati per narrare ricerca, tecnologia e cultura del progetto.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:610,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;1025\&#34; data-end=\&#34;1433\&#34;&gt;L’apertura di Valencia consolida ulteriormente la presenza di Iris Ceramica Group in uno dei mercati più dinamici e ricettivi d’Europa. Terza città della Spagna e capitale del design mediterraneo, Valencia è un punto di riferimento strategico. La scelta della Gran Via sottolinea la volontà del Gruppo di dialogare con un pubblico di professionisti esigenti e sensibili all’eccellenza estetica e tecnologica.\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:612,&#34;twitter&#34;:613},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:615,&#34;title&#34;:599,&#34;excerpt&#34;:623,&#34;type&#34;:130,&#34;date&#34;:624,&#34;city&#34;:625,&#34;hour&#34;:417,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:616,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:617,&#34;filesize&#34;:618,&#34;url&#34;:619,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:620,&#34;height&#34;:621,&#34;sizes&#34;:622},&#34;45A0727.jpg&#34;,8200913,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/10/45A0727.jpg&#34;,3563,5344,[],&#34;\u003Cp&gt;Iris Ceramica Group amplia la propria presenza in Spagna con l’apertura della nuova MJ Casa a Valencia\u003C/p&gt;\n&#34;,&#34;22.10.2025&#34;,&#34;valencia&#34;,{&#34;prev&#34;:627,&#34;next&#34;:628},[],[],&#34;inaugurazione-showroom-di-valencia&#34;,[631,634],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:632,&#34;path_no_lang&#34;:633},&#34;/en/events/inaugurazione-showroom-di-valencia/&#34;,&#34;/events/inaugurazione-showroom-di-valencia/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:598,&#34;path_no_lang&#34;:598},{&#34;id&#34;:636,&#34;fullPath&#34;:637,&#34;path&#34;:638,&#34;title&#34;:639,&#34;structure&#34;:640,&#34;siblings&#34;:750,&#34;slug&#34;:753,&#34;i18n&#34;:754,&#34;date&#34;:594,&#34;order&#34;:51},1085,&#34;https://apiicggallery.irisceramicagroup.com/eventi/traces-flavours/&#34;,&#34;/eventi/traces-flavours/&#34;,&#34;Traces &amp; Flavours&#34;,{&#34;sections&#34;:641,&#34;seo_meta&#34;:736,&#34;preview&#34;:739},[642],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:643},[644,646,648,651,653],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:645},&#34;\u003Cp&gt;“TRACES &amp;amp; FLAVOURS” FA TAPPA ALLA ICG GALLERY DI MILANO\u003C/p&gt;\n\u003Cp&gt;Il viaggio di “Traces &amp;amp; Flavours” continua a ottobre: dopo Berlino e Londra, anche lo showroom di Milano diventa il palcoscenico di una sinfonia creativa tra arte, gastronomia e design con Idan Gilony.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:647,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Carticle class=\&#34;text-token-text-primary w-full focus:outline-none scroll-mt-(--header-height)\&#34; dir=\&#34;auto\&#34; tabindex=\&#34;-1\&#34; data-turn-id=\&#34;1ccb892a-63c0-403d-89a5-ca2fcb31e323\&#34; data-testid=\&#34;conversation-turn-3\&#34; data-scroll-anchor=\&#34;false\&#34; data-turn=\&#34;user\&#34;&gt;\n\u003Cdiv class=\&#34;text-base my-auto mx-auto pt-12 [--thread-content-margin:--spacing(4)] thread-sm:[--thread-content-margin:--spacing(6)] thread-lg:[--thread-content-margin:--spacing(16)] px-(--thread-content-margin)\&#34;&gt;\n\u003Cdiv class=\&#34;[--thread-content-max-width:40rem] thread-sm:[--thread-content-max-width:40rem] thread-lg:[--thread-content-max-width:48rem] mx-auto max-w-(--thread-content-max-width) flex-1 group/turn-messages focus-visible:outline-hidden relative flex w-full min-w-0 flex-col\&#34; tabindex=\&#34;-1\&#34;&gt;\n\u003Cdiv class=\&#34;flex max-w-full flex-col grow\&#34;&gt;\n\u003Cdiv class=\&#34;min-h-8 text-message relative flex w-full flex-col items-end gap-2 text-start break-words whitespace-normal [.text-message+&amp;amp;]:mt-5\&#34; dir=\&#34;auto\&#34; data-message-author-role=\&#34;user\&#34; data-message-id=\&#34;1ccb892a-63c0-403d-89a5-ca2fcb31e323\&#34;&gt;\n\u003Cdiv class=\&#34;flex w-full flex-col gap-1 empty:hidden items-end rtl:items-start\&#34;&gt;\n\u003Cdiv class=\&#34;user-message-bubble-color relative rounded-[18px] px-4 py-1.5 data-[multiline]:py-3 max-w-[var(--user-chat-width,70%)]\&#34; data-multiline=\&#34;\&#34;&gt;\n\u003Cdiv class=\&#34;whitespace-pre-wrap\&#34;&gt;Il 15 ottobre la MJ Casa di Milano accoglie “Traces &amp;amp; Flavours”, lo straordinario evento ideato dall’artista, designer e direttore creativo berlinese Idan Gilony.\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003Cdiv class=\&#34;flex justify-end\&#34;&gt;\u003C/div&gt;\n\u003C/div&gt;\n\u003C/div&gt;\n\u003C/article&gt;\n\u003Carticle class=\&#34;text-token-text-primary w-full focus:outline-none scroll-mt-[calc(var(--header-height)+min(200px,max(70px,20svh)))]\&#34; dir=\&#34;auto\&#34; tabindex=\&#34;-1\&#34; data-turn-id=\&#34;request-WEB:0f5b4683-9450-45d0-a626-fc5bdcc36857-1\&#34; data-testid=\&#34;conversation-turn-4\&#34; data-scroll-anchor=\&#34;false\&#34; data-turn=\&#34;assistant\&#34;&gt;\n\u003Ch6 class=\&#34;sr-only\&#34;&gt;\u003C/h6&gt;\n\u003C/article&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:647,&#34;col_left&#34;:649,&#34;col_right&#34;:650},&#34;\u003Cp&gt;Durante la serata, gli ospiti saranno guidati in un percorso immersivo che intreccia arte, gastronomia ed espressioni creative, trasformando la cena in un’esperienza unica, quasi magica: un viaggio culinario che prende vita attraverso una performance gastronomica irripetibile.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Le superfici dei brand di Iris Ceramica Group saranno parte integrante della narrazione: il palcoscenico sensoriale della serata, dove cibo e design si fondono. In particolare, i top Sapienstone, resi eco-attivi grazie alla tecnologia Active Surfaces® arricchiranno la performance, coniugando estetica raffinata e prestazioni elevate.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:652,&#34;col_left&#34;:649,&#34;col_right&#34;:650},&#34;\u003Cp&gt;La serata sarà un’occasione unica e coinvolgente, in cui gli ospiti avranno un ruolo centrale, contribuendo attivamente nella creazione dell’opera finale.\u003C/p&gt;\n\u003Cp&gt;15 ottobre 2025\u003C/p&gt;\n\u003Cp&gt;19:00\u003C/p&gt;\n\u003Cp&gt;MJ Casa Milano\u003C/p&gt;\n\u003Cp&gt;Via Santa Margherita, 4\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:655},&#34;SectionSlider&#34;,[656,672,684,692,702,711,719,728],{&#34;ID&#34;:657,&#34;id&#34;:657,&#34;title&#34;:658,&#34;filename&#34;:659,&#34;filesize&#34;:660,&#34;url&#34;:661,&#34;link&#34;:662,&#34;alt&#34;:29,&#34;author&#34;:663,&#34;description&#34;:29,&#34;caption&#34;:658,&#34;name&#34;:664,&#34;status&#34;:665,&#34;uploaded_to&#34;:636,&#34;date&#34;:666,&#34;modified&#34;:666,&#34;menu_order&#34;:51,&#34;mime_type&#34;:667,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;icon&#34;:668,&#34;width&#34;:669,&#34;height&#34;:670,&#34;sizes&#34;:671},1107,&#34;https://freelanceeventsphotographer.co.uk/&#34;,&#34;DSC_6104.jpg&#34;,282616,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/09/DSC_6104.jpg&#34;,&#34;https://apiicggallery.irisceramicagroup.com/eventi/traces-flavours/https-freelanceeventsphotographer-co-uk-2/&#34;,&#34;3&#34;,&#34;https-freelanceeventsphotographer-co-uk-2&#34;,&#34;inherit&#34;,&#34;2025-09-15 15:25:59&#34;,&#34;image/jpeg&#34;,&#34;https://apiicggallery.irisceramicagroup.com/wp-includes/images/media/default.png&#34;,1365,2048,[],{&#34;ID&#34;:673,&#34;id&#34;:673,&#34;title&#34;:674,&#34;f 4;:132,&#34;hour&#34;:217,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:741,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:742,&#34;filesize&#34;:743,&#34;url&#34;:744,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:745,&#34;height&#34;:745,&#34;sizes&#34;:746},&#34;News_Gallery.jpg&#34;,1025265,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/10/News_Gallery.jpg&#34;,1201,[],&#34;“TRACES &amp; FLAVOURS” FA TAPPA ALLA ICG GALLERY DI MILANO&#34;,&#34;\u003Cp&gt;Il 15 ottobre la MJ Casa di Milano accoglie “Traces &amp;amp; Flavours”, lo straordinario evento ideato dall’artista, designer e direttore creativo berlinese Idan Gilony.\u003C/p&gt;\n&#34;,&#34;15.10.2025&#34;,{&#34;prev&#34;:751,&#34;next&#34;:752},[],[],&#34;traces-flavours&#34;,[755,758],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:756,&#34;path_no_lang&#34;:757},&#34;/en/events/traces-flavours/&#34;,&#34;/events/traces-flavours/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:638,&#34;path_no_lang&#34;:638},{&#34;id&#34;:760,&#34;fullPath&#34;:761,&#34;path&#34;:762,&#34;title&#34;:763,&#34;structure&#34;:764,&#34;siblings&#34;:797,&#34;slug&#34;:800,&#34;i18n&#34;:801,&#34;date&#34;:806,&#34;order&#34;:51},1064,&#34;https://apiicggallery.irisceramicagroup.com/eventi/magnetic-dreamscapes-berlino-09-25/&#34;,&#34;/eventi/magnetic-dreamscapes-berlino-09-25/&#34;,&#34;Magnetic Dreamscapes Berlino 09/25&#34;,{&#34;sections&#34;:765,&#34;seo_meta&#34;:783,&#34;preview&#34;:787},[766],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:767},[768,770,772,775,777,779,781],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:769},&#34;\u003Cp&gt;L´\u003Cstrong&gt;11 e il 12 settembre\u003C/strong&gt; alle ore \u003Cstrong&gt;18:00\u003C/strong&gt;, la MJ Casa di Berlino ospiterà \u003Cstrong&gt;Magnetic Dreamscapes\u003C/strong&gt;: un’esperienza immersiva basata sul concept di \u003Cstrong&gt;Attract®*\u003C/strong&gt;, la soluzione di posa magnetica a secco di \u003Cstrong&gt;Iris Ceramica Group\u003C/strong&gt;.\u003C/p&gt;\n\u003Cp&gt;Due serate tra arte, materia e immaginazione, dove la sperimentazione incontra la poesia visiva.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:771,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Giovedì 11/09 – 18.00 – 21.00\u003C/p&gt;\n\u003Cp&gt;Vernissage della Mostra &amp;#8220;The Invisible Pull&amp;#8221; di Alice Brumello Luise\u003C/p&gt;\n\u003Cp&gt;Workshop creativo con Performance live dell’artista\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n\u003Cp&gt;Venerdì 12/09 – 18.00 – 21.00\u003C/p&gt;\n\u003Cp&gt;Workshop Creativo di diorami onirici\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:773,&#34;external_link&#34;:774,&#34;file&#34;:34,&#34;label&#34;:160},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/magnetic-dreamscapes-berlin/&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:776,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;MOSTRA – “The Invisible Pull”di Alice Brunello Louise\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;È un‘installazione artistica mobile e sospesa, composta da \u003Cstrong&gt;collage fotografici fluttuanti\u003C/strong&gt; \u003Cstrong&gt;che esplorano il tema dell’attrazione\u003C/strong&gt; come forza invisibile — fisica, emotiva e spirituale. Il progetto riflette su ciò che ci attira silenziosamente: luoghi, emozioni, ricordi, legami. Le immagini mostrano \u003Cstrong&gt;paesaggi metafisici e vuoti contemplativi,\u003C/strong&gt; in cui il vuoto è parte integrante della composizione. Il movimento lento dei collage rende visibile l’energia che li connette, suggerendo la tensione costante tra avvicinamento e distanza. L’opera invita lo spettatore a perdersi in queste costellazioni sospese, seguendo la traccia sensibile di ciò che non si vede ma si sente.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:778,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;WORKSHOP CREATIVO di Diorama Onirici\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;I visitatori potranno partecipare a un game creativo creando dei \u003Cstrong&gt;“diorami”: mondi concettuali in miniatura pieni di infinite possibilità.\u003C/strong&gt; All’interno dello spazio definito di ciascun diorama, i confini della realtà si dissolvono. Questa trasformazione dello spazio incoraggia i partecipanti a esplorare la flessibilità della percezione e a creare paesaggi dinamici, quasi onirici che sfidano le aspettative stesse dello spettatore.\u003C/p&gt;\n\u003Cp&gt;Al termine dei workshop, sarà possibile immortalare il proprio paesaggio da sogno e portarlo a casa con sé, proprio come si fa con una fotografia di viaggio.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:780,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Magnetic Dreamscapes è un viaggio nell’estetica dell’attrazione, dove arte e tecnologia si fondono in esperienze sensoriali uniche.\u003Cbr /&gt;\nTi aspettiamo per due serate in cui potrai riscoprire il potere evocativo dell’immaginazione e portare con te un frammento del tuo paesaggio interiore.\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n\u003Cp&gt;*Magnetic laying system licensed by MagFace\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:782,&#34;external_link&#34;:774,&#34;file&#34;:34,&#34;label&#34;:160},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;title&#34;:784,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:785,&#34;twitter&#34;:786},&#34;ICG GALLERY BERLINO - MAGNETIC DREAMSCAPES&#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:788,&#34;title&#34;:794,&#34;excerpt&#34;:795,&#34;type&#34;:130,&#34;date&#34;:796,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:789,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:790,&#34;filesize&#34;:791,&#34;url&#34;:792,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:457,&#34;height&#34;:458,&#34;sizes&#34;:793},&#34;Invitation_Magnetic-Dreamscapes_BE3_Post.jpg&#34;,1095675,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/08/Invitation_Magnetic-Dreamscapes_BE3_Post.jpg&#34;,[],&#34;MAGNETIC DREAMSCAPES&#34;,&#34;\u003Cp&gt;L´11 e il 12 settembre alle ore 18:00, la MJ Casa di Berlino ospiterà Magnetic Dreamscapes. Due serate tra arte, materia e immaginazione, dove la sperimentazione incontra la poesia visiva.\u003C/p&gt;\n&#34;,&#34;11.09.2025&#34;,{&#34;prev&#34;:798,&#34;next&#34;:799},[],[],&#34;magnetic-dreamscapes-berlino-09-25&#34;,[802,805],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:803,&#34;path_no_lang&#34;:804},&#34;/en/events/magnetic-dreamscapes-berlino-09-25/&#34;,&#34;/events/magnetic-dreamscapes-berlino-09-25/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:762,&#34;path_no_lang&#34;:762},&#34;August 1, 2025&#34;,{&#34;id&#34;:808,&#34;fullPath&#34;:809,&#34;path&#34;:810,&#34;title&#34;:811,&#34;structure&#34;:812,&#34;siblings&#34;:843,&#34;slug&#34;:846,&#34;i18n&#34;:847,&#34;date&#34;:852,&#34;order&#34;:51},1050,&#34;https://apiicggallery.irisceramicagroup.com/eventi/magnetic-summer-londra/&#34;,&#34;/eventi/magnetic-summer-londra/&#34;,&#34;MAGNETIC SUMMER Londra&#34;,{&#34;sections&#34;:813,&#34;seo_meta&#34;:829,&#34;preview&#34;:833},[814],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:815},[816,818,820,823,827],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:817},&#34;\u003Cp&gt;Torna a Londra, in una nuova edizione estiva, il workshop \u003Cstrong&gt;Magnetic Dreamscapes\u003C/strong&gt;: una serata dall’animo architettonico che invita a liberare tutta la propria creatività.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:819,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Il \u003Cstrong&gt;24 luglio 2025 a partire dalle ore 18:00\u003C/strong&gt;, alla\u003Cstrong&gt; MJ Casa di Londra\u003C/strong&gt; andrà in scena \u003Cstrong&gt;Magnetic Summer\u003C/strong&gt;: una esperienza immersiva progettata attorno ad Attract®*, il sistema di posa magnetica a secco per le superfici ceramiche dei Brand di Iris Ceramica Group, una delle tecnologie più rivoluzionarie sviluppate da Granitech.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:821,&#34;col_right&#34;:822},&#34;\u003Cp&gt;I visitatori potranno partecipare a un workshop in cui creeranno “diorami”: mondi concettuali in miniatura pieni di infinite possibilità. All’interno dello spazio definito di ciascun diorama, i confini della realtà si dissolvono. Questa trasformazione dello spazio incoraggia i partecipanti a esplorare la flessibilità della percezione e a creare paesaggi dinamici, quasi onirici che sfidano le aspettative stesse dello spettatore.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Al termine del workshop, sarà possibile immortalare il proprio paesaggio da sogno e portarlo con sé a casa, proprio come si fa con una fotografia di viaggio.\u003C/p&gt;\n\u003Cp&gt;L’evento sarà l’occasione per celebrare la spensieratezza dell’estate, tra creatività, buona compagnia, cibo e musica.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:824,&#34;external_link&#34;:825,&#34;file&#34;:34,&#34;label&#34;:826},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/magnetic-summer/&#34;,&#34;Registrati a Magnetic Summer&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:828,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;*Magnetic laying system licensed by MagFace\u003C/p&gt;\n&#34;,{&#34;title&#34;:830,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:831,&#34;twitter&#34;:832},&#34;Magnetic Summer - Londra&#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:834,&#34;title&#34;:840,&#34;excerpt&#34;:841,&#34;type&#34;:130,&#34;date&#34;:842,&#34;city&#34;:497,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:835,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:836,&#34;filesize&#34;:837,&#34;url&#34;:838,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:413,&#34;width&#34;:457,&#34;height&#34;:458,&#34;sizes&#34;:839},&#34;Invitation_Magnetic-summer_London_Post.png&#34;,5437276,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/07/Invitation_Magnetic-summer_London_Post.png&#34;,[],&#34;Magnetic Summer&#34;,&#34;\u003Cp&gt;Il 24 luglio 2025 a partire dalle ore 18:00, alla MJ Casa di Londra andrà in scena Magnetic Summer: una esperienza immersiva progettata attorno ad Attract®\u003C/p&gt;\n&#34;,&#34;24.07.2025&#34;,{&#34;prev&#34;:844,&#34;next&#34;:845},[],[],&#34;magnetic-summer-londra&#34;,[848,851],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:849,&#34;path_no_lang&
