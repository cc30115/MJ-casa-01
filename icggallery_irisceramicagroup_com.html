es-re-use-di-dipl-ing-jannes-wurps/&#34;,&#34;Seminario di Formazione: Neue Praktiken des Re-Use di Dipl.-Ing. Jannes Wurps&#34;,{&#34;seo_meta&#34;:900,&#34;sections&#34;:904,&#34;preview&#34;:914},{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:901,&#34;twitter&#34;:903},{&#34;generic&#34;:902,&#34;facebook&#34;:34,&#34;twitter&#34;:34},&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/grafiche_Re-use_Berlin_news.jpg&#34;,{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[905],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:906},[907,909,912],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:908},&#34;\u003Cp&gt;Il \u003Cstrong&gt;19 giugno 2025\u003C/strong&gt;, siamo lieti di invitare architetti e professionisti alla \u003Cstrong&gt;MJ Casa\u003C/strong&gt; per un \u003Cstrong&gt;seminario serale esclusivo dedicato a pratiche architettoniche sostenibili e innovative \u003C/strong&gt;attraverso il riutilizzo dei materiali da costruzione.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:910,&#34;col_right&#34;:911},&#34;\u003Cp&gt;Il seminario sarà tenuto da \u003Cstrong&gt;Dipl.-Ing. Jannes Wurps\u003C/strong&gt;, Architetto BDA dello studio blrm di Amburgo, ed è ufficialmente riconosciuto dalla \u003Cstrong&gt;AK-Berlin\u003C/strong&gt; (Ordine degli Architetti di Berlino) come attività formativa.\u003C/p&gt;\n\u003Cp&gt;Nel contesto di un ambizioso progetto di sviluppo urbano nel quartiere \u003Cstrong&gt;Verlegerviertel di Darmstadt,\u003C/strong&gt; il seminario presenterà un progetto pilota: un edificio multifunzionale che ospiterà un asilo nido, un centro giovanile e servizi sociali – costruito interamente con materiali recuperati, inclusi elementi della struttura originale in loco.\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Il progetto dimostra come l’architettura possa adattarsi alle risorse disponibili, offrendo risultati responsabili dal punto di vista ambientale, espressivi e socialmente significativi. Il riuso dei materiali viene presentato non solo come una necessità ecologica, ma anche come un&amp;#8217;opportunità creativa nel processo progettuale.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:913,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Dettagli dell’evento\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Titolo: Neue Praktiken des Re-Use (Nuove pratiche di riuso)\u003Cbr /&gt;\nData: 19 giugno 2025\u003Cbr /&gt;\nOrario: 18:00–19:00 – Seminario | 19:00–20:00 – Aperitivo\u003Cbr /&gt;\nLocation: MJ Casa – Auguststraße 6, 10117 Berlin\u003Cbr /&gt;\nRealtore: Dipl.-Ing. Jannes Wurps, blrm Hamburg\u003Cbr /&gt;\nLingua: Tedesco\u003Cbr /&gt;\nAccreditamenti: Riconosciuto dalla AK-Berlin (Ordine degli Architetti di Berlino)\u003Cbr /&gt;\nPartecipazione: Linitata a 20 persone\u003C/p&gt;\n&#34;,{&#34;media&#34;:915,&#34;title&#34;:923,&#34;excerpt&#34;:924,&#34;type&#34;:130,&#34;date&#34;:925,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:916,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:917,&#34;filesize&#34;:918,&#34;url&#34;:919,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:920,&#34;height&#34;:921,&#34;sizes&#34;:922},&#34;grafiche_Re-use_Berlin_news-1.jpg&#34;,155864,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/grafiche_Re-use_Berlin_news-1.jpg&#34;,775,690,[],&#34; Seminario di Formazione: Neue Praktiken des Re-Use di Dipl.-Ing. Jannes Wurps&#34;,&#34;\u003Cp&gt;Il 19 giugno 2025, siamo lieti di invitare architetti e professionisti alla MJ Casa per un seminario serale esclusivo dedicato a pratiche architettoniche sostenibili e innovative attraverso il riutilizzo dei materiali da costruzione.\u003C/p&gt;\n&#34;,&#34;19.06.2025&#34;,{&#34;prev&#34;:927,&#34;next&#34;:928},[],[],&#34;seminario-di-formazione-neue-praktiken-des-re-use-di-dipl-ing-jannes-wurps&#34;,[931,934],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:932,&#34;path_no_lang&#34;:933},&#34;/en/events/seminario-di-formazione-neue-praktiken-des-re-use-di-dipl-ing-jannes-wurps/&#34;,&#34;/events/seminario-di-formazione-neue-praktiken-des-re-use-di-dipl-ing-jannes-wurps/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:897,&#34;path_no_lang&#34;:897},&#34;May 19, 2025&#34;,{&#34;id&#34;:937,&#34;fullPath&#34;:938,&#34;path&#34;:939,&#34;title&#34;:940,&#34;structure&#34;:941,&#34;siblings&#34;:1022,&#34;slug&#34;:1025,&#34;i18n&#34;:1026,&#34;date&#34;:1031,&#34;order&#34;:51},994,&#34;https://apiicggallery.irisceramicagroup.com/eventi/magnetic-dreamscapes-milano/&#34;,&#34;/eventi/magnetic-dreamscapes-milano/&#34;,&#34;MAGNETIC DREAMSCAPES Milano&#34;,{&#34;sections&#34;:942,&#34;seo_meta&#34;:1010,&#34;preview&#34;:1014},[943],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:944},[945,947,950,952,954],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:946},&#34;\u003Cp&gt;Il 19 giugno alle 18:00, \u003Cstrong&gt;MJ Casa di Milano\u003C/strong&gt; ospiterà \u003Cstrong&gt;Magnetic Dreamscapes:\u003C/strong&gt; un’\u003Cstrong&gt;esperienza immersiva progettata attorno ad Attract®\u003C/strong&gt;, la soluzione di posa magnetica a secco di Iris Ceramica Group.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:948,&#34;col_right&#34;:949},&#34;\u003Cp&gt;I visitatori potranno partecipare a\u003Cstrong&gt; un workshop creativo per realizzare il proprio &amp;#8220;diorama&amp;#8221;\u003C/strong&gt;: un mondo concettuale in miniatura pieno di infinite possibilità. All’interno dello spazio definito di ciascun diorama, \u003Cstrong&gt;i confini della realtà si dissolvono\u003C/strong&gt;.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Una trasformazione dello spazio che incoraggia i partecipanti a creare \u003Cstrong&gt;paesaggi dinamici\u003C/strong&gt;, quasi \u003Cstrong&gt;onirici,\u003C/strong&gt; che sfidano le aspettative stesse dello spettatore.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:951,&#34;col_left&#34;:948,&#34;col_right&#34;:949},&#34;\u003Cp&gt;Questa trasformazione dello spazio nella relatà è resa possibile dalla tecnologia \u003Cstrong&gt;Attract®: l’innovativo e circolare sistema di posa magnetica a secco, \u003C/strong&gt;sviluppato da \u003Cstrong&gt;Granitech\u003C/strong&gt; per le superfici ceramiche dei Brand di Iris Ceramica Group\u003Cstrong&gt;.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n\u003Cp&gt;Durante la serata, sarà possibile partecipare al workshop in diverse fasce orarie.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:953,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cem&gt;Magnetic laying system licensed by MagFace.\u003C/em&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:955},[956,966,975,983,992,1001],{&#34;ID&#34;:957,&#34;id&#34;:957,&#34;title&#34;:958,&#34;filename&#34;:959,&#34;filesize&#34;:960,&#34;url&#34;:961,&#34;link&#34;:962,&#34;alt&#34;:29,&#34;author&#34;:663,&#34;description&#34;:29,&#34;caption&#34;:958,&#34;name&#34;:963,&#34;status&#34;:665,&#34;uploaded_to&#34;:937,&#34;date&#34;:964,&#34;modified&#34;:964,&#34;menu_order&#34;:51,&#34;mime_type&#34;:667,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;icon&#34;:668,&#34;width&#34;:669,&#34;height&#34;:670,&#34;sizes&#34;:965},1004,&#34;https://freelanceeventsphotographer.co.uk/conference-photographer-london&#34;,&#34;DSC_4378-1.jpg&#34;,2175249,&#34;https://apiicgg t.jpg&#34;,[],&#34;\u003Cp&gt;Il 19 giugno alle 18:00, MJ Casa di Milano ospiterà Magnetic Dreamscapes: un’esperienza immersiva progettata attorno ad Attract®, la soluzione di posa magnetica a secco di Iris Ceramica Group.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1023,&#34;next&#34;:1024},[],[],&#34;magnetic-dreamscapes-milano&#34;,[1027,1030],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1028,&#34;path_no_lang&#34;:1029},&#34;/en/events/magnetic-dreamscape-milan/&#34;,&#34;/events/magnetic-dreamscape-milan/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:939,&#34;path_no_lang&#34;:939},&#34;June 4, 2025&#34;,{&#34;id&#34;:1033,&#34;fullPath&#34;:1034,&#34;path&#34;:1035,&#34;title&#34;:1036,&#34;structure&#34;:1037,&#34;siblings&#34;:1057,&#34;slug&#34;:1060,&#34;i18n&#34;:1061,&#34;date&#34;:1066,&#34;order&#34;:51},971,&#34;https://apiicggallery.irisceramicagroup.com/eventi/bottega-in-bloom-icg-gallery-milano-si-trasforma-in-un-atelier-creativo/&#34;,&#34;/eventi/bottega-in-bloom-icg-gallery-milano-si-trasforma-in-un-atelier-creativo/&#34;,&#34;BOTTEGA IN BLOOM: ICG GALLERY MILANO SI TRASFORMA IN UN ATELIER CREATIVO&#34;,{&#34;sections&#34;:1038,&#34;seo_meta&#34;:1045,&#34;preview&#34;:1049},[1039],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1040},[1041,1043],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1042},&#34;\u003Cp&gt;\u003Cstrong&gt;Il 27 maggio la MJ Casa si trasformerà in un vivace atelier multidisciplinare: una vera e propria bottega d&amp;#8217;arte dove creatività e artigianato si incontrano per dare vita a un&amp;#8217;esperienza immersiva.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1044,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Il 27 maggio la \u003Cstrong&gt;MJ Casa di Milano\u003C/strong&gt; ospiterà il workshop \u003Cstrong&gt;Bottega in Bloom\u003C/strong&gt;, trasformandosi in un vivace atelier multidisciplinare: una vera e propria bottega d’arte dove creatività e artigianato si incontrano per dare vita a un’esperienza immersiva. Un laboratorio dinamico in cui le barriere tra le discipline artistiche si dissolvono, lasciando spazio alla sperimentazione e all’immaginazione.\u003C/p&gt;\n\u003Cp&gt;La giornata sarà dedicata alla poesia della natura grazie al workshop curato dal laboratorio londinese \u003Cstrong&gt;Wax Atelier\u003C/strong&gt;. Attraverso l’antica arte della ceratura, i partecipanti saranno invitati a preservare la bellezza dei fiori, fissando nel tempo la loro delicatezza, simbolo di rinascita e impermanenza.\u003C/p&gt;\n&#34;,{&#34;title&#34;:1036,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1046,&#34;twitter&#34;:1048},{&#34;generic&#34;:1047,&#34;facebook&#34;:34,&#34;twitter&#34;:34},&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/grafiche_Bottega-inbloom_milano_1-1.jpg&#34;,{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1050,&#34;title&#34;:1036,&#34;excerpt&#34;:1055,&#34;type&#34;:130,&#34;date&#34;:1056,&#34;city&#34;:132,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1051,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1052,&#34;filesize&#34;:1053,&#34;url&#34;:1047,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1054},&#34;grafiche_Bottega-inbloom_milano_1-1.jpg&#34;,737621,[],&#34;\u003Cp&gt;Il 27 maggio la MJ Casa si trasformerà in un vivace atelier multidisciplinare: una vera e propria bottega d&amp;#8217;arte dove creatività e artigianato si incontrano per dare vita a un&amp;#8217;esperienza immersiva.\u003C/p&gt;\n&#34;,&#34;27.05.2025&#34;,{&#34;prev&#34;:1058,&#34;next&#34;:1059},[],[],&#34;bottega-in-bloom-icg-gallery-milano-si-trasforma-in-un-atelier-creativo&#34;,[1062,1065],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1063,&#34;path_no_lang&#34;:1064},&#34;/en/events/bottega-in-bloom-icg-gallery-milano-transforms-into-a-creative-atelier/&#34;,&#34;/events/bottega-in-bloom-icg-gallery-milano-transforms-into-a-creative-atelier/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:1035,&#34;path_no_lang&#34;:1035},&#34;May 13, 2025&#34;,{&#34;id&#34;:1068,&#34;fullPath&#34;:1069,&#34;path&#34;:1070,&#34;title&#34;:1071,&#34;structure&#34;:1072,&#34;siblings&#34;:1147,&#34;slug&#34;:1150,&#34;i18n&#34;:1151,&#34;date&#34;:1156,&#34;order&#34;:51},760,&#34;https://apiicggallery.irisceramicagroup.com/eventi/clerkenwell-design-week-2025/&#34;,&#34;/eventi/clerkenwell-design-week-2025/&#34;,&#34;Clerkenwell Design Week 2025&#34;,{&#34;city&#34;:1073,&#34;title&#34;:1074,&#34;excerpt&#34;:1075,&#34;seo_meta&#34;:1076,&#34;date&#34;:1082,&#34;hour&#34;:1083,&#34;sections&#34;:1084,&#34;preview&#34;:1139},&#34;Roma&#34;,&#34;Event title lorem ipsum&#34;,&#34;\u003Cp&gt;Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent non molestie orci.\u003C/p&gt;\n&#34;,{&#34;title&#34;:1077,&#34;description&#34;:1078,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1079,&#34;twitter&#34;:1081},&#34;ICG Galleries - Clerkenwell Design Week 2025&#34;,&#34;Per la Clerkenwell Design Week 2025, Iris Ceramica Group presenta un programma dinamico di tre giorni dedicato alla celebrazione dell’arte e del design, incentrato sul tema della Metamorfosi.&#34;,{&#34;generic&#34;:1080,&#34;facebook&#34;:34,&#34;twitter&#34;:34},&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/grafiche_Metamorphosis_1-1.jpg&#34;,{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},&#34;13.12.2024&#34;,&#34;11:00&#34;,[1085],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1086},[1087,1089,1091,1094,1101,1103,1105,1108,1111,1118,1120,1128,1131],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1088},&#34;\u003Cp&gt;\u003Cstrong&gt;Metamorphosis &amp;#8211; The unseen is the real story\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1090,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;In occasione della Clerkenwell Design Week 2025, Iris Ceramica Group all’interno della sua MJ Casa di Londra intraprende un viaggio multisensoriale dove ciò che appare è molto più di come sembra. Le superfici si trasformano: non è magia, ma tecnologia d’avanguardia applicata alla materia ceramica.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1092,&#34;col_right&#34;:1093},&#34;\u003Cp&gt;\u003Cstrong&gt;Il Concept\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;La \u003Cstrong&gt;farfalla\u003C/strong&gt;, metafora stessa della \u003Cstrong&gt;qualità estetica della ceramica\u003C/strong&gt;, grazie al suo processo generativo diventa emblema della metamorfosi. Con \u003Cstrong&gt;“Metamorphosis – The Unseen Is the Real Story”,\u003C/strong&gt; Iris Ceramica Group invita a riflettere sul \u003Cstrong&gt;concetto di percezione e trasformazione \u003C/strong&gt;attraverso la materia e video digitali.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;\u003Cstrong&gt;The Experience\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;All’interno dello showroom di Clerkenwell, la metamorfosi si concretizza in una \u003Cstrong&gt;esperienza culinaria immersiva divisa in quattro “stazioni”:\u003C/strong&gt; \u003Cstrong&gt;occhi, orecchie\u003C/strong&gt;, \u003Cstrong&gt;cuore\u003C/strong&gt; e \u003Cstrong&gt;alchimia\u003C/strong&gt;. Il cibo non è più soltanto alimento nutriente per il corpo, ma esperienza per solleticare e divertire la vista, giocare con le consistenze e il suono, portare alla luce emozioni nascoste e lasciarsi avvolgere dalla magia della trasformazione, guidati dalle mani dello chef-alchimista.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1096,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},&#34;SectionMedia&#34;,{&#34;filename&#34;:1097,&#34;filesize&#34;:1098,&#34;url&#34;:1099,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:541,&#34;height&#34;:541,&#34;sizes&#34;:1100},&#34;Cibo21080x1080.jpg&#34;,707388,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/Cibo21080x1080.jpg&#34;,[],{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1102,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Agenda\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Martedì 20 maggio\u003Cbr /&gt;\n18.00-21.00: AIA UK EXCELLENCE AWARDS INSIGHTS NIGHT\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;I vincitori del Premio “AIA UK Excellence In Design Award” incontrano il pubblico della Clerkenwell Design Week in una serata a loro dedicata in cui presentano personalmente i loro prestigiosi progetti. In questa occasione speciale, aperta a tutti, viene anche riconosciuto e premiato il vincitore del “ICG Award”.\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Mercoledì 21 maggio\u003Cbr /&gt;\n18.00-21.00: Metamorphosis – The Unseen Is the Real Story\u003Cbr /&gt;\n\u003C/strong&gt;Esperienza culinaria immersiva\u003Cbr /&gt;\n\u003Cstrong&gt;19.00 Presentazione e lancio ufficiale della tecnologia \u003Cem&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/em&gt;\u003C/strong&gt; a cura di\u003Cbr /&gt;\nFederica Minozzi, CEO Iris Ceramica Group,\u003Cbr /&gt;\nJeroen van den Hurk, CEO Alchimia,\u003Cbr /&gt;\nLorenza Liguori, visual artist.\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Giovedì 22 maggio\u003Cbr /&gt;\n18.00-21.00: Moonlight &amp;amp; Digital Visions\u003Cbr /&gt;\n\u003C/strong&gt;Visita allo showroom per scoprire le nuove soluzioni tecnologiche applicate alla ceramica, \u003Cem&gt;Alchimia&amp;amp;Iris Ceramica Group\u003C/em&gt; e \u003Cem&gt;Moonlight\u003C/em&gt;, immergendosi nelle cinque tele digitali 3D realizzate in esclusiva dell’artista digitale Lorenza Liguori e vivendo lo spazio della MJ Casa, animato da musica dal vivo.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1104,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;AIA UK DESIGN AWARDS INISGHTS NIGHT: UNA SERATA DEDICATA ALL’ARCHITETTURA D’ECCELLENZA ALLA ICG GALLERY DURANTE CLERKENWELL DESIGN WEEK.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Il 20 maggio, in occasione della Clerkenwell Design Week 2025, Iris Ceramica Group ospiterà presso la MJ Casa di Londra un evento speciale in collaborazione con AIA UK per celebrare i progetti vincitori degli “Excellence in Design Awards”.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:1104,&#34;col_left&#34;:1106,&#34;col_right&#34;:1107},&#34;\u003Cp&gt;La storica partnership tra \u003Cstrong&gt;Iris Ceramica Group\u003C/strong&gt; e l’\u003Cstrong&gt;American Institute of Architects – UK Chapter\u003C/strong&gt; si rinnova con una serata dedicata alla \u003Cstrong&gt;qualità del design\u003C/strong&gt;, all’\u003Cstrong&gt;innovazione\u003C/strong&gt; e alla \u003Cstrong&gt;sostenibilità\u003C/strong&gt;, valori condivisi e promossi attraverso il sostegno attivo del Gruppo al concorso. Per l’edizione 2025, gli Awards hanno introdotto nuove categorie e, per la prima volta, hanno premiato esclusivamente progetti realizzati nel Regno Unito, confermando la rilevanza sempre crescente dell’architettura britannica a livello internazionale.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;La giuria, presieduta da \u003Cstrong&gt;Alison Brooks\u003C/strong&gt; (Founding Principal &amp;amp; Creative Director, Alison Brooks Architects), ha visto la partecipazione di figure di spicco del panorama architettonico e ingegneristico: \u003Cstrong&gt;DaeWha Kang\u003C/strong&gt; (Founder, DaeWha Kang Design), \u003Cstrong&gt;Matthias Schuler\u003C/strong&gt; (Founder &amp;amp; Managing Partner, TransSolar Climate Engineering), \u003Cstrong&gt;Rob Partridge\u003C/strong&gt; (Design Director, AKT II Engineering), \u003Cstrong&gt;Ellie Stathaki\u003C/strong&gt; (Architecture &amp;amp; Environment Director, \u003Cem&gt;Wallpaper\u003C/em&gt; Magazine) e \u003Cstrong&gt;Margherita Giannoni\u003C/strong&gt; (UK PR &amp;amp; Communication Manager, Iris Ceramica Group).\u003C/p&gt;\n\u003Cp&gt;Durante questa serata prestigiosa verrà inoltre conferito, direttamente da \u003Cstrong&gt;Federica Minozzi\u003C/strong&gt; – CEO di Iris Ceramica Group – l’\u003Cstrong&gt;ICG Award\u003C/strong&gt;, riconoscimento riservato al progetto che meglio incarna i valori fondanti del Gruppo: \u003Cstrong&gt;Sostenibilità\u003C/strong&gt;, \u003Cstrong&gt;Innovazione\u003C/strong&gt; ed \u003Cstrong&gt;Eccellenza nella Qualità\u003C/strong&gt;.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1109,&#34;col_right&#34;:1110},&#34;\u003Cp&gt;\u003Cstrong&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Per questa occasione, dopo il successo ottenuto al Fuorisalone di Milano, la I\u003Cstrong&gt;CG Gallery presenterà in anteprima \u003C/strong&gt;per il mercato UK \u003Cstrong&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/strong&gt;: la soluzione tecnologica all’avanguardia, sviluppata da \u003Cstrong&gt;VBH\u003C/strong&gt; resa perfettamente compatibile con le superfici ceramiche dei brand del Gruppo, che ridefinisce il \u003Cstrong&gt;design indoor\u003C/strong&gt;. Si tratta di un’integrazione inedita che permette alla ceramica di contenere e nascondere schermi e sistemi di riproduzione audio-video, in totale continuità, facendoli apparire e scomparire a comando. Invisibile a prima vista, questa tecnologia impiegata nei rivestimenti di mobili e arredi dà vita a un monitor che si fonde armoniosamente con il design che lo incornicia. Le lastre ceramiche non sono più solo una materia immutabile, ma elementi in continua metamorfosi, pronti a svelare nuove dimensioni di esperienza.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;\u003Cstrong&gt;Videoinstallazioni evocative \u003C/strong&gt;realizzate dalla visual artist internazionale \u003Cstrong&gt;Lorenza Liguori\u003C/strong&gt;, avranno il compito di amplificare l’effetto sorprendente di questa innovazione, riproducendo mondi astratti e al tempo stesso realistici. Forme indefinite si materializzano in universi immaginari attraverso l’utilizzo di materiali differenti, colori, sostanze e forme che si fondono creando oggetti tridimensionali.  La presenza di forme reali, come volti e persone, ci ricorda che esiste sempre una connessione tra la nostra dimensione e il mondo immaginato.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1112,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1113,&#34;filesize&#34;:1114,&#34;url&#34;:1115,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:541,&#34;height&#34;:1116,&#34;sizes&#34;:1117},&#34;Alchimia.jpg&#34;,143397,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/Alchimia.jpg&#34;,1920,[],{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1119,&#34;col_left&#34;:1109,&#34;col_right&#34;:1110},&#34;\u003Cp&gt;\u003Cstrong&gt;Moonlight\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Accanto alla nuova tecnologia, la MJ Casa presenta \u003Cstrong&gt;Moonlight\u003C/strong&gt;, la lastra ceramica retroilluminata lanciata in occasione di Cersaie 2024: una superficie ceramica in spessore minimo dall’estetica naturale &amp;#8211; come i marmi, i graniti e gli onici &amp;#8211; che, accoppiata a uno speciale \u003Cstrong&gt;pannello luminoso a led, è in grado di rischiarare la notte. \u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1121,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1122,&#34;filesize&#34;:1123,&#34;url&#34;:1124,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:1125,&#34;height&#34;:1126,&#34;sizes&#34;:1127},&#34;moonlight-1.jpg&#34;,138230,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/moonlight-1.jpg&#34;,600,800,[],{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:1119,&#34;col_left&#34;:1129,&#34;col_right&#34;:1130},&#34;\u003Cp&gt;SAPIENSTONE \u003Cstrong&gt;DRESS CODE \u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Sapienstone presenta &amp;#8220;Dress Code by Jaime Beriestain&amp;#8221;, una collezione innovativa che unisce moda, design e ceramica per dare nuova vita agli spazi. L’estetica si ispira agli interni parigini e ai palazzi Haussmanniani, ricchi di eleganza e contrasti materici. Beriestain trasforma la ceramica in un materiale d’autore, giocando con texture sofisticate, formati versatili e una palette Deeply Chic. L’effetto è quello di ambienti raffinati, avvolgenti e personalizzati, dove ogni superficie diventa elemento di stile.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;I dettagli ricordano l’alta sartoria, con finiture curate e un tocco artistico distintivo. Al cuore del progetto c’è la tecnologia 4D che conferisce profondità visiva e un effetto materico sorprendente. Grazie alla tecnologia avanzata di Sapienstone e al know-how di Iris Ceramica Group, Jaime Beriestain ha disegnato una collezione esclusiva e senza precedenti, rivoluzionando i canoni della ceramica e ridefinendo le possibilità espressive di questo materiale. Ogni superficie non si limita a rivestire uno spazio, ma diventa parte integrante dell’ambiente, aggiungendo una dimensione artistica e sartoriale.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1132,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1133,&#34;filesize&#34;:1134,&#34;url&#34;:1135,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:1136,&#34;height&#34;:1137,&#34;sizes&#34;:1138},&#34;ICG-Gallery-Milano_ground_floor5_SapienstoneJaime-scaled-1.jpg&#34;,429336,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/ICG-Gallery-Milano_ground_floor5_SapienstoneJaime-scaled-1.jpg&#34;,1708,2560,[],{&#34;media&#34;:1140,&#34;title&#34;:1071,&#34;excerpt&#34;:1145,&#34;type&#34;:130,&#34;date&#34;:1146,&#34;city&#34;:497,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1141,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1142,&#34;filesize&#34;:1143,&#34;url&#34;:1080,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1144},&#34;grafiche_Metamorphosis_1-1.jpg&#34;,1150609,[],&#34;\u003Cp&gt;Per la Clerkenwell Design Week 2025, Iris Ceramica Group presenta un programma dinamico di tre giorni dedicato alla celebrazione dell’arte e del design, incentrato sul tema della Metamorfosi.\u003C/p&gt;\n&#34;,&#34;20.05.2025&#34;,{&#34;prev&#34;:1148,&#34;next&#34;:1149},[],[],&#34;clerkenwell-design-week-2025&#34;,[1152,1155],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1153,&#34;path_no_lang&#34;:1154},&#34;/en/events/clerkenwell-design-week-2025/&#34;,&#34;/events/clerkenwell-design-week-2025/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:1070,&#34;path_no_lang&#34;:1070},&#34;April 1, 2025&#34;,{&#34;id&#34;:1158,&#34;fullPath&#34;:1159,&#34;path&#34;:1160,&#34;title&#34;:1161,&#34;structure&#34;:1162,&#34;siblings&#34;:1185,&#34;slug&#34;:1188,&#34;i18n&#34;:1189,&#34;date&#34;:1194,&#34;order&#34;:51},208,&#34;https://apiicggallery.irisceramicagroup.com/eventi/bottega-in-bloom/&#34;,&#34;/eventi/bottega-in-bloom/&#34;,&#34;Bottega in Bloom&#34;,{&#34;seo_meta&#34;:1163,&#34;sections&#34;:1166,&#34;preview&#34;:1174},{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1164,&#34;twitter&#34;:1165},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1167],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1168},[1169,1171],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1170},&#34;\u003Cp&gt;MJ Casa si trasforma in un atelier creativo.\u003C/p&gt;\n\u003Cp&gt;Il 2 e 3 maggio, la MJ Casa si trasformerà in un vivace atelier multidisciplinare: una vera e propria bottega d&amp;#8217;arte dove creatività e artigianato si incontrano per dare vita a un&amp;#8217;esperienza immersiva. Un laboratorio dinamico in cui le barriere tra le discipline artistiche si dissolvono, lasciando spazio alla sperimentazione e all&amp;#8217;immaginazione.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1172,&#34;col_right&#34;:1173},&#34;\u003Cp&gt;\u003Cstrong&gt;Venerdì 2 maggio: Spring in Bloom con Wax Atelier\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;La prima giornata sarà dedicata alla poesia della natura con il workshop Spring in Bloom, curato dal laboratorio londinese Wax Atelier. Attraverso l&amp;#8217;antica arte della ceratura, i partecipanti saranno invitati a preservare la bellezza dei fiori, fissando nel tempo la loro delicatezza, simbolo di rinascita e impermanenza.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;\u003Cstrong&gt;Sabato 3 maggio: Hacked Surfaces con Bottega d&amp;#8217;Arte\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Il secondo giorno sarà un viaggio di sperimentazione e reinvenzione con il workshop di ceramica Hacked Surfaces. Lavorando con le terrecotte Bottega d&amp;#8217;Arte del brand Iris Ceramica, i partecipanti esploreranno tecniche di hacking, riparazione e re-immaginazione, creando pezzi unici ispirati alla ceramica e all&amp;#8217;arte dell&amp;#8217;ikebana. Ogni opera realizzata sarà un ricordo tangibile di questa esperienza creativa da portare a casa.\u003C/p&gt;\n&#34;,{&#34;media&#34;:1175,&#34;title&#34;:1182,&#34;excerpt&#34;:1183,&#34;type&#34;:130,&#34;date&#34;:1184,&#34;city&#34;:339,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1176,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1177,&#34;filesize&#34;:1178,&#34;url&#34;:1179,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:413,&#34;width&#34;:457,&#34;height&#34;:1180,&#34;sizes&#34;:1181},&#34;IMG_3383_small-1.png&#34;,7084856,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/05/IMG_3383_small-1.png&#34;,2474,[],&#34;BOTTEGA IN BLOOM&#34;,&#34;\u003Cp&gt;Il 2 e 3 maggio, la MJ Casa si trasformerà in un vivace atelier multidisciplinare: una vera e propria bottega d&amp;#8217;arte dove creatività e artigianato si incontrano per dare vita a un&amp;#8217;esperienza immersiva. Un laboratorio dinamico in cui le barriere tra le discipline artistiche si dissolvono, lasciando spazio alla sperimentazione e all&amp;#8217;immaginazione.\u003C/p&gt;\n&#34;,&#34;02.05.2025&#34;,{&#34;prev&#34;:1186,&#34;next&#34;:1187},[],[],&#34;bottega-in-bloom&#34;,[1190,1193],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1191,&#34;path_no_lang&#34;:1192},&#34;/en/events/bottega-in-bloom/&#34;,&#34;/events/bottega-in-bloom/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:1160,&#34;path_no_lang&#34;:1160},&#34;December 16, 2024&#34;,{&#34;id&#34;:1196,&#34;fullPath&#34;:1197,&#34;path&#34;:1198,&#34;title&#34;:1199,&#34;structure&#34;:1200,&#34;siblings&#34;:1229,&#34;slug&#34;:1232,&#34;i18n&#34;:1233,&#34;date&#34;:1238,&#34;order&#34;:51},891,&#34;https://apiicggallery.irisceramicagroup.com/eventi/metamorphosis-milan-design-week-2025/&#34;,&#34;/eventi/metamorphosis-milan-design-week-2025/&#34;,&#34;METAMORPHOSIS – MILAN DESIGN WEEK 2025&#34;,{&#34;preview&#34;:1201,&#34;sections&#34;:1211,&#34;seo_meta&#34;:1224},{&#34;media&#34;:1202,&#34;title&#34;:1199,&#34;excerpt&#34;:1209,&#34;type&#34;:130,&#34;date&#34;:1210,&#34;city&#34;:132,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1203,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1204,&#34;filesize&#34;:1205,&#34;url&#34;:1206,&#34;alt&#34;:1207,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:413,&#34;width&#34;:541,&#34;height&#34;:541,&#34;sizes&#34;:1208},&#34;ICG_Gallery-Events-MDW-Hero.png&#34;,601161,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/03/ICG_Gallery-Events-MDW-Hero.png&#34;,&#34;MJ Casa - Events - Milano Design Week&#34;,[],&#34;\u003Cp&gt;Alchimia, luci sonore, tele digitali, video interattivi.\u003Cbr /&gt;\nIris Ceramica Group interpreta il tema del Fuorisalone 2025 “Mondi connessi” aprendo il racconto alla multisensorialità dove tutto sembra altro; dove i confini si perdono e le percezioni si stravolgono.\u003C/p&gt;\n&#34;,&#34;07.04.2025&#34;,[1212],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1213},[1214,1216,1218,1221],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1215},&#34;\u003Cp&gt;Alchimia, luci sonore, tele digitali, video interattivi. Iris Ceramica Group interpreta il tema del Fuorisalone 2025 “Mondi connessi” aprendo il racconto alla multisensorialità dove tutto sembra altro; dove i confini si perdono e le percezioni si stravolgono.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1217,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Le luci sono strumenti musicali e le superfici cambiano pelle, appaiono e scompaiono. Non è magia, è tecnologia all’avanguardia applicata alla materia ceramica. Il confine che distingue la realtà dall’illusione si affievolisce e l’innovazione tecnologica espone il mondo circostante sotto una nuova luce.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1219,&#34;col_right&#34;:1220},&#34;\u003Cp&gt;Attraverso installazioni digitali, videomapping luminosi e suoni sincronizzati, i visitatori vivranno in prima persona una dimensione dove lo spazio si trasforma, il tempo si dissolve e la materia assume una nuova identità.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;La farfalla, rappresentazione della qualità estetica della ceramica, attraverso il suo processo generativo diventa emblema della metamorfosi stessa.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1222,&#34;external_link&#34;:1223,&#34;file&#34;:34,&#34;label&#34;:160},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/mdw2025/&#34;,{&#34;title&#34;:1225,&#34;description&#34;:1226,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1227,&#34;twitter&#34;:1228},&#34;ICG Galleries - Milan Design Week 2025&#34;,&#34;Alchimia, luci sonore, tele digitali, video interattivi. Iris Ceramica Group interpreta il tema del Fuorisalone 2025 “Mondi connessi” &#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;prev&#34;:1230,&#34;next&#34;:1231},[],[],&#34;metamorphosis-milan-design-week-2025&#34;,[1234,1237],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1235,&#34;path_no_lang&#34;:1236},&#34;/en/events/metamorphosis-milan-design-week-2025/&#34;,&#34;/events/metamorphosis-milan-design-week-2025/&#34;,{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:1198,&#34;path_no_lang&#34;:1198},&#34;April 4, 2025&#34;,[1240,1272,1308,1337,1368,1394,1428,1454,1483,1515,1544,1579,1607,1635,1707,1745,1777,1807,1836,1901,1928,1982,2008],{&#34;id&#34;:1241,&#34;fullPath&#34;:1242,&#34;path&#34;:141,&#34;title&#34;:1243,&#34;structure&#34;:1244,&#34;siblings&#34;:1266,&#34;slug&#34;:137,&#34;i18n&#34;:1269,&#34;date&#34;:145,&#34;order&#34;:51},1315,&#34;https://apiicggallery.irisceramicagroup.com/en/events/fuorisalone-26-milano/&#34;,&#34;Fuorisalone 26 - Milan&#34;,{&#34;sections&#34;:1245,&#34;seo_meta&#34;:1257,&#34;preview&#34;:1261},[1246],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1247},[1248,1250,1252,1255],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1249},&#34;\u003Cp&gt;\u003Cstrong&gt;Iris Ceramica Group\u003C/strong&gt; takes part in \u003Cstrong&gt;Fuorisalone 2026\u003C/strong&gt; with the concept \u003Cstrong&gt;\u003Cem&gt;“The Humans Behind”\u003C/em&gt;\u003C/strong&gt;, renewing its presence in the design world through the \u003Cstrong&gt;MJ Casa in Milan.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1251,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Inspired by this edition’s theme, “Essere Progetto” (“To Be a Project”), the Group’s concept unfolds as a storytelling narrative composed like a palette of materials and stories. At the heart of the narrative is the individual, whose identity becomes the true creator of uniqueness. An invitation to recognize, in every project, the human imprint of those who brought it to life.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1253,&#34;external_link&#34;:111,&#34;file&#34;:34,&#34;label&#34;:1254},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Discover more and register&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1256,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;OPENING HOURS:\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Monday 20 to Friday 24: 10:00 AM – 9:00 PM\u003C/p&gt;\n\u003Cp&gt;Saturday, April 25: 10:00 AM – 4:00 PM\u003C/p&gt;\n&#34;,{&#34;title&#34;:1258,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1259,&#34;twitter&#34;:1260},&#34;The concept “The Humans Behind” at the Milan Design Week&#34;,{&#34;generic&#34;:125,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1262,&#34;title&#34;:1258,&#34;excerpt&#34;:1265,&#34;type&#34;:130,&#34;date&#34;:131,&#34;city&#34;:132,&#34;hour&#34;:133,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1263,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:123,&#34;filesize&#34;:124,&#34;url&#34;:125,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:127,&#34;height&#34;:127,&#34;sizes&#34;:1264},[],&#34;\u003Cp&gt;Iris Ceramica Group takes part in the Fuorisalone 2026 with the concept “The Humans Behind,” renewing its presence in the design world through the MJ Casa in Milan.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1267,&#34;next&#34;:1268},[],[],[1270,1271],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:141,&#34;path_no_lang&#34;:142},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:92,&#34;path_no_lang&#34;:92},{&#34;id&#34;:1273,&#34;fullPath&#34;:1274,&#34;path&#34;:184,&#34;title&#34;:1275,&#34;structure&#34;:1276,&#34;siblings&#34;:1302,&#34;slug&#34;:181,&#34;i18n&#34;:1305,&#34;date&#34;:187,&#34;order&#34;:51},1300,&#34;https://apiicggallery.irisceramicagroup.com/en/events/the-magical-journey-a-parigi-per-maisonobjet/&#34;,&#34;THE MAGICAL JOURNEY IN PARIS FOR MAISON&amp;OBJET&#34;,{&#34;sections&#34;:1277,&#34;seo_meta&#34;:1294,&#34;preview&#34;:1297},[1278],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1279},[1280,1282,1284,1287,1289,1292],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1281},&#34;\u003Cp&gt;The alchemic journey – which began at Cersaie and continued in Dubai – now comes to Maison&amp;amp;Objet – In the city, interpreting the event theme through the surfaces and solutions on show at the MJ Casa in Paris.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1283,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Version française ci-dessous\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1285,&#34;external_link&#34;:159,&#34;file&#34;:34,&#34;label&#34;:1286},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Register&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1288,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;From 14 to 19 January, the Iris Ceramica Group concept The Magical Journey comes to Maison&amp;amp;Objet 2026 &amp;#8211; In the city, the Paris fair for the design and furnishing world, with international excellences on display not only at the fair but in showrooms across the city. This year’s theme, “Past reveals future”, presents design as a bearer of memories, stories and traditions and, at the same time, an expression of responsible innovation.\u003C/p&gt;\n\u003Cp&gt;Set here, in the heart of the city, the MJ Casa in Paris opens its doors to the design community, telling of the Group&amp;#8217;s vision – Re-engineering Ceramics for the Better – and offering a tangible form for its idea of ceramics: a noble and precious material that the Company enhances by blending tradition and technological innovation.\u003Cbr /&gt;\nFor Iris Ceramica Group, ceramics are beautility: the perfect blend of beauty and function. Through innovation, therefore, the transformation of material takes on new meaning: an ancient process that turns ceramics into gold, an authentically symbolic alchemical process.\u003C/p&gt;\n\u003Cp&gt;The MJ Casa in Paris also welcomes the works of art created by two international artists who narrate the metaphoric concept The Magical Journey, each with their own visual and narrative language. On one hand, the digital videomorphing of the visual artist Lorenza Liguori that interprets the magical journey in all its three steps of alchemic transformation. On the other, on the outside window, Héléna Soubeyrand’s art work in acrylic paint and markers – part of the Winter Alchemy project – stages the magic of metamorphosis through illustration.\u003C/p&gt;\n\u003Cp&gt;Just like the art works on display, in the MJ Casa, tradition and innovation join in a single voice – using art and technology – to talk about the profound value that ceramics embody in the sophisticated narration of Iris Ceramica Group.\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n\u003Cp&gt;MJ Casa Paris for M&amp;amp;O &amp;#8211; In The City\u003Cbr /&gt;\n14 – 19 January 2026\u003Cbr /&gt;\n39 Rue d’Alésia\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1290,&#34;external_link&#34;:159,&#34;file&#34;:34,&#34;label&#34;:1291},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Inscrivez-vous&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1293,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;118\&#34; data-end=\&#34;630\&#34;&gt;Du 14 au 19 janvier, le concept The Magical Journey d’Iris Ceramica Group fait escale à Maison&amp;amp;Objet 2026 – In the City, le rendez-vous parisien dédié au monde du design et de l’ameublement, qui réunit des excellences internationales aussi bien au sein du salon que dans les showrooms répartis dans toute la ville.\u003Cbr data-start=\&#34;444\&#34; data-end=\&#34;447\&#34; /&gt;Le thème de cette édition, « Past reveals future », présente le design comme porteur de mémoire, d’histoire et de tradition, tout en étant l’expression d’une innovation responsable.\u003C/p&gt;\n\u003Cp data-start=\&#34;632\&#34; data-end=\&#34;1310\&#34;&gt;Dans ce contexte, au cœur de la ville, la MJ Casa Paris ouvre ses portes à la communauté du design, racontant la vision du Groupe – Re-engineering Ceramics for the Better – et donnant une forme tangible à son idée de la céramique : une matière noble et précieuse, que l’Entreprise valorise en associant tradition et innovation technologique.\u003Cbr data-start=\&#34;985\&#34; data-end=\&#34;988\&#34; /&gt;Pour Iris Ceramica Group, la céramique est beautility : la synthèse parfaite entre beauté et fonctionnalité. Grâce à l’innovation, la transformation de la matière acquiert ainsi une nouvelle signification : un processus ancien qui transforme la céramique en or, un véritable processus alchimique, hautement symbolique.\u003C/p&gt;\n\u003Cp data-start=\&#34;1312\&#34; data-end=\&#34;1931\&#34;&gt;La MJ Casa Paris accueille également les œuvres de deux artistes internationales qui interprètent le concept métaphorique The Magical Journey, chacune à travers son propre langage visuel et narratif.\u003Cbr data-start=\&#34;1523\&#34; data-end=\&#34;1526\&#34; /&gt;D’un côté, les vidéomorphings numériques de la visual artist Lorenza Liguori, qui racontent le voyage magique dans ses trois étapes de transformation alchimique.\u003Cbr data-start=\&#34;1695\&#34; data-end=\&#34;1698\&#34; /&gt;De l’autre, sur la vitrine extérieure, l’œuvre de Héléna Soubeyrand, réalisée à la peinture acrylique et aux marqueurs dans le cadre du projet Winter Alchemy, met en scène la magie de la métamorphose à travers l’illustration.\u003C/p&gt;\n\u003Cp data-start=\&#34;1933\&#34; data-end=\&#34;2207\&#34;&gt;À l’image des œuvres exposées, au sein de la MJ Casa, tradition et innovation s’unissent dans une seule et même voix pour raconter – à travers l’art et la technologie – la valeur profonde que la céramique incarne dans la narration sophistiquée d’Iris Ceramica Group.\u003C/p&gt;\n\u003Cp data-start=\&#34;2214\&#34; data-end=\&#34;2312\&#34;&gt;MJ Casa Paris – Maison&amp;amp;Objet In The City\u003Cbr data-start=\&#34;2262\&#34; data-end=\&#34;2265\&#34; /&gt;14 – 19 janvier 2026\u003Cbr data-start=\&#34;2289\&#34; data-end=\&#34;2292\&#34; /&gt;39, rue d’Alésia\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1295,&#34;twitter&#34;:1296},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1298,&#34;title&#34;:1301,&#34;excerpt&#34;:1281,&#34;type&#34;:130,&#34;date&#34;:175,&#34;city&#34;:176,&#34;hour&#34;:177,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1299,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:170,&#34;filesize&#34;:171,&#34;url&#34;:172,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1300},[],&#34;THE MAGICAL JOURNEY IN PARIS FOR MAISON&amp;OBJET &#34;,{&#34;prev&#34;:1303,&#34;next&#34;:1304},[],[],[1306,1307],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:184,&#34;path_no_lang&#34;:185},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:149,&#34;path_no_lang&#34;:149},{&#34;id&#34;:1309,&#34;fullPath&#34;:1310,&#34;path&#34;:224,&#34;title&#34;:1311,&#34;structure&#34;:1312,&#34;siblings&#34;:1330,&#34;slug&#34;:1333,&#34;i18n&#34;:1334,&#34;date&#34;:227,&#34;order&#34;:51},1277,&#34;https://apiicggallery.irisceramicagroup.com/en/events/winter-alchemy-paris/&#34;,&#34;Winter Alchemy - Paris&#34;,{&#34;seo_meta&#34;:1313,&#34;sections&#34;:1316,&#34;preview&#34;:1326},{&#34;title&#34;:1311,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1314,&#34;twitter&#34;:1315},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1317],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1318},[1319,1321,1323],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1320},&#34;\u003Cp&gt;On December 11, the MJ Casa in Paris hosts a convivial event to welcome the winter season, set against the backdrop of an artwork created on the gallery’s window by Héléna Soubeyrand.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1322,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;231\&#34; data-end=\&#34;573\&#34;&gt;On December 11, the \u003Cstrong&gt;MJ Casa in Paris\u003C/strong&gt;, located in the Petit-Montrouge district at 39 Rue d’Alésia, will host \u003Cem data-start=\&#34;343\&#34; data-end=\&#34;359\&#34;&gt;Winter Alchemy\u003C/em&gt;, a warm and convivial gathering to welcome the winter season together. Amid hot drinks, spiced aromas, and small delights, it will be an opportunity to meet, chat, and enjoy the relaxed atmosphere of the holidays.\u003C/p&gt;\n\u003Cp data-start=\&#34;575\&#34; data-end=\&#34;742\&#34;&gt;During the evening, guests will be able to admire the illustration created by artist \u003Cstrong&gt;Héléna Soubeyrand\u003C/strong&gt; for the showroom window as part of the \u003Cem data-start=\&#34;717\&#34; data-end=\&#34;733\&#34;&gt;Winter Alchemy\u003C/em&gt; project.\u003C/p&gt;\n\u003Cp data-start=\&#34;744\&#34; data-end=\&#34;942\&#34;&gt;The work will feature her unmistakable style: soft, airy lines born from observing nature and people. A single stroke that seems never to break, a line moving across the glass as if gliding over it.\u003C/p&gt;\n\u003Cp data-start=\&#34;944\&#34; data-end=\&#34;1103\&#34;&gt;Her artistic universe oscillates between the dreamlike and the sacred, blending the feminine iconography of religious art with the fluid curves of pop culture.\u003C/p&gt;\n\u003Cp data-start=\&#34;1105\&#34; data-end=\&#34;1402\&#34;&gt;She regularly collaborates with brands such as Ruinart, Montblanc, Art Basel Paris, Sisley, and Chanel, bringing her unique artistic touch to their campaigns. Her work continues to evolve—between\u003Cstrong&gt; performance, mysticism, and modernity\u003C/strong&gt;—asserting her singular voice within the contemporary art scene.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1324,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:1325},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Find out more about the Winter Alchemy project&#34;,{&#34;media&#34;:1327,&#34;title&#34;:1311,&#34;excerpt&#34;:1320,&#34;type&#34;:130,&#34;date&#34;:216,&#34;city&#34;:176,&#34;hour&#34;:217,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1328,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:211,&#34;filesize&#34;:212,&#34;url&#34;:213,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1329},[],{&#34;prev&#34;:1331,&#34;next&#34;:1332},[],[],&#34;winter-alchemy-paris&#34;,[1335,1336],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:224,&#34;path_no_lang&#34;:225},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:191,&#34;path_no_lang&#34;:191},{&#34;id&#34;:1338,&#34;fullPath&#34;:1339,&#34;path&#34;:265,&#34;title&#34;:1340,&#34;structure&#34;:1341,&#34;siblings&#34;:1361,&#34;slug&#34;:1364,&#34;i18n&#34;:1365,&#34;date&#34;:268,&#34;order&#34;:51},1259,&#34;https://apiicggallery.irisceramicagroup.com/en/events/winter-alchemy-milan/&#34;,&#34;Winter Alchemy - Milan&#34;,{&#34;seo_meta&#34;:1342,&#34;sections&#34;:1345,&#34;preview&#34;:1357},{&#34;title&#34;:1340,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1343,&#34;twitter&#34;:1344},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1346],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1347},[1348,1350,1352,1355],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1349},&#34;\u003Cp&gt;The MJ Casa in Milan will be hosting the convivial event welcoming the winter season on 10 December, set against the background work created in the window by Joanne Elizabeth Shipp.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1351,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;On 10 December,\u003C/strong&gt; the \u003Cstrong&gt;MJ Casa\u003C/strong&gt; in \u003Cstrong&gt;Via Santa Margherita 4 \u003C/strong&gt;will host \u003Cstrong&gt;Winter Alchemy\u003C/strong&gt;, a convivial event to welcome in the winter season together.\u003Cbr /&gt;\nWith hot drinks, spicy fragrances and tiny delights, it is an opportunity to get together for a chat and enjoy the relaxed holiday atmosphere.\u003C/p&gt;\n\u003Cp&gt;During the evening event, guests will have the chance to admire the illustration created – as part of the Winter Alchemy project – by the artist \u003Cstrong&gt;Joanne Elizabeth Shipp\u003C/strong&gt; for the showroom window\u003Cstrong&gt;.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;The work is marked by her very recognisable style: a thick composition of micro-drawings, sketches, icons and symbols that create a landscape steeped in meaning.\u003C/p&gt;\n\u003Cp&gt;Born in the United Kingdom and graduating with honours from the University of London, with a specialisation in \u003Cstrong&gt;printed fabrics\u003C/strong&gt;, Joanne Elizabeth Shipp has lived near \u003Cstrong&gt;Lake Como\u003C/strong&gt; since 1992. A professional designer, she has worked with many brands, displaying her works in galleries and exhibitions in London, Milan, Geneva, Como, Monaco, Courmayeur and Bormio. Among her most important projects, an \u003Cstrong&gt;exclusive collection of scarves\u003C/strong&gt; for the Mandarin Oriental Lago in Como and Milan.\u003Cbr /&gt;\nToday she \u003Cstrong&gt;creates custom works of art\u003C/strong&gt; and performs \u003Cstrong&gt;live interactive painting sessions\u003C/strong&gt; at events and experiences, working with \u003Cstrong&gt;event organisers, luxury hotels and international businesses\u003C/strong&gt;.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1353,&#34;external_link&#34;:243,&#34;file&#34;:34,&#34;label&#34;:1354},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Register for the event&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1356,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:1325},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;media&#34;:1358,&#34;title&#34;:1340,&#34;excerpt&#34;:1349,&#34;type&#34;:130,&#34;date&#34;:257,&#34;city&#34;:132,&#34;hour&#34;:258,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1359,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:253,&#34;filesize&#34;:254,&#34;url&#34;:255,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1360},[],{&#34;prev&#34;:1362,&#34;next&#34;:1363},[],[],&#34;winter-alchemy-milan&#34;,[1366,1367],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:265,&#34;path_no_lang&#34;:266},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:231,&#34;path_no_lang&#34;:231},{&#34;id&#34;:1369,&#34;fullPath&#34;:1370,&#34;path&#34;:302,&#34;title&#34;:273,&#34;structure&#34;:1371,&#34;siblings&#34;:1388,&#34;slug&#34;:299,&#34;i18n&#34;:1391,&#34;date&#34;:305,&#34;order&#34;:51},1290,&#34;https://apiicggallery.irisceramicagroup.com/en/events/winter-alchemy-marbella/&#34;,{&#34;seo_meta&#34;:1372,&#34;sections&#34;:1375,&#34;preview&#34;:1384},{&#34;title&#34;:273,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1373,&#34;twitter&#34;:1374},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1376],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1377},[1378,1380,1382],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1379},&#34;\u003Cp&gt;On December 4th, the MJ Casa in Marbella will host a convivial event to welcome the winter season. In the background, the artwork created on the storefront window by Aida from Manila Wall Art.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1381,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;268\&#34; data-end=\&#34;650\&#34;&gt;On December 4th, the MJ Casa in Marbella, located in the heart of the city’s main artery—reflecting the elegance and dynamism of the Costa del Sol—will host \u003Cem data-start=\&#34;429\&#34; data-end=\&#34;445\&#34;&gt;Winter Alchemy\u003C/em&gt;, a convivial gathering to welcome the winter season together. With warm drinks, spicy aromas, and small delights, it will be an opportunity to meet, chat, and enjoy the relaxed atmosphere of the holidays.\u003C/p&gt;\n\u003Cp data-start=\&#34;652\&#34; data-end=\&#34;842\&#34;&gt;During the evening, guests will be able to admire the illustration created—within the framework of the Winter Alchemy project—by the artist Aida of Manila Wall Art for the showroom’s window.\u003C/p&gt;\n\u003Cp data-start=\&#34;844\&#34; data-end=\&#34;1063\&#34;&gt;The artwork tells the magical journey of the butterfly, a symbol of transformation and inner strength. An iconographic message reminding us that believing in our own metamorphosis is the first step toward taking flight.\u003C/p&gt;\n\u003Cp data-start=\&#34;1065\&#34; data-end=\&#34;1296\&#34;&gt;Manila Wall Art is an artistic project founded by Aida Vila and Manu Martín. Their murals and large-format works combine realism with geometric and abstract elements, giving life to visually powerful and emotionally rich creations.\u003C/p&gt;\n\u003Cp data-start=\&#34;1298\&#34; data-end=\&#34;1624\&#34;&gt;Aida and Manu collaborate on interior design projects and are regular participants at industry fairs. They also create live installations at art festivals and various events, and they develop participatory projects in which the public becomes part of the creative process, giving rise to the co-creation of unique mural works.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1383,&#34;external_link&#34;:206,&#34;file&#34;:34,&#34;label&#34;:207},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;media&#34;:1385,&#34;title&#34;:273,&#34;excerpt&#34;:1379,&#34;type&#34;:130,&#34;date&#34;:294,&#34;city&#34;:295,&#34;hour&#34;:258,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1386,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:290,&#34;filesize&#34;:291,&#34;url&#34;:292,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1387},[],{&#34;prev&#34;:1389,&#34;next&#34;:1390},[],[],[1392,1393],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:302,&#34;path_no_lang&#34;:303},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:272,&#34;path_no_lang&#34;:272},{&#34;id&#34;:1395,&#34;fullPath&#34;:1396,&#34;path&#34;:347,&#34;title&#34;:1397,&#34;structure&#34;:1398,&#34;siblings&#34;:1421,&#34;slug&#34;:1424,&#34;i18n&#34;:1425,&#34;date&#34;:350,&#34;order&#34;:51},1241,&#34;https://apiicggallery.irisceramicagroup.com/en/events/winter-alchemy-berlin/&#34;,&#34;Winter Alchemy - Berlin&#34;,{&#34;seo_meta&#34;:1399,&#34;sections&#34;:1402,&#34;preview&#34;:1416},{&#34;title&#34;:1397,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1400,&#34;twitter&#34;:1401},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1403],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1404},[1405,1407,1409,1411,1415],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1406},&#34;\u003Cp&gt;On Thursday, November 27th, from 6:00 PM to 9:00 PM, the MJ Casa Berlin hosts an evening of conviviality to welcome the winter holidays together. With warm drinks, spicy aromas, and delightful treats, the event will be a chance to gather and enjoy a relaxed atmosphere accompanied by a DJ set from Mr. John Loveless.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1408,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;37\&#34; data-end=\&#34;354\&#34;&gt;The event will also be the ideal occasion to present \u003Cem data-start=\&#34;92\&#34; data-end=\&#34;113\&#34;&gt;The Alchemic Garden\u003C/em&gt;, the artwork created by Daniela Spoto on the window of the MJ Casa Berlin. The illustration is part of the collective project \u003Cem data-start=\&#34;244\&#34; data-end=\&#34;260\&#34;&gt;Winter Alchemy\u003C/em&gt;, which brings together all the European ICG Galleries in a multi-voiced artistic narrative.\u003C/p&gt;\n\u003Cp data-start=\&#34;356\&#34; data-end=\&#34;589\&#34;&gt;Drawing inspiration from her poetic imagery, Daniela Spoto has transformed nature into an alchemical garden inhabited by flowers and hybrid creatures suspended between the moon and the sun — a symbol of metamorphosis and rebirth.\u003C/p&gt;\n\u003Cp data-start=\&#34;591\&#34; data-end=\&#34;1030\&#34;&gt;For the winter holidays, in Milan, Paris, London, Berlin, and Marbella, the ICG Galleries will bring to life a magical journey that metaphorically turns showroom windows into gold, relying on the creativity of five international artists. Each artist is invited to interpret — through their own language and artistic style — the concept \u003Cem data-start=\&#34;929\&#34; data-end=\&#34;950\&#34;&gt;The Magical Journey\u003C/em&gt;, capturing the festive spirit through the theme of alchemical transformation.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1410,&#34;external_link&#34;:321,&#34;file&#34;:34,&#34;label&#34;:1354},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1412,&#34;external_link&#34;:1413,&#34;file&#34;:34,&#34;label&#34;:1414},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;https://www.irisceramicagroup.com/en/winter-alchemy/&#34;,&#34;Discover all the artworks&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:326,&#34;col_left&#34;:29,&#34;col_right&#34;:29},{&#34;media&#34;:1417,&#34;title&#34;:1397,&#34;excerpt&#34;:1420,&#34;type&#34;:130,&#34;date&#34;:338,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1418,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:333,&#34;filesize&#34;:334,&#34;url&#34;:335,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1419},[],&#34;\u003Cp&gt;On Thursday, November 27th, from 6:00 PM to 9:00 PM, the MJ Casa Berlin hosts an evening of conviviality to welcome the winter holidays together.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1422,&#34;next&#34;:1423},[],[],&#34;winter-alchemy-berlin&#34;,[1426,1427],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:347,&#34;path_no_lang&#34;:348},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:309,&#34;path_no_lang&#34;:309},{&#34;id&#34;:1429,&#34;fullPath&#34;:1430,&#34;path&#34;:383,&#34;title&#34;:355,&#34;structure&#34;:1431,&#34;siblings&#34;:1448,&#34;slug&#34;:380,&#34;i18n&#34;:1451,&#34;date&#34;:386,&#34;order&#34;:51},1221,&#34;https://apiicggallery.irisceramicagroup.com/en/events/controtempo-milano/&#34;,{&#34;sections&#34;:1432,&#34;seo_meta&#34;:1439,&#34;preview&#34;:1442},[1433],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1434},[1435,1437],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1436},&#34;\u003Cp&gt;On November 25th, \u003Cstrong&gt;MJ Casa Milano\u003C/strong&gt; hosts \u003Cstrong&gt;“Controtempo – Jazz Experience”,\u003C/strong&gt; a new event celebrating Jazz music and conviviality.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1438,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;For one evening, the showroom will transform into a place of connection and dialogue in a refined atmosphere. The Jazz melodies of \u003Cstrong&gt;Samantha Iorio and her band\u003C/strong&gt; will enliven the night, guiding the audience through an engaging and entertaining experience. The warm, elegant tones of Jazz will blend seamlessly with the MJ Casa space, creating an event that combines \u003Cstrong&gt;art, design, and emotion through live music.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;A special opportunity to enjoy the vibes of jazz, followed by a delightful aperitif.\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1440,&#34;twitter&#34;:1441},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1443,&#34;title&#34;:1446,&#34;excerpt&#34;:1447,&#34;type&#34;:130,&#34;date&#34;:376,&#34;city&#34;:132,&#34;hour&#34;:217,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1444,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:370,&#34;filesize&#34;:371,&#34;url&#34;:372,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1445},[],&#34;THE ICG GALLERY MILANO HOSTS “CONTROTEMPO – JAZZ EXPERIENCE”&#34;,&#34;\u003Cp&gt;On November 25th, the MJ Casa in Milan comes alive with the elegant Jazz sounds of Samantha Iorio and her band.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1449,&#34;next&#34;:1450},[],[],[1452,1453],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:383,&#34;path_no_lang&#34;:384},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:354,&#34;path_no_lang&#34;:354},{&#34;id&#34;:1455,&#34;fullPath&#34;:1456,&#34;path&#34;:424,&#34;title&#34;:1457,&#34;structure&#34;:1458,&#34;siblings&#34;:1476,&#34;slug&#34;:1479,&#34;i18n&#34;:1480,&#34;date&#34;:427,&#34;order&#34;:51},1194,&#34;https://apiicggallery.irisceramicagroup.com/en/events/opening-showroom-marbella/&#34;,&#34;Inauguration of the Marbella Showroom&#34;,{&#34;sections&#34;:1459,&#34;seo_meta&#34;:1469,&#34;preview&#34;:1472},[1460],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1461},[1462,1464,1466],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1463},&#34;\u003Cp&gt;Iris Ceramica Group opens a new MJ Casa in Marbella, strengthening its network in Spain\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1465,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;136\&#34; data-end=\&#34;482\&#34;&gt;Iris Ceramica Group announces the opening of a new MJ Casa in Marbella, expanding the Group’s network of showrooms in Spain alongside the already operating locations in Barcelona and Madrid. The new space will open on November 20th along the city’s main artery, a key hub for architecture, design, and high-end lifestyle on the Costa del Sol.\u003C/p&gt;\n\u003Cp data-start=\&#34;484\&#34; data-end=\&#34;827\&#34;&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1467,&#34;col_right&#34;:1468},&#34;\u003Cp data-start=\&#34;484\&#34; data-end=\&#34;827\&#34;&gt;The MJ Casa is conceived as an experiential space, where high-tech natural ceramic surfaces become a tangible expression of the Group’s core values: sustainability, innovation, research, and design culture. A space that goes beyond the traditional concept of a showroom, transforming into a place of knowledge, inspiration, and connection.\u003C/p&gt;\n\u003Cp data-start=\&#34;829\&#34; data-end=\&#34;1163\&#34;&gt;\n&#34;,&#34;\u003Cp data-start=\&#34;829\&#34; data-end=\&#34;1163\&#34;&gt;Marbella, nestled in the heart of the Costa del Sol, is synonymous with architectural elegance and contemporary design. The strategic choice of this city responds to the growing demand for innovative solutions for prestigious residential and commercial projects aimed at an international clientele attentive to quality and technology.\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1470,&#34;twitter&#34;:1471},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1473,&#34;title&#34;:1457,&#34;excerpt&#34;:1463,&#34;type&#34;:130,&#34;date&#34;:416,&#34;city&#34;:295,&#34;hour&#34;:417,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1474,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:410,&#34;filesize&#34;:411,&#34;url&#34;:412,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:413,&#34;width&#34;:414,&#34;height&#34;:414,&#34;sizes&#34;:1475},[],{&#34;prev&#34;:1477,&#34;next&#34;:1478},[],[],&#34;opening-showroom-marbella&#34;,[1481,1482],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:424,&#34;path_no_lang&#34;:425},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:390,&#34;path_no_lang&#34;:390},{&#34;id&#34;:1484,&#34;fullPath&#34;:1485,&#34;path&#34;:468,&#34;title&#34;:432,&#34;structure&#34;:1486,&#34;siblings&#34;:1509,&#34;slug&#34;:465,&#34;i18n&#34;:1512,&#34;date&#34;:386,&#34;order&#34;:51},1213,&#34;https://apiicggallery.irisceramicagroup.com/en/events/metamorphosis-the-unseen-is-the-real-story-berlin/&#34;,{&#34;sections&#34;:1487,&#34;seo_meta&#34;:1501,&#34;preview&#34;:1504},[1488],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1489},[1490,1492,1494,1496,1499],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1491},&#34;\u003Cp&gt;On \u003Cstrong&gt;November 20\u003C/strong&gt;, Iris Ceramica Group invites the public to discover a unique multisensory experience at the \u003Cstrong&gt;MJ Casa in Berlin \u003C/strong&gt;— a journey where appearances reveal much more than meets the eye. Surfaces transform before visitors’ eyes — not through magic, but through cutting-edge technology applied to ceramic materials.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1493,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Within the refined setting of the MJ Casa, metamorphosis unfolds as an immersive culinary experience. Food becomes a sensory language: it stimulates sight, plays with textures and sounds, awakens hidden emotions, and envelops guests in the enchantment of transformation — guided by the skilled hands of a chef-alchemist.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1495,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Following the success achieved at Milan’s Fuorisalone and London Design Week, the MJ Casa brings to Berlin \u003Cstrong&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/strong&gt;: an innovative technology developed by VBH and integrated with the ceramic surfaces of the Group’s brands. This system makes a high-definition audio-video setup completely invisible, blending the monitor seamlessly into the ceramic surface, which also serves as a sound resonator. The result: surfaces that conceal screens and speakers, amplifying sound and redefining interaction.\u003C/p&gt;\n\u003Cp&gt;A new example of \u003Cem&gt;beautility\u003C/em&gt; — the perfect fusion of beauty and functionality — this innovation transforms the experience of luxury interior design.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1497,&#34;col_right&#34;:1498},&#34;\u003Cp&gt;Completing the event, evocative video installations by visual artist Lorenza Liguori enhance the immersive dimension of the technology, bringing to life abstract yet realistic worlds that captivate the senses.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;With \u003Cstrong&gt;Metamorphosis\u003C/strong&gt;, the MJ Casa offers visitors an extraordinary experience where nothing is as it seems — a celebration of \u003Cstrong&gt;art, design, and technology\u003C/strong&gt; intertwined in the continuous transformation of matter.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1500,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;November 20\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;6:00 PM – 10:00 PM\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;MJ Casa – Auguststraße 6, 10117 Berlin\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Attendance by invitation only.\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1502,&#34;twitter&#34;:1503},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1505,&#34;title&#34;:460,&#34;excerpt&#34;:1508,&#34;type&#34;:130,&#34;date&#34;:416,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1506,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:454,&#34;filesize&#34;:455,&#34;url&#34;:456,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:457,&#34;height&#34;:458,&#34;sizes&#34;:1507},[],&#34;\u003Cp&gt;On November 20, Iris Ceramica Group invites the public to discover a unique multisensory experience at the MJ Casa in Berlin.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1510,&#34;next&#34;:1511},[],[],[1513,1514],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:468,&#34;path_no_lang&#34;:469},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:431,&#34;path_no_lang&#34;:431},{&#34;id&#34;:1516,&#34;fullPath&#34;:1517,&#34;path&#34;:504,&#34;title&#34;:1518,&#34;structure&#34;:1519,&#34;siblings&#34;:1537,&#34;slug&#34;:1540,&#34;i18n&#34;:1541,&#34;date&#34;:507,&#34;order&#34;:51},1250,&#34;https://apiicggallery.irisceramicagroup.com/en/events/winter-alchemy-london/&#34;,&#34;Winter Alchemy - London&#34;,{&#34;sections&#34;:1520,&#34;seo_meta&#34;:1530,&#34;preview&#34;:1533},[1521],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1522},[1523,1525,1527],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1524},&#34;\u003Cp data-start=\&#34;51\&#34; data-end=\&#34;254\&#34;&gt;On 12 November, the MJ Casa in London will host a convivial event to celebrate the start of the winter season. Framing the evening is the artwork on the gallery’s window, signed by Jessica Rose Bird.\u003C/p&gt;\n\u003Cp data-start=\&#34;256\&#34; data-end=\&#34;532\&#34;&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1526,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;256\&#34; data-end=\&#34;532\&#34;&gt;On 12 November, the MJ Casa on Old Street will welcome \u003Cem data-start=\&#34;315\&#34; data-end=\&#34;331\&#34;&gt;Winter Alchemy\u003C/em&gt;, a convivial moment to embrace the winter season together.\u003Cbr data-start=\&#34;390\&#34; data-end=\&#34;393\&#34; /&gt;During the evening, guests will have the chance to admire the illustration created by artist Jessica Rose Bird for the two gallery windows.\u003C/p&gt;\n\u003Cp data-start=\&#34;534\&#34; data-end=\&#34;932\&#34;&gt;The artwork, featuring her distinctive style that mixes charcoal-like linework with painting, evokes fashion and contemporary flair: an arctic fox “that changes its coat with the seasons, moving through a city and a landscape in transition. A moonlit city transformed by falling snow, while traditional festive stars and bright red winter flowers warm the heart of the season,” the artist explains.\u003C/p&gt;\n\u003Cp data-start=\&#34;934\&#34; data-end=\&#34;1434\&#34;&gt;\u003Cem data-start=\&#34;934\&#34; data-end=\&#34;950\&#34;&gt;Winter Alchemy\u003C/em&gt; is part of the namesake project developed for the winter holidays across all European ICG Galleries: Milan, Paris, London, Berlin and Marbella come together to create a magical journey that metaphorically turns showroom windows into gold. Five international female artists have been invited to express — each with her own language and artistic style — the concept of \u003Cem data-start=\&#34;1318\&#34; data-end=\&#34;1339\&#34;&gt;The Magical Journey\u003C/em&gt;, interpreting the spirit of the festive season through the theme of alchemical transformation.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1528,&#34;external_link&#34;:1413,&#34;file&#34;:34,&#34;label&#34;:1529},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Discover the Winter Alchemy project&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1531,&#34;twitter&#34;:1532},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1534,&#34;title&#34;:1518,&#34;excerpt&#34;:1524,&#34;type&#34;:130,&#34;date&#34;:496,&#34;city&#34;:497,&#34;hour&#34;:217,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1535,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:492,&#34;filesize&#34;:493,&#34;url&#34;:494,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1536},[],{&#34;prev&#34;:1538,&#34;next&#34;:1539},[],[],&#34;winter-a
