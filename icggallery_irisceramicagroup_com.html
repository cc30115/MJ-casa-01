lchemy-london&#34;,[1542,1543],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:504,&#34;path_no_lang&#34;:505},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:474,&#34;path_no_lang&#34;:474},{&#34;id&#34;:1545,&#34;fullPath&#34;:1546,&#34;path&#34;:553,&#34;title&#34;:512,&#34;structure&#34;:1547,&#34;siblings&#34;:1573,&#34;slug&#34;:550,&#34;i18n&#34;:1576,&#34;date&#34;:556,&#34;order&#34;:51},1178,&#34;https://apiicggallery.irisceramicagroup.com/en/events/dubai-design-week-2025/&#34;,{&#34;sections&#34;:1548,&#34;seo_meta&#34;:1564,&#34;preview&#34;:1567},[1549],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1550},[1551,1553,1555,1558,1560,1562],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1552},&#34;\u003Cp&gt;\u003Cstrong&gt;THE MAGICAL JOURNEY CONTINUES IN DUBAI\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1554,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;From 4 to 9 November, \u003Cstrong&gt;The Magical Journey\u003C/strong&gt; will be stopping at the \u003Cstrong&gt;Dubai Design Week,\u003C/strong&gt; in the pop-up space of the \u003Cstrong&gt;new MJ Casa\u003C/strong&gt; – which will be officially opened in February 2026.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1556,&#34;col_right&#34;:1557},&#34;\u003Cp&gt;In the \u003Cstrong&gt;Dubai Design District \u003C/strong&gt;(Building 6, Suite B101), in the Group’s new showroom, \u003Cstrong&gt;an immersive artistic installation \u003C/strong&gt;can be visited for the whole of the Design Week: a magical journey in three steps &amp;#8211; towards a new perception of ceramic matter &amp;#8211; reconnecting with the concept launched at Cersaie and showcasing it with a new video-morphing experience.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;In the first \u003Cstrong&gt;\u003Cem&gt;Breaking\u003C/em&gt;\u003C/strong&gt; phase, matter breaks up, is dissolved and changes shape. The second step is an act of purification that allows us to move away from traditional concepts and raise our perception of matter: \u003Cstrong&gt;\u003Cem&gt;Glowing.\u003C/em&gt;\u003C/strong&gt; Lastly, the \u003Cstrong&gt;\u003Cem&gt;Revealing\u003C/em&gt;\u003C/strong&gt; phase is the moment in which we become aware of the process and the change, seeing a new way of observing and interpreting matter.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1559,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;The journey is real, lived first-hand by immersing in the digital\u003Cstrong&gt; video morphing\u003C/strong&gt; of the \u003Cstrong&gt;visual artist\u003C/strong&gt; \u003Cstrong&gt;Lorenza Liguori, who interpreted the magical journey in all its three steps of transformation\u003C/strong&gt;, starting from a unique ceramic surface.\u003C/p&gt;\n\u003Cp&gt;At the end of the immersive journey is the \u003Cstrong&gt;Gallery in Dubai\u003C/strong&gt;, set up for the occasion in a pop-up version previewing the definitive concept of the showroom. A new space that joins those already found in the world’s main design, art and fashion capitals, including Milan, London, Paris, Berlin, Madrid, Barcelona and New York.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1561,&#34;external_link&#34;:528,&#34;file&#34;:34,&#34;label&#34;:1286},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1563,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;MJ Casa DUBAI\u003Cbr /&gt;\n\u003C/strong&gt;Dubai Design District &amp;#8211; Building 6, Suite B101\u003C/p&gt;\n\u003Cp&gt;4-8 November: 10.00 – 20.00\u003Cbr /&gt;\n9 November: by appointment only\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1565,&#34;twitter&#34;:1566},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1568,&#34;title&#34;:1571,&#34;excerpt&#34;:1572,&#34;type&#34;:130,&#34;date&#34;:545,&#34;city&#34;:546,&#34;hour&#34;:133,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1569,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:538,&#34;filesize&#34;:539,&#34;url&#34;:540,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:541,&#34;height&#34;:541,&#34;sizes&#34;:1570},[],&#34;THE MAGICAL JOURNEY CONTINUES IN DUBAI&#34;,&#34;\u003Cp&gt;\u003Cem&gt;From 4 to 9 November, the magical journey that began at Cersaie will be stopping at the Dubai Design Week in the pop-up space of the new MJ Casa.\u003C/em&gt;\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1574,&#34;next&#34;:1575},[],[],[1577,1578],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:553,&#34;path_no_lang&#34;:554},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:511,&#34;path_no_lang&#34;:511},{&#34;id&#34;:1580,&#34;fullPath&#34;:1581,&#34;path&#34;:591,&#34;title&#34;:1582,&#34;structure&#34;:1583,&#34;siblings&#34;:1600,&#34;slug&#34;:1603,&#34;i18n&#34;:1604,&#34;date&#34;:594,&#34;order&#34;:51},1130,&#34;https://apiicggallery.irisceramicagroup.com/en/events/the-london-icg-gallery-presents-richard-bryants-new-book-on-architectural-photography/&#34;,&#34;THE LONDON ICG GALLERY PRESENTS RICHARD BRYANT’S NEW BOOK ON ARCHITECTURAL PHOTOGRAPHY&#34;,{&#34;sections&#34;:1584,&#34;seo_meta&#34;:1591,&#34;preview&#34;:1594},[1585],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1586},[1587,1589],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1588},&#34;\u003Cp&gt;\u003Cstrong&gt;THE LONDON ICG GALLERY PRESENTS RICHARD BRYANT’S NEW BOOK ON ARCHITECTURAL PHOTOGRAPHY\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;On 29 October, the London MJ Casa will host \u003Cem&gt;“In Conversation with Richard Bryant”\u003C/em&gt;, an evening dedicated to the launch of the renowned British photographer’s new book, featuring a talk with Jonathan Glancey and the book’s co-authors.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1590,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Photography, architecture, and the creative process\u003C/strong&gt; will be the key themes of the evening, during which \u003Cstrong&gt;Jonathan Glancey\u003C/strong&gt;, architectural critic and writer and former correspondent for \u003Cem&gt;The Guardian\u003C/em&gt;, will interview \u003Cstrong&gt;Richard Bryant\u003C/strong&gt;, one of the most celebrated contemporary architectural photographers, to mark the release of his \u003Cstrong&gt;latest publication\u003C/strong&gt;.\u003C/p&gt;\n\u003Cp&gt;The new book, simply titled \u003Cem&gt;“\u003Cstrong&gt;Richard Bryant\u003C/strong&gt;”\u003C/em&gt;, is authored by \u003Cstrong&gt;Valeria Carullo\u003C/strong&gt;, Curator of Photographs at the Royal Institute of British Architects (RIBA), and \u003Cstrong&gt;Martin Caiger-Smith\u003C/strong&gt;, Head of the MA \u003Cem&gt;Curating the Art Museum\u003C/em&gt; at the Courtauld Institute of Art. It is published by \u003Cstrong&gt;Lund Humphries\u003C/strong&gt;, a long-established independent publisher specialising in art, architecture, and design.\u003C/p&gt;\n\u003Cp&gt;This \u003Cstrong&gt;first retrospective volume\u003C/strong&gt; dedicated to Bryant reveals how his work continued to shape the image of architecture throughout the 1990s, even as the medium transitioned from black and white to colour. Through its pages, the authors explore \u003Cstrong&gt;his career and influences\u003C/strong&gt;, placing his work in a broader context and illustrating the changes that have occurred in both the \u003Cstrong&gt;architectural profession\u003C/strong&gt; and \u003Cstrong&gt;photography as a medium\u003C/strong&gt; over the past five decades.\u003C/p&gt;\n\u003Cp&gt;The evening will be opened with remarks from the book’s co-authors, \u003Cstrong&gt;Valeria Carullo\u003C/strong&gt; and \u003Cstrong&gt;architect Eva Jiricna\u003C/strong&gt; — author of the book’s foreword — followed by a captivating conversation between \u003Cstrong&gt;Jonathan Glancey\u003C/strong&gt; and \u003Cstrong&gt;Richard Bryant\u003C/strong&gt; in front of an engaged audience of admirers and supporters of the photographer’s work.\u003C/p&gt;\n\u003Cp&gt;The event will offer a \u003Cstrong&gt;valuable opportunity\u003C/strong&gt; to reflect on the creative process behind architectural photography and the \u003Cstrong&gt;evolution of the discipline in recent decades\u003C/strong&gt;, reaffirming the role of the \u003Cstrong&gt;MJ Casa London\u003C/strong&gt; as a space for dialogue and exchange at the heart of the British capital.\u003C/p&gt;\n\u003Cp&gt;\u003Cem&gt;The event is private and by invitation only.\u003C/em&gt;\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1592,&#34;twitter&#34;:1593},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1595,&#34;title&#34;:1598,&#34;excerpt&#34;:1599,&#34;type&#34;:130,&#34;date&#34;:583,&#34;city&#34;:497,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1596,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:576,&#34;filesize&#34;:577,&#34;url&#34;:578,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:579,&#34;height&#34;:579,&#34;sizes&#34;:1597},[],&#34;Presentation of Richard Bryant’s new architectural photography book&#34;,&#34;\u003Cp&gt;On 29 October, the London MJ Casa will host \u003Cem&gt;“In Conversation with Richard Bryant”\u003C/em&gt;, an evening dedicated to the launch of the renowned British photographer’s new book, featuring a talk with Jonathan Glancey and the book’s co-authors.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1601,&#34;next&#34;:1602},[],[],&#34;the-london-icg-gallery-presents-richard-bryants-new-book-on-architectural-photography&#34;,[1605,1606],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:591,&#34;path_no_lang&#34;:592},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:560,&#34;path_no_lang&#34;:560},{&#34;id&#34;:1608,&#34;fullPath&#34;:1609,&#34;path&#34;:632,&#34;title&#34;:1610,&#34;structure&#34;:1611,&#34;siblings&#34;:1629,&#34;slug&#34;:629,&#34;i18n&#34;:1632,&#34;date&#34;:427,&#34;order&#34;:51},1189,&#34;https://apiicggallery.irisceramicagroup.com/en/events/inaugurazione-showroom-di-valencia/&#34;,&#34;Inauguration of the Valencia Showroom&#34;,{&#34;sections&#34;:1612,&#34;seo_meta&#34;:1622,&#34;preview&#34;:1625},[1613],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1614},[1615,1617,1619],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1616},&#34;\u003Cp&gt;Iris Ceramica Group expands its presence in Spain with the opening of the new MJ Casa in Valencia\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1618,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp data-start=\&#34;127\&#34; data-end=\&#34;507\&#34;&gt;Iris Ceramica Group announces an important new milestone in its growth path in Spain with the opening of the MJ Casa in Valencia, which joins the already active showrooms in Barcelona and Madrid. The new location will open on October 22nd in the prestigious Gran Via, the vibrant heart of international design where the leading brands of the sector showcase their collections.\u003C/p&gt;\n\u003Cp data-start=\&#34;509\&#34; data-end=\&#34;868\&#34;&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1620,&#34;col_right&#34;:1621},&#34;\u003Cp data-start=\&#34;509\&#34; data-end=\&#34;868\&#34;&gt;The MJ Casa is designed to be much more than a showroom of high-end natural ceramic surfaces: it is a space where visitors can experience the material and the Group’s values in both tangible and virtual form. Here, sustainability, innovation, and quality excellence are expressed through areas conceived to narrate research, technology and design culture.\u003C/p&gt;\n\u003Cp data-start=\&#34;870\&#34; data-end=\&#34;1273\&#34;&gt;\n&#34;,&#34;\u003Cp data-start=\&#34;870\&#34; data-end=\&#34;1273\&#34;&gt;The opening in Valencia further strengthens Iris Ceramica Group’s presence in one of the most dynamic and receptive markets in Europe. The third largest city in Spain and capital of Mediterranean design, Valencia is a strategic landmark. The choice of Gran Via highlights the Group’s intention to engage with a public of demanding professionals who are attuned to aesthetic and technological excellence.\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1623,&#34;twitter&#34;:1624},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1626,&#34;title&#34;:1610,&#34;excerpt&#34;:1616,&#34;type&#34;:130,&#34;date&#34;:624,&#34;city&#34;:625,&#34;hour&#34;:417,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1627,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:617,&#34;filesize&#34;:618,&#34;url&#34;:619,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:620,&#34;height&#34;:621,&#34;sizes&#34;:1628},[],{&#34;prev&#34;:1630,&#34;next&#34;:1631},[],[],[1633,1634],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:632,&#34;path_no_lang&#34;:633},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:598,&#34;path_no_lang&#34;:598},{&#34;id&#34;:1636,&#34;fullPath&#34;:1637,&#34;path&#34;:756,&#34;title&#34;:639,&#34;structure&#34;:1638,&#34;siblings&#34;:1701,&#34;slug&#34;:753,&#34;i18n&#34;:1704,&#34;date&#34;:594,&#34;order&#34;:51},1090,&#34;https://apiicggallery.irisceramicagroup.com/en/events/traces-flavours/&#34;,{&#34;sections&#34;:1639,&#34;seo_meta&#34;:1692,&#34;preview&#34;:1695},[1640],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1641},[1642,1644,1646,1649,1651],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1643},&#34;\u003Cp&gt;“TRACES &amp;amp; FLAVOURS” STOPS AT THE ICG GALLERY IN MILAN\u003C/p&gt;\n\u003Cp&gt;The journey of “Traces &amp;amp; Flavours” continues in October: after Berlin and London, the Milan showroom also becomes the stage for a creative symphony of art, gastronomy, and design with Idan Gilony.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1645,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;On October 15, the MJ Casa in Milan will host “Traces &amp;amp; Flavours,” the extraordinary event conceived by Berlin-based artist, designer, and creative director Idan Gilony.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:1645,&#34;col_left&#34;:1647,&#34;col_right&#34;:1648},&#34;\u003Cp&gt;During the evening, guests will be guided through an immersive journey that weaves together art, gastronomy, and creative expressions, transforming dinner into a unique, almost magical experience: a culinary voyage brought to life through an unrepeatable gastronomic performance.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;The surfaces of Iris Ceramica Group’s brands will be an integral part of the narrative: the sensory stage of the evening, where food and design merge. In particular, Sapienstone countertops, made eco-active thanks to Active Surfaces® technology, will enrich the performance by combining refined aesthetics with outstanding performance.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1650,&#34;col_left&#34;:1647,&#34;col_right&#34;:1648},&#34;\u003Cp&gt;The evening will be a unique and engaging occasion, where guests will play a central role, actively contributing to the creation of the final work.\u003C/p&gt;\n\u003Cp&gt;October 15, 2025\u003C/p&gt;\n\u003Cp&gt;7:00 PM\u003C/p&gt;\n\u003Cp&gt;MJ Casa Milan\u003C/p&gt;\n\u003Cp&gt;Via Santa Margherita, 4\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:1652},[1653,1658,1663,1668,1673,1678,1682,1687],{&#34;ID&#34;:1654,&#34;id&#34;:1654,&#34;title&#34;:658,&#34;filename&#34;:659,&#34;filesize&#34;:660,&#34;url&#34;:661,&#34;link&#34;:1655,&#34;alt&#34;:29,&#34;author&#34;:663,&#34;description&#34;:29,&#34;caption&#34;:658,&#34;name&#34;:1656,&#34;status&#34;:665,&#34;uploaded_to&#34;:1636,&#34;date&#34;:666,&#34;modified&#34;:666,&#34;menu_order&#34;:51,&#34;mime_type&#34;:667,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;icon&#34;:668,&#34;width&#34;:669,&#34;height&#34;:670,&#34;sizes&#34;:1657},1108,&#34;https://apiicggallery.irisceramicagroup.com/en/events/traces-flavours/https-freelanceeventsphotographer-co-uk-2-2/&#34;,&#34;https-freelanceeventsphotographer-co-uk-2-2&#34;,[],{&#34;ID&#34;:1659,&#34;id&#34;:1659,&#34;title&#34;:674,&#34;filename&#34;:675,&#34;filesize&#34;:676,&#34;url&#34;:677,&#34;link&#34;:1660,&#34;alt&#34;:29,&#34;author&#34;:663,&#34;description&#34;:29,&#34;caption&#34;:29,&#34;name&#34;:1661,&#34;status&#34;:665,&#34;uploaded_to&#34;:1636,&#34;date&#34;:680,&#34;modified&#34;:680, iew&#34;:1733},{&#34;title&#34;:1712,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1713,&#34;twitter&#34;:1714},&#34;Magnetic Dreamscapes - Berlin&#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1716],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1717},[1718,1720,1722,1725,1727,1729,1731],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1719},&#34;\u003Cp&gt;On September 11 and 12 at 6:00 PM, the MJ Casa in Berlin will host \u003Cem&gt;Magnetic Dreamscapes\u003C/em&gt;: an immersive experience inspired by the concept of Attract®*, the dry magnetic laying solution by Iris Ceramica Group.\u003C/p&gt;\n\u003Cp&gt;Two evenings of art, material, and imagination, where experimentation meets visual poetry.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1721,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Thursday, 09/11 – 6:00 PM to 9:00 PM\u003C/strong&gt;\u003Cbr /&gt;\nVernissage of the exhibition \u003Cem&gt;&amp;#8220;The Invisible Pull&amp;#8221;\u003C/em&gt; by Alice Brumello Luise\u003Cbr /&gt;\nCreative workshop with a live performance by the artist\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Friday, 09/12 – 6:00 PM to 9:00 PM\u003C/strong&gt;\u003Cbr /&gt;\nCreative workshop on dreamlike dioramas\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1723,&#34;external_link&#34;:774,&#34;file&#34;:34,&#34;label&#34;:1724},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Register Now&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1726,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;EXHIBITION – \u003Cem&gt;“The Invisible Pull”\u003C/em&gt; by Alice Brunello Louise\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;A mobile and suspended art installation composed of floating photographic collages that explore the theme of attraction as an invisible force — physical, emotional, and spiritual. The project reflects on what silently draws us in: places, emotions, memories, connections. The images portray metaphysical landscapes and contemplative voids, where emptiness becomes an integral part of the composition. The slow movement of the collages makes the energy that links them visible, evoking the constant tension between closeness and distance. The artwork invites viewers to lose themselves in these suspended constellations, following the subtle trace of what cannot be seen, but can be felt.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1728,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;CREATIVE WORKSHOP – Dreamlike Dioramas\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Visitors will be invited to take part in a creative game by designing “dioramas”: conceptual miniature worlds filled with endless possibilities. Within the defined space of each diorama, the boundaries of reality begin to dissolve. This transformation of space encourages participants to explore the flexibility of perception and to create dynamic, almost dreamlike landscapes that challenge the viewer’s expectations.\u003C/p&gt;\n\u003Cp&gt;At the end of the workshop, participants will have the chance to capture their dreamscape and take it home with them — just like a travel photograph.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1730,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Magnetic Dreamscapes\u003C/strong&gt; is a journey into the aesthetics of attraction, where art and technology blend into unique sensory experiences.\u003Cbr /&gt;\nJoin us for two evenings where you’ll rediscover the evocative power of imagination — and take home a fragment of your inner landscape.\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Registration opens soon.\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;*Magnetic laying system licensed by MagFace.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1732,&#34;external_link&#34;:774,&#34;file&#34;:34,&#34;label&#34;:1724},{&#34;path&#34;:29,&#34;fullPath&#34;:110},{&#34;media&#34;:1734,&#34;title&#34;:1737,&#34;excerpt&#34;:1738,&#34;type&#34;:130,&#34;date&#34;:796,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1735,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:790,&#34;filesize&#34;:791,&#34;url&#34;:792,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:457,&#34;height&#34;:458,&#34;sizes&#34;:1736},[],&#34;Magnetic Dreamscapes&#34;,&#34;\u003Cp&gt;On September 11 and 12 at 6:00 PM, the MJ Casa in Berlin will host \u003Cem&gt;Magnetic Dreamscapes. \u003C/em&gt;Two evenings of art, material, and imagination, where experimentation meets visual poetry.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1740,&#34;next&#34;:1741},[],[],[1743,1744],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:803,&#34;path_no_lang&#34;:804},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:762,&#34;path_no_lang&#34;:762},{&#34;id&#34;:1746,&#34;fullPath&#34;:1747,&#34;path&#34;:849,&#34;title&#34;:811,&#34;structure&#34;:1748,&#34;siblings&#34;:1771,&#34;slug&#34;:846,&#34;i18n&#34;:1774,&#34;date&#34;:852,&#34;order&#34;:51},1056,&#34;https://apiicggallery.irisceramicagroup.com/en/events/magnetic-summer-londra/&#34;,{&#34;sections&#34;:1749,&#34;seo_meta&#34;:1763,&#34;preview&#34;:1766},[1750],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1751},[1752,1754,1756,1759,1762],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1753},&#34;\u003Cp&gt;Magnetic Dreamscapes returns to London in a brand-new summer edition: an evening with an architectural soul that invites you to unleash your full creativity.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1755,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;On 24 July 2025, starting at 6:00 PM, the London MJ Casa will host Magnetic Summer: an immersive experience built around Attract®* – the dry magnetic installation system for ceramic surfaces by the Iris Ceramica Group Brands, and one of the most revolutionary technologies developed by Granitech.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1757,&#34;col_right&#34;:1758},&#34;\u003Cp&gt;Participants will be invited to take part in a workshop where they’ll create miniature dioramas: conceptual worlds filled with endless possibilities. Within the defined space of each diorama, the boundaries of reality dissolve. This spatial transformation encourages participants to explore flexible perceptions and to build dynamic, almost dreamlike landscapes that challenge the viewer’s expectations.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;At the end of the workshop, like a photograph from a journey, each dreamscape can be captured and taken home as a lasting memory.\u003C/p&gt;\n\u003Cp&gt;The event will be a chance to celebrate the carefree spirit of summer—through creativity, great company, food, and music.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1760,&#34;external_link&#34;:825,&#34;file&#34;:34,&#34;label&#34;:1761},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Register now for Magnetic Summer&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:828,&#34;col_left&#34;:29,&#34;col_right&#34;:29},{&#34;title&#34;:830,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34, rfect after-work break to unwind with good company, refreshing drinks, and vibrant music.\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n\u003Cp&gt;MJ Casa – Auguststraße 6, 10117 Berlin\u003Cbr /&gt;\nFrom 6:00 PM to 9:00 PM\u003Cbr /&gt;\nDJ Set by ZEDA VEGA – Disco, House, and Tropical vibes\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:1789,&#34;external_link&#34;:868,&#34;file&#34;:34,&#34;label&#34;:1790},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Attendance is free, but spots are limited —REGISTER HER to secure your place!&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1792,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;We look forward to welcoming you for a summer interlude filled with great sounds and a laid-back atmosphere.\u003C/p&gt;\n&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1794,&#34;twitter&#34;:1795},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:1797,&#34;title&#34;:882,&#34;excerpt&#34;:1800,&#34;type&#34;:130,&#34;date&#34;:883,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1798,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:878,&#34;filesize&#34;:879,&#34;url&#34;:880,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:127,&#34;height&#34;:127,&#34;sizes&#34;:1799},[],&#34;\u003Cp&gt;On Thursday, July 17, join us for SUMMER INTERLUDE, a relaxed summer evening on the terrace of MJ Casa\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1802,&#34;next&#34;:1803},[],[],[1805,1806],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:890,&#34;path_no_lang&#34;:891},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:856,&#34;path_no_lang&#34;:856},{&#34;id&#34;:1808,&#34;fullPath&#34;:1809,&#34;path&#34;:932,&#34;title&#34;:1810,&#34;structure&#34;:1811,&#34;siblings&#34;:1830,&#34;slug&#34;:929,&#34;i18n&#34;:1833,&#34;date&#34;:935,&#34;order&#34;:51},982,&#34;https://apiicggallery.irisceramicagroup.com/en/events/seminario-di-formazione-neue-praktiken-des-re-use-di-dipl-ing-jannes-wurps/&#34;,&#34;Seminar: Neue Praktiken des Re-Use by Dipl.-Ing. Jannes Wurps&#34;,{&#34;seo_meta&#34;:1812,&#34;sections&#34;:1815,&#34;preview&#34;:1825},{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1813,&#34;twitter&#34;:1814},{&#34;generic&#34;:902,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1816],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1817},[1818,1820,1823],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1819},&#34;\u003Cp&gt;On \u003Cstrong&gt;June 19, 2025\u003C/strong&gt;, we warmly invite architects and professionals to the \u003Cstrong&gt;MJ Casa\u003C/strong&gt; for an exclusive evening \u003Cstrong&gt;seminar\u003C/strong&gt; \u003Cstrong&gt;focusing on innovative and sustainable architectural practices\u003C/strong&gt; through the reuse of building materials.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1821,&#34;col_right&#34;:1822},&#34;\u003Cp&gt;The seminar will be \u003Cstrong&gt;led by Dipl.-Ing. Jannes Wurps\u003C/strong&gt;, Architect BDA from blrm Hamburg, and is officially \u003Cstrong&gt;recognized by the AK-Berlin\u003C/strong&gt; (Berlin Chamber of Architects) as a continuing education seminar.\u003C/p&gt;\n\u003Cp&gt;Set within the context of an ambitious urban development in \u003Cstrong&gt;Darmstadt’s Verlegerviertel\u003C/strong&gt;, the event presents a pioneering pilot project: a multifunctional building that integrates a kindergarten, youth center, and social services, built entirely from reclaimed materials — including components of the original structure on site.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;This project illustrates how architectural design can be shaped by available resources, enabling environmentally responsible, expressive, and socially impactful buildings. It highlights material reuse as both an ecological imperative and a creative design strategy.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1824,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Event Details\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Title: Neue Praktiken des Re-Use (New Practices of Re-Use)\u003Cbr /&gt;\nDate: June 19, 2025\u003Cbr /&gt;\nTime: 18:00–19:00 – Seminar | 19:00–20:00 – Aperitif\u003Cbr /&gt;\nLocation: MJ Casa – Auguststraße 6, 10117 Berlin\u003Cbr /&gt;\nSpeaker: Dipl.-Ing. Jannes Wurps, blrm Hamburg\u003Cbr /&gt;\nLanguage: German\u003Cbr /&gt;\nAccreditation: Recognized by the Berlin Chamber of Architects (AK-Berlin)\u003Cbr /&gt;\nParticipation: Limited to 20 attendees\u003C/p&gt;\n&#34;,{&#34;media&#34;:1826,&#34;title&#34;:1810,&#34;excerpt&#34;:1829,&#34;type&#34;:130,&#34;date&#34;:925,&#34;city&#34;:339,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1827,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:917,&#34;filesize&#34;:918,&#34;url&#34;:919,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:920,&#34;height&#34;:921,&#34;sizes&#34;:1828},[],&#34;\u003Cp&gt;On June 19, 2025, we warmly invite architects and professionals to the MJ Casa for an exclusive evening seminar focusing on innovative and sustainable architectural practices through the reuse of building materials.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1831,&#34;next&#34;:1832},[],[],[1834,1835],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:932,&#34;path_no_lang&#34;:933},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:897,&#34;path_no_lang&#34;:897},{&#34;id&#34;:1837,&#34;fullPath&#34;:1838,&#34;path&#34;:1028,&#34;title&#34;:1839,&#34;structure&#34;:1840,&#34;siblings&#34;:1894,&#34;slug&#34;:1897,&#34;i18n&#34;:1898,&#34;date&#34;:1031,&#34;order&#34;:51},1022,&#34;https://apiicggallery.irisceramicagroup.com/en/events/magnetic-dreamscape-milan/&#34;,&#34;MAGNETIC DREAMSCAPE Milan&#34;,{&#34;seo_meta&#34;:1841,&#34;sections&#34;:1845,&#34;preview&#34;:1889},{&#34;title&#34;:1842,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1843,&#34;twitter&#34;:1844},&#34;ICG GALLERY MILANO HOSTS THE “MAGNETIC DREAMSCAPES” EVENT&#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1846],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1847},[1848,1850,1853,1855,1856],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1849},&#34;\u003Cp&gt;On June 19 at 6pm, \u003Cstrong&gt;MJ Casa Milano\u003C/strong&gt; will host \u003Cstrong&gt;Magnetic Dreamscapes\u003C/strong&gt;: an immersive experience designed around \u003Cstrong&gt;Attract®\u003C/strong&gt;, the dry magnetic laying solution by Iris Ceramica Group.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1851,&#34;col_right&#34;:1852},&#34;\u003Cp&gt;Visitors will be invited to take part in a creative workshop to build their own \u003Cstrong&gt;diorama, \u003C/strong&gt;a conceptual miniature world filled with endless possibilities. Within the defined space of each diorama, the boundaries of reality dissolve.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;This transformation of space encourages participants to create dynamic, dreamlike landscapes that challenge the viewer’s expectations.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1854,&#34;col_left&#34;:1851,&#34;col_right&#34;:1852},&#34;\u003Cp&gt;This reimagining of space is made possible by \u003Cstrong&gt;Attract®\u003C/strong&gt;: \u003Cstrong&gt;the innovative and circular dry magnetic laying system \u003C/strong&gt;developed by \u003Cstrong&gt;Granitech for ceramic surfaces\u003C/strong&gt; of Iris Ceramica Group’s Brands.\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n\u003Cp&gt;During the evening, it will be possible to take part in the workshop at different time slots.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:953,&#34;col_left&#34;:29,&#34;col_right&#34;:29},{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:1857},[1858,1864,1869,1874,1879,1884],{&#34;ID&#34;:1859,&#34;id&#34;:1859,&#34;title&#34;:958,&#34;filename&#34;:959,&#34;filesize&#34;:960,&#34;url&#34;:961,&#34;link&#34;:1860,&#34;alt&#34;:29,&#34;author&#34;:663,&#34;description&#34;:29,&#34;caption&#34;:958,&#34;name&#34;:1861,&#34;status&#34;:665,&#34;uploaded_to&#34;:1837,&#34;date&#34;:964,&#34;modified&#34;:1862,&#34;menu_order&#34;:51,&#34;mime_type&#34;:667,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;icon&#34;:668,&#34;width&#34;:669,&#34;height&#34;:670,&#34;sizes&#34;:1863},1005,&#34;https://apiicggallery.irisceramicagroup.com/en/events/magnetic-dreamscape-milan/https-freelanceeventsphotographer-co-uk-conference-photographer-london-2/&#34;,&#34;https-freelanceeventsphotographer-co-uk-conference-photographer-london-2&#34;,&#34;2025-06-04 13:53:12&#34;,[],{&#34;ID&#34;:1865,&#34;id&#34;:1865,&#34;title&#34;:958,&#34;filename&#34;:968,&#34;filesize&#34;:969,&#34;url&#34;:970,&#34;link&#34;:1866,&#34;alt&#34;:29,&#34;author&#34;:663,&#34;description&#34;:29,&#34;caption&#3 e&#34;:1018,&#34;url&#34;:1019,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:457,&#34;height&#34;:458,&#34;sizes&#34;:1892},[],&#34;\u003Cp&gt;On June 19 at 6pm, MJ Casa Milano will host Magnetic Dreamscapes: an immersive experience designed around Attract®, the dry magnetic laying solution by Iris Ceramica Group.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1895,&#34;next&#34;:1896},[],[],&#34;magnetic-dreamscape-milan&#34;,[1899,1900],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1028,&#34;path_no_lang&#34;:1029},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:939,&#34;path_no_lang&#34;:939},{&#34;id&#34;:1902,&#34;fullPath&#34;:1903,&#34;path&#34;:1063,&#34;title&#34;:1904,&#34;structure&#34;:1905,&#34;siblings&#34;:1921,&#34;slug&#34;:1924,&#34;i18n&#34;:1925,&#34;date&#34;:1066,&#34;order&#34;:51},976,&#34;https://apiicggallery.irisceramicagroup.com/en/events/bottega-in-bloom-icg-gallery-milano-transforms-into-a-creative-atelier/&#34;,&#34;BOTTEGA IN BLOOM: ICG GALLERY MILANO TRANSFORMS INTO A CREATIVE ATELIER&#34;,{&#34;seo_meta&#34;:1906,&#34;sections&#34;:1909,&#34;preview&#34;:1916},{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1907,&#34;twitter&#34;:1908},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1910],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1911},[1912,1914],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1913},&#34;\u003Cp&gt;\u003Cstrong&gt;On May 27 the MJ Casa will transform into a lively multidisciplinary atelier: a true artistic workshop where creativity and craftsmanship come together to create an immersive experience.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1915,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;On 27 May the \u003Cstrong&gt;MJ Casa in Milan\u003C/strong&gt; will host the \u003Cstrong&gt;\u003Cem&gt;Bottega in Bloom\u003C/em&gt;\u003C/strong&gt; workshop, becoming a vibrant creative space where artistic disciplines merge in a dynamic environment. A place where the boundaries between art forms dissolve, giving way to experimentation and imagination.\u003C/p&gt;\n\u003Cp&gt;The day will be dedicated to the poetry of nature, thanks to a workshop led by the London-based studio \u003Cstrong&gt;Wax Atelier\u003C/strong&gt;. Through the ancient art of waxing, participants will be invited to preserve the beauty of flowers—capturing their delicate essence as a symbol of rebirth and impermanence.\u003C/p&gt;\n\u003Cp&gt;&amp;nbsp;\u003C/p&gt;\n&#34;,{&#34;media&#34;:1917,&#34;title&#34;:1904,&#34;excerpt&#34;:1920,&#34;type&#34;:130,&#34;date&#34;:1056,&#34;city&#34;:132,&#34;hour&#34;:340,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1918,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1052,&#34;filesize&#34;:1053,&#34;url&#34;:1047,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1919},[],&#34;\u003Cp&gt;On May 27 the MJ Casa will transform into a lively multidisciplinary atelier: a true artistic workshop where creativity and craftsmanship come together to create an immersive experience.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1922,&#34;next&#34;:1923},[],[],&#34;bottega-in-bloom-icg-gallery-milano-transforms-into-a-creative-atelier&#34;,[1926,1927],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1063,&#34;path_no_lang&#34;:1064},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:1035,&#34;path_no_lang&#34;:1035},{&#34;id&#34;:1929,&#34;fullPath&#34;:1930,&#34;path&#34;:1153,&#34;title&#34;:1071,&#34;structure&#34;:1931,&#34;siblings&#34;:1976,&#34;slug&#34;:1150,&#34;i18n&#34;:1979,&#34;date&#34;:1156,&#34;order&#34;:51},819,&#34;https://apiicggallery.irisceramicagroup.com/en/events/clerkenwell-design-week-2025/&#34;,{&#34;city&#34;:1073,&#34;title&#34;:1074,&#34;excerpt&#34;:1075,&#34;seo_meta&#34;:1932,&#34;date&#34;:1082,&#34;hour&#34;:1083,&#34;sections&#34;:1935,&#34;preview&#34;:1971},{&#34;title&#34;:1077,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1933,&#34;twitter&#34;:1934},{&#34;generic&#34;:1080,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1936],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1937},[1938,1939,1941,1944,1947,1949,1951,1954,1957,1960,1962,1965,1968],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:1088},{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1940,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;For Clerkenwell Design Week 2025 (20,21,23 May), Iris Ceramica Group invites guests on a multisensory journey inside its London MJ Casa, where appearances go beyond the surface. Ceramic materials are transformed: this isn’t magic, but cutting-edge technology applied to ceramics.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1942,&#34;col_right&#34;:1943},&#34;\u003Cp&gt;\u003Cstrong&gt;The Concept\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;The \u003Cstrong&gt;butterfly\u003C/strong&gt;, a metaphor for the \u003Cstrong&gt;aesthetic quality of ceramics\u003C/strong&gt;, becomes the emblem of transformation through its generative process. With \u003Cem&gt;“\u003Cstrong&gt;Metamorphosis – The Unseen Is the Real Story\u003C/strong&gt;”\u003C/em&gt;, Iris Ceramica Group \u003Cstrong&gt;encourages reflection on perception and transformation\u003C/strong&gt;, blending materiality with digital video art.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;\u003Cstrong&gt;The Experience\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Inside the Clerkenwell showroom, this metamorphosis unfolds through an \u003Cstrong&gt;immersive culinary \u003C/strong&gt;experience divided into four sensory “stations”: eyes, ears, heart, and alchemy. Food becomes more than nourishment—it’s a playful experience for the senses. It stimulates the eyes, plays with textures and sounds, uncovers hidden emotions, and envelops guests in the magic of transformation, guided by the hands of an alchemist-chef.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1945,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1097,&#34;filesize&#34;:1098,&#34;url&#34;:1099,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:541,&#34;height&#34;:541,&#34;sizes&#34;:1946},[],{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1948,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;Agenda\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Tuesday, 20 May\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;6:00–9:00 PM AIA UK Excellence Awards Insights Night\u003Cbr /&gt;\n\u003C/strong&gt;\u003Cbr /&gt;\nWinners of the \u003Cem&gt;AIA UK Excellence in Design Award\u003C/em&gt; will meet the Clerkenwell Design Week audience, personally presenting their prestigious projects. During this open event, the winner of the \u003Cem&gt;ICG Award\u003C/em&gt; will also be announced and celebrated.\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Wednesday, 21 May\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;6:00–9:00 PM Metamorphosis – The Unseen Is the Real Story\u003Cbr /&gt;\n\u003C/strong&gt;\u003Cbr /&gt;\nAn immersive culinary experience\u003Cbr /&gt;\n\u003Cstrong&gt;7:00 PM Official launch of Alchimia &amp;amp; Iris Ceramica Group, \u003C/strong&gt;with:\u003Cbr /&gt;\n\u003Cem&gt;Federica Minozzi\u003C/em&gt;, CEO, Iris Ceramica Group\u003Cbr /&gt;\n\u003Cem&gt;Jeroen van den Hurk\u003C/em&gt;, CEO, Alchimia\u003Cbr /&gt;\n\u003Cem&gt;Lorenza Liguori\u003C/em&gt;, visual artist\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;Thursday, 22 May\u003C/strong&gt;\u003Cbr /&gt;\n\u003Cstrong&gt;6:00–9:00 Moonlight &amp;amp; Digital Visions\u003Cbr /&gt;\n\u003C/strong&gt;\u003Cbr /&gt;\nExplore the MJ Casa and discover new technological applications in ceramics, including \u003Cem&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/em&gt; and \u003Cem&gt;Moonlight\u003C/em&gt;. Immerse yourself in five exclusive 3D digital artworks by Lorenza Liguori, accompanied by live music performances.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1950,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;\u003Cstrong&gt;AIA UK DESIGN AWARDS INSIGHTS NIGHT: AN EVENING DEDICATED TO ARCHITECTURAL EXCELLENCE AT THE ICG GALLERY DURING CLERKENWELL DESIGN WEEK\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;\u003Cstrong&gt;On 20 May, at the opening night of Clerkenwell Design Week 2025, Iris Ceramica Group will host a special event at London MJ Casa in collaboration with AIA UK, celebrating the winning projects of their “Excellence in Design Awards”\u003C/strong&gt;.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:1950,&#34;col_left&#34;:1952,&#34;col_right&#34;:1953},&#34;\u003Cp&gt;The long-standing partnership between \u003Cstrong&gt;Iris Ceramica Group\u003C/strong&gt; and the \u003Cstrong&gt;American Institute of Architects\u003C/strong&gt; \u003Cstrong&gt;– UK Chapter\u003C/strong&gt; continues with an evening dedicated to \u003Cstrong&gt;design quality\u003C/strong&gt;, \u003Cstrong&gt;innovation\u003C/strong&gt;, and \u003Cstrong&gt;sustainability\u003C/strong&gt;—core values shared and promoted through the Group’s active support of the competition. For the 2025 edition, the Awards introduced entirely new categories and, for the first time, recognised only projects completed within the United Kingdom, further highlighting the growing relevance of British architecture on the international stage.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;The jury, chaired by \u003Cstrong&gt;Alison Brooks\u003C/strong&gt; (Founding Principal &amp;amp; Creative Director, Alison Brooks Architects), featured leading voices in architecture and engineering: \u003Cstrong&gt;DaeWha Kang\u003C/strong&gt; (Founder, DaeWha Kang Design), \u003Cstrong&gt;Matthias Schuler\u003C/strong&gt; (Founder &amp;amp; Managing Partner, TransSolar Climate Engineering), \u003Cstrong&gt;Rob Partridge\u003C/strong&gt; (Design Director, AKT II Engineering), \u003Cstrong&gt;Ellie Stathaki\u003C/strong&gt; (Architecture &amp;amp; Environment Director, \u003Cem&gt;Wallpaper\u003C/em&gt; Magazine), and \u003Cstrong&gt;Margherita Giannoni\u003C/strong&gt; (UK PR &amp;amp; Communication Manager, Iris Ceramica Group).\u003C/p&gt;\n\u003Cp&gt;To mark this special occasion, \u003Cstrong&gt;Federica Minozzi\u003C/strong&gt;, CEO of Iris Ceramica Group, will personally present the \u003Cstrong&gt;ICG Award\u003C/strong&gt;—a prize reserved for the project that best embodies the Group’s core values of \u003Cstrong&gt;Sustainability\u003C/strong&gt;, \u003Cstrong&gt;Innovation\u003C/strong&gt;, and \u003Cstrong&gt;Excellence in Quality\u003C/strong&gt;.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1955,&#34;col_right&#34;:1956},&#34;\u003Cp&gt;\u003Cstrong&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Following its successful debut at Milan’s Fuorisalone\u003Cstrong&gt;, the MJ Casa will present \u003Cem&gt;Alchimia &amp;amp; Iris Ceramica Group\u003C/em&gt; to the UK market for the first time\u003C/strong&gt;. Developed by \u003Cstrong&gt;VBH\u003C/strong&gt;, this cutting-edge technology is fully compatible with the Group’s ceramic surfaces and redefines \u003Cstrong&gt;interior design\u003C/strong&gt;. The innovation allows ceramic slabs to seamlessly conceal and reveal screens and audio-video systems, transforming the surface into a monitor and sound diffuser. At first glance invisible, this integrated solution brings to life a ceramic material in constant metamorphosis—ready to unveil entirely new dimensions of experience.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Enhancing this innovation is a series of evocative \u003Cstrong&gt;video installations\u003C/strong&gt; created by international visual artist \u003Cstrong&gt;Lorenza Liguori\u003C/strong&gt;, who crafts abstract yet tangible dreamscapes. Her work fuses diverse materials, colors, substances, and forms into immersive 3D objects, often featuring human faces and figures to remind viewers of the connection between imagined and real worlds.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1958,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1113,&#34;filesize&#34;:1114,&#34;url&#34;:1115,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:541,&#34;height&#34;:1116,&#34;sizes&#34;:1959},[],{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:1961,&#34;col_left&#34;:1955,&#34;col_right&#34;:1956},&#34;\u003Cp&gt;\u003Cstrong&gt;Moonlight\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Alongside \u003Cem&gt;Alchimia &amp;amp; Iris Ceramica Group \u003C/em&gt;and the latest ceramic surfaces innovations, visitors will discover \u003Cstrong&gt;Moonlight\u003C/strong&gt;: the ultra-thin, backlit ceramic slab introduced at Cersaie 2024. Inspired by the aesthetics of marble, granite, and onyx, this naturally translucent material—enhanced by refined raw materials and paired with a special \u003Cstrong&gt;LED panel\u003C/strong&gt;—\u003Cstrong&gt;emits a gentle, moon-like glow that elevates any interior space with elegance and warmth.\u003C/strong&gt;\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1963,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1122,&#34;filesize&#34;:1123,&#34;url&#34;:1124,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:1125,&#34;height&#34;:1126,&#34;sizes&#34;:1964},[],{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:1961,&#34;col_left&#34;:1966,&#34;col_right&#34;:1967},&#34;\u003Cp&gt;\u003Cstrong&gt;SAPIENSTONE DRESS CODE \u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;Sapienstone presents “Dress Code by Jaime Beriestain”, an innovative collection combining fashion, design and ceramics to breathe new life into spaces. The aesthetic is inspired by Parisian interiors and Haussmannian palaces, rich in elegance and material contrasts. Beriestain transforms ceramics into a signature material, playing with sophisticated textures, versatile formats and a Deeply Chic palette. The effect is that of refined, enveloping and personalised environments, where every surface becomes an element of style. The details are reminiscent of haute couture, with meticulous finishes and a distinctive artistic touch.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;At the heart of the project is the 4D technology that gives visual depth and a surprising material effect. Thanks to the advanced technology of Sapienstone and the know-how of the Iris Ceramica Group, Jaime Beriestain has created an exclusive and unprecedented collection, revolutionising the canons of ceramics and redefining the expressive possibilities of this material. Each surfaces does not merely clad a space, but becomes an integral part of the environment, adding an artistic and sartorial\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:1095,&#34;media_type&#34;:121,&#34;image&#34;:1969,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1133,&#34;filesize&#34;:1134,&#34;url&#34;:1135,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:1136,&#34;height&#34;:1137,&#34;sizes&#34;:1970},[],{&#34;media&#34;:1972,&#34;title&#34;:1071,&#34;excerpt&#34;:1975,&#34;type&#34;:130,&#34;date&#34;:1146,&#34;city&#34;:497,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1973,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1142,&#34;filesize&#34;:1143,&#34;url&#34;:1080,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;width&#34;:173,&#34;height&#34;:173,&#34;sizes&#34;:1974},[],&#34;\u003Cp&gt;For Clerkenwell Design Week 2025, Iris Ceramica Group presents a dynamic three-day program celebrating arts &amp;amp; design, centered around the theme of &amp;#8216;Metamorphosis.&amp;#8217;\u003C/p&gt;\n&#34;,{&#34;prev&#34;:1977,&#34;next&#34;:1978},[],[],[1980,1981],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1153,&#34;path_no_lang&#34;:1154},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:1070,&#34;path_no_lang&#34;:1070},{&#34;id&#34;:1983,&#34;fullPath&#34;:1984,&#34;path&#34;:1191,&#34;title&#34;:1161,&#34;structure&#34;:1985,&#34;siblings&#34;:2002,&#34;slug&#34;:1188,&#34;i18n&#34;:2005,&#34;date&#34;:1194,&#34;order&#34;:51},322,&#34;https://apiicggallery.irisceramicagroup.com/en/events/bottega-in-bloom/&#34;,{&#34;seo_meta&#34;:1986,&#34;sections&#34;:1989,&#34;preview&#34;:1997},{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:1987,&#34;twitter&#34;:1988},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[1990],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:1991},[1992,1994],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:1993},&#34;\u003Cp&gt;On May 2nd and 3rd, the MJ Casa will be transformed into a vibrant multidisciplinary atelier—an artistic hub where creativity and craftsmanship converge, offering an immersive experience.\u003C/p&gt;\n\u003Cp&gt;This dynamic space will dissolve the boundaries between artistic disciplines, fostering experimentation and imagination.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:1995,&#34;col_right&#34;:1996},&#34;\u003Cp&gt;\u003Cstrong&gt;Friday, May 2nd: Spring in Bloom with Wax Atelier\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;The first day will celebrate the poetry of nature with Spring in Bloom, a workshop curated by the London-based Wax Atelier. Through the ancient art of waxing, participants will learn to preserve the ephemeral beauty of flowers, capturing their delicate essence as a symbol of renewal and impermanence.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;\u003Cstrong&gt;Saturday, May 3rd: Hacked Surfaces with Bottega d&amp;#8217;Arte\u003C/strong&gt;\u003C/p&gt;\n\u003Cp&gt;The second day will be dedicated to innovation and reinvention with Hacked Surfaces, a hands-on ceramic workshop. Guided by Bottega d’Arte and working with terracotta pieces from the Iris Ceramica brand, participants will explore techniques of artistic hacking, restoration, and reinterpretation—creating one-of-a-kind pieces inspired by both ceramics and the Japanese art of ikebana. Each creation will serve as a unique keepsake, encapsulating the essence of this creative journey.\u003C/p&gt;\n&#34;,{&#34;media&#34;:1998,&#34;title&#34;:1182,&#34;excerpt&#34;:2001,&#34;type&#34;:130,&#34;date&#34;:1184,&#34;city&#34;:339,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:1999,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1177,&#34;filesize&#34;:1178,&#34;url&#34;:1179,&#34;alt&#34;:29,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:413,&#34;width&#34;:457,&#34;height&#34;:1180,&#34;sizes&#34;:2000},[],&#34;\u003Cp&gt;On May 2nd and 3rd, the MJ Casa will be transformed into a vibrant multidisciplinary atelier—an artistic hub where creativity and craftsmanship converge, offering an immersive experience. This dynamic space will dissolve the boundaries between artistic disciplines, fostering experimentation and imagination.\u003C/p&gt;\n&#34;,{&#34;prev&#34;:2003,&#34;next&#34;:2004},[],[],[2006,2007],{&#34;lang&#34;:8,&#34;locale&#34;:140,&#34;path&#34;:1191,&#34;path_no_lang&#34;:1192},{&#34;lang&#34;:9,&#34;locale&#34;:144,&#34;path&#34;:1160,&#34;path_no_lang&#34;:1160},{&#34;id&#34;:2009,&#34;fullPath&#34;:2010,&#34;path&#34;:1235,&#34;title&#34;:1199,&#34;structure&#34;:2011,&#34;siblings&#34;:2033,&#34;slug&#34;:1232,&#34;i18n&#34;:2036,&#34;date&#34;:1238,&#34;order&#34;:51},893,&#34;https://apiicggallery.irisceramicagroup.com/en/events/metamorphosis-milan-design-week-2025/&#34;,{&#34;preview&#34;:2012,&#34;sections&#34;:2018,&#34;seo_meta&#34;:2030},{&#34;media&#34;:2013,&#34;title&#34;:1199,&#34;excerpt&#34;:2017,&#34;type&#34;:130,&#34;date&#34;:1210,&#34;city&#34;:132,&#34;hour&#34;:584,&#34;address&#34;:29,&#34;address_link&#34;:29},{&#34;media_type&#34;:121,&#34;image&#34;:2014,&#34;autoplay&#34;:11,&#34;provider&#34;:34,&#34;video&#34;:34,&#34;video_id&#34;:29,&#34;poster&#34;:34},{&#34;filename&#34;:1204,&#34;filesize&#34;:1205,&#34;url&#34;:1206,&#34;alt&#34;:2015,&#34;caption&#34;:29,&#34;type&#34;:121,&#34;subtype&#34;:413,&#34;width&#34;:541,&#34;height&#34;:541,&#34;sizes&#34;:2016},&#34;Milano Design Week Hero&#34;,[],&#34;\u003Cp&gt;Alchemy, sound lights, digital canvases, interactive videos. Iris Ceramica Group interprets the Fuorisalone 2025 theme “Connected Worlds” in a multi-sensory narration where everything seems something else, where boundaries fade and perceptions are distorted.\u003C/p&gt;\n&#34;,[2019],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:2020},[2021,2022,2024,2027],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:11,&#34;title&#34;:2017},{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:2023,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Lights become musical instruments and surfaces appear and disappear, changing their skin. But this is not magic: it is pioneering technology applied to ceramics. The boundary between reality and illusion fades as technological innovation showcases the surrounding world in a new light.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:2025,&#34;col_right&#34;:2026},&#34;\u003Cp&gt;Through digital installations, luminous video-mapping and synchronised sounds, visitors enter a new dimension in which space is transformed, time dissolves and matter takes on a new identity.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;The butterfly, a representation of the aesthetic quality of ceramics, through its generative process becomes an emblem of metamorphosis itself.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:11,&#34;page_link&#34;:2028,&#34;external_link&#34;:1223,&#34;file&#34;:34,&#34;label&#34;:2029},{&#34;path&#34;:29,&#34;fullPath&#34;:110},&#34;Sign Up&#34;,{&#34;title&#34;:29,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:2031,&#34;twitter&#34;:2032},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;prev&#34;:2034,&#34;next&#34;:2035},[],[],[2037,2038],{&#34;la utta l’anima artistica e tecnologica di Iris Ceramica Group.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Uno spazio non solo commerciale, ma luogo di incontro dove interagire, ispirarsi, informarsi e alimentare la propria creatività, vero e proprio punto di riferimento della comunità che ruota attorno al mondo dell’architettura.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Reale e virtuale: lo spazio espositivo di Iris Ceramica Group a Milano è un’esperienza “phigital”, fisica e digitale.\u003C/p&gt;\n\u003Cp&gt;Ben oltre la classica esposizione di materiali, lo showroom esprime tutta l’anima artistica e tecnologica di Iris Ceramica Group.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:2062,&#34;location_filter&#34;:132},&#34;SectionEventsList&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:34,&#34;page_link&#34;:2064,&#34;external_link&#34;:29,&#34;file&#34;:34,&#34;label&#34;:2066},{&#34;path&#34;:84,&#34;fullPath&#34;:2065},&#34;/it/contatti/&#34;,&#34;Contattaci&#34;,{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:2068},[2069,2084,2097,2109,2120,2132,2143],{&#34;ID&#34;:2070,&#34;id&#34;:2070,&#34;title&#34;:2071,&#34;filename&#34;:2072,&#34;filesize&#34;:2073,&#34;url&#34;:2074,&#34;link&#34;:2075,&#34;alt&#34;:2076,&#34;author&#34;:2077,&#34;description&#34;:29,&#34;caption&#34;:29,&#34;name&#34;:2078,&#34;status&#34;:665,&#34;uploaded_to&#34;:2042,&#34;date&#34;:2079,&#34;modified&#34;:2080,&#34;menu_order&#34;:51,&#34;mime_type&#34;:667,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;icon&#34;:668,&#34;width&#34;:2081,&#34;height&#34;:2082,&#34;sizes&#34;:2083},503,&#34;ICG_Gallery-Locations_Milan-Carousel_1&#34;,&#34;ICG_Gallery-Locations_Milan-Carousel_1.jpg&#34;,385829,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/03/ICG_Gallery-Locations_Milan-Carousel_1.jpg&#34;,&#34;https://apiicggallery.irisceramicagroup.com/locations/icg-gallery-milano/icg_gallery-locations_milan-carousel_1/&#34;,&#34;MJ Casa - Milan Carousel 01&#34;,& {&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:2185},&#34;\u003Cp data-start=\&#34;259\&#34; data-end=\&#34;537\&#34;&gt;Nel cuore della Toscana, la MJ Casa di Carrara rappresenta un punto d’incontro tra materia, tecnologia e cultura del design. In questo spazio, le superfici ceramiche diventano protagoniste di un racconto che unisce estetica, innovazione e sostenibilità.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:2187,&#34;col_right&#34;:2188},&#34;\u003Cp data-start=\&#34;539\&#34; data-end=\&#34;792\&#34;&gt;La Gallery è concepita come un luogo esperienziale, dove la materia si fa linguaggio e i valori del Gruppo prendono forma concreta: ricerca costante, eccellenza produttiva e attenzione al dialogo con architetti, designer e professionisti del progetto.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Carrara, città simbolo della lavorazione dei materiali nobili, offre il contesto ideale per esprimere la vocazione del Gruppo alla sperimentazione e all’evoluzione della materia ceramica. All’interno della Gallery trovano spazio le principali tecnologie sviluppate da Iris Ceramica Group presentate in un ambiente che valorizza il rapporto tra innovazione, artigianalità e bellezza naturale.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:34,&#34;page_link&#34;:2190,&#34;external_link&#34;:29,&#34;file&#34;:34,&#34;label&#34;:2066},{&#34;path&#34;:84,&#34;fullPath&#34;:2065},{&#34;title&#34;:2179,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:2192,&#34;twitter&#34;:2193},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:2195,&#34;title&#34;:2203,&#34;excerpt&#34;:2204,&#34;type&#34;:2163,&#34;date&#34;:584,&#34;city&#34;:34,&#34;hour&#34;:584,&#34;address&#34;:220 ofessionisti per stimolare la collaborazione e l&#39;innovazione.&#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[2228],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:2229},[2230,2232,2236,2237,2238,2240],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:2231},&#34;\u003Cp&gt;La MJ Casa Paris è uno spazio innovativo dedicato ad architetti, designer e professionisti dell&amp;#8217;interior design, concepito per stimolare la collaborazione e l&amp;#8217;innovazione.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:2233,&#34;col_left&#34;:2234,&#34;col_right&#34;:2235},&#34;\u003Cp&gt;Questo spazio multifunzionale è un ambiente dinamico dove si svolgono eventi, workshop e discussioni professionali, promuovendo l&amp;#8217;eccellenza e l&amp;#8217;esclusività in ogni progetto.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Situata nel quartiere del Petit-Montrouge, al 39 Rue d&amp;#8217;Alésia, la galleria funge da laboratorio creativo.\u003C/p&gt;\n\u003Cp&gt;Qui, i professionisti possono scoprire soluzioni all&amp;#8217;avanguardia per interni ed esterni, pavimentazioni, rivestimenti e superfici per cucine, sia per residenze private che per il settore dell&amp;#8217;ospitalità.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;La galleria incarna l&amp;#8217;impegno di Iris Ceramica Group nella ricerca e nello sviluppo di soluzioni tecnologiche innovative, combinando creatività e funzionalità per soddisfare le esigenze del design contemporaneo.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:2234,&#34;col_right&#34;:2235},{&#34;acf_fc_layout&#34;:2062,&#34;location_filter&#34;:176},{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:34,&#34;page_link&#34;:2239,&#34;external_link&#34;:29,&#34;file&#34;:34,&#34;label&# 63,&#34;col_right&#34;:2364},&#34;\u003Cp&gt;Più di un semplice showroom, MJ Casa Madrid è un luogo di incontro e di ispirazione, dove eventi, workshop e confronti professionali trovano spazio per dare valore all’esclusività di ogni realizzazione.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Situata strategicamente nel cuore di Madrid, in Paseo de Recoletos 6, la gallery è stata concepita come un vero e proprio laboratorio creativo, in cui esplorare le migliori soluzioni per interni ed esterni, pavimentazioni e rivestimenti, oltre a superfici per cucine, sia per ambienti residenziali che per il settore della ristorazione e dell’ospitalità.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:2062,&#34;location_filter&#34;:2366},&#34;madrid&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:34,&#34;page_link&#34;:2368,&#34;external_link&#34;:29,&#34;file&#34;:34,&#34;label&#34;:2066},{&#34;path&#34;:84,&#34;fullPath&#34;:2065},{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:2370},[2371,2383,2397,2409,2420],{&#34;ID&#34;:2372,&#34;id&#34;:2372,&#34;title&#34;:2373,&#34;filename&#34;:2374,&#34;filesize&#34;:2375,&#34;url&#34;:2376,&#34;link&#34;:2377,&#34;alt&#34;:2378,&#34;author&#34;:2077,&#34;description&#34;:29,&#34;caption&#34;:29,&#34;name&#34;:2379,&#34;status&#34;:665,&#34;uploaded_to&#34;:2347,&#34;date&#34;:2380,&#34;modified&#34;:2381,&#34;menu_order&#34;:51,&#34;mime_type&#34;:667,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;icon&#34;:668,&#34;width&#34;:1116,&#34;height&#34;:189,&#34;sizes&#34;:2382},591,&#34;ICG_Gallery-Locations_Madrid-Carousel_1&#34;,&#34;ICG_Gallery-Locations_Madrid-Carousel_1.jpg&#34;,239012,&#34;https://apiicggallery.irisceramicagroup.com/wp-content/uploads/2025/03/ICG_Gallery-Locations_Madrid-Carousel_1.jpg&#34;,&#34;https://apiicggallery.irisceramicagroup.com/locations/icg-gallery-madrid/icg_gallery-locations_madrid-carousel_1/&#34;,&#34;MJ Casa - Madrid Carousel 01&#34;,&#34;icg_gallery-locations_madrid-carousel_1&#34;,&#3 view&#34;:2572},[2559],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:2560},[2561,2563,2566,2567],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:2562},&#34;\u003Cp&gt;L’MJ Casa Dubai, \u003Cstrong data-start=\&#34;1269\&#34; data-end=\&#34;1308\&#34;&gt;la cui apertura è prevista nel 2026\u003C/strong&gt;, sarà un punto di riferimento per architetti, designer e professionisti dell’interior design, uno spazio pensato per favorire il dialogo, lo scambio di idee e la ricerca di soluzioni su misura per ogni progetto.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:2564,&#34;col_right&#34;:2565},&#34;\u003Cp&gt;Ben oltre un semplice showroom, MJ Casa Dubai è un hub di incontro e ispirazione, dove eventi, workshop e confronti tra professionisti trovano casa per esaltare l’unicità di ogni progetto.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Situata in Building 6, Suite B101, nel cuore del Dubai Design District, la MJ Casa Dubai è concepita come un laboratorio creativo: uno spazio in cui esplorare soluzioni d’eccellenza per interni ed esterni, pavimentazioni e rivestimenti, oltre a superfici per cucine, con applicazioni pensate sia per il settore residenziale che per quello della ristorazione e dell’ospitalità.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:2062,&#34;location_filter&#34;:546},{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:34,&#34;page_link&#34;:2568,&#34;external_link&#34;:29,&#34;file&#34;:34,&#34;label&#34;:2066},{&#34;path&#34;:84,&#34;fullPath&#34;:2065},{&#34;title&#34;:2556,&#34;description&#34;:29,&#34;canonical&#34;:29,&#34;og_props&#34;:34,&#34;social_images&#34;:2570,&#34;twitter&#34;:2571},{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},{&#34;media&#34;:2573,&#34;title&#34;:2579,&#34;excerpt&#34;:2580,&#34;type&#34; MJ Casa londinese di Iris Ceramica Group è situato in Old Street (61-67) nel distretto di Clerkenwell, il cuore creativo della città.&#34;,{&#34;generic&#34;:34,&#34;facebook&#34;:34,&#34;twitter&#34;:34},{&#34;card_type&#34;:28,&#34;title&#34;:29,&#34;description&#34;:29,&#34;site&#34;:29,&#34;creator&#34;:29},[2603],{&#34;acf_fc_layout&#34;:97,&#34;content_sections&#34;:2604},[2605,2607,2609,2612,2613,2615],{&#34;acf_fc_layout&#34;:100,&#34;is_subtitle&#34;:34,&#34;title&#34;:2606},&#34;\u003Cp&gt;L’MJ Casa londinese di Iris Ceramica Group è situato in Old Street (61-67) nel distretto di Clerkenwell, il cuore creativo della città.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:2608,&#34;col_left&#34;:29,&#34;col_right&#34;:29},&#34;\u003Cp&gt;Uno spazio non solo commerciale, ma luogo di incontro dove interagire, ispirarsi, informarsi e alimentare la propria creatività, vero e proprio punto di riferimento della comunità che ruota attorno al mondo dell’architettura.\u003C/p&gt;\n\u003Cp&gt;In linea con lo spirito dinamico della zona in cui si trova, lo studio fiorentino di architettura e interior design Area 17, lo ha progettato come un luogo aperto alla creatività, alle relazioni, alla contaminazione culturale.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:2610,&#34;col_right&#34;:2611},&#34;\u003Cp&gt;Ospitato all’interno di un edificio dal sapore industriale, per una superficie complessiva di quasi 600 mq, lo showroom londinese di Iris Ceramica Group è una Galleria d’arte contemporanea, immersiva, interattiva, tecnologica e coinvolgente.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;MJ Casa London va ben oltre l’esposizione delle superfici, è espressione concreta dei valori che guidano il Gruppo: sostenibilità, innovazione e bellezza.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:2062,&#34;location_filter&#34;:497},{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;i ifici simbolo della città: “The Garden”, sulla Avenida Diagonal.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:104,&#34;content&#34;:2851,&#34;col_left&#34;:2852,&#34;col_right&#34;:2853},&#34;\u003Cp&gt;Il concetto di accoglienza dell’ospite e l’attenzione alla sostenibilità, profondamente radicato nel DNA aziendale, guida la progettazione di questa MJ Casa, sviluppata dallo studio internazionale Area-17 Architecture &amp;amp; Interiors.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Lo spazio realizzato è aperto, permeabile, fluido, e le grandi vetrate che si aprono sulla città creano continuità tra interno ed esterno.\u003C/p&gt;\n\u003Cp&gt;Le due funzioni principali, ufficio e sala meeting, sono racchiuse in un unico volume centrale in legno naturale e vetro che rende l’ambiente caldo e accogliente.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Il verde, elemento caratterizzante dell’edificio The Garden, diventa il colore predominante anche negli spazi interni, dove viene enfatizzato dalla presenza di piante naturali che regalano ai visitatori una sensazione di comfort e benessere.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:2852,&#34;col_right&#34;:2853},{&#34;acf_fc_layout&#34;:2062,&#34;location_filter&#34;:2856},&#34;bacellona&#34;,{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:34,&#34;page_link&#34;:2858,&#34;external_link&#34;:29,&#34;file&#34;:34,&#34;label&#34;:2066},{&#34;path&#34;:84,&#34;fullPath&#34;:2065},{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:2860},[2861,2873,2884,2895,2907,2918,2929],{&#34;ID&#34;:2862,&#34;id&#34;:2862,&#34;title&#34;:2863,&#34;filename&#34;:2864,&#34;filesize&#34;:2865,&#34;url&#34;:2866,&#34;link&#34;:2867,&#34;alt&#34;:2868,&#34;author&#34;:2077,&#34;description&#34;:29,&#34;caption&#34;:29,&#34;name&#34;:2869,&#34;status&#34;:665,&#34;uploaded_to&#34;:2835,&#34;date&#34;:2870,&#34;modified&#34;:2871,&#34;menu_order&#34;:51,&#34;m 34;col_right&#34;:29},&#34;\u003Cp&gt;The concept of welcoming guests and the attention to sustainability, deeply rooted in the company’s DNA, underlies the design of this MJ Casa, developed by the international firm Area-17 Architecture &amp;#038; Interiors.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:103,&#34;columns&#34;:399,&#34;content&#34;:29,&#34;col_left&#34;:3505,&#34;col_right&#34;:3506},&#34;\u003Cp&gt;It is an open, permeable and fluid space, and the large windows looking over the city create continuity between the interior and exterior.\u003C/p&gt;\n\u003Cp&gt;The two main functions, office and meeting room, are framed within a single central space in natural wood and glass to create a warm, welcoming atmosphere.\u003C/p&gt;\n&#34;,&#34;\u003Cp&gt;Green, the distinguishing element of The Garden, is also prevailing colour used in the interiors, emphasised by the presence of natural plants offering visitors a feeling of comfort and well-being.\u003C/p&gt;\n&#34;,{&#34;acf_fc_layout&#34;:2062,&#34;location_filter&#34;:2856},{&#34;acf_fc_layout&#34;:107,&#34;cta_type&#34;:108,&#34;is_external&#34;:34,&#34;page_link&#34;:3509,&#34;external_link&#34;:29,&#34;file&#34;:34,&#34;label&#34;:2979},{&#34;path&#34;:65,&#34;fullPath&#34;:2978},{&#34;acf_fc_layout&#34;:654,&#34;slider&#34;:3511},[3512,3519,3526,3533,3540,3547,3554],{&#34;ID&#34;:3513,&#34;id&#34;:3513,&#34;title&#34;:2863,&#34;filename&#34;:2864,&#34;filesize&#34;:2865,&#34;url&#34;:2866,&#34;link&#34;:3514,&#34;alt&#34;:3515,&#34;author&#34;:2077,&#34;description&#34;:29,&#34;caption&#34;:29,&#34;name&#34;:3516,&#34;status&#34;:665,&#34;uploaded_to&#34;:3491,&#34;date&#34;:2870,&#34;modified&#34;:3517,&#34;menu_order&#34;:51,&#34;mime_type&#34;:667,&#34;type&#34;:121,&#34;subtype&#34;:126,&#34;icon&#34;:668,&#34;width&#34;:2082,&#34;height&#34;:2081,&#34;sizes&#34;:3518},574,&#34;https://apiicggallery.irisceramicagroup.com/en/locations/icg-gallery-barcellona/icg_gallery-locations_barcelona-carousel_1
